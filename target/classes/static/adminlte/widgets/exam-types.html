<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Loại Kỳ Thi</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .card {
            box-shadow: 0 0 1px rgba(0, 0, 0, 0.125);
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        .table-hover tbody tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
<div class="container-fluid mt-4">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-md-6">
            <h1 class="h3">
                <i class="fas fa-list-check"></i> Quản Lý Loại Kỳ Thi
            </h1>
        </div>
        <div class="col-md-6 text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addExamTypeModal">
                <i class="fas fa-plus"></i> Thêm Loại Kỳ Thi
            </button>
        </div>
    </div>

    <!-- Card chính -->
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">
                <i class="fas fa-table"></i> Danh Sách Loại Kỳ Thi
            </h5>
        </div>
        <div class="card-body">
            <!-- Bảng danh sách -->
            <div class="table-responsive">
                <table class="table table-hover table-striped" id="examTypesTable">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 5%">#</th>
                            <th style="width: 25%">Tên Loại Kỳ Thi</th>
                            <th style="width: 40%">Mô Tả</th>
                            <th style="width: 15%">Trạng Thái</th>
                            <th style="width: 15%">Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="examTypesTableBody">
                        <!-- Dữ liệu sẽ được load bằng JavaScript -->
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa Loại Kỳ Thi -->
<div class="modal fade" id="addExamTypeModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Thêm Loại Kỳ Thi</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="examTypeForm">
                    <input type="hidden" id="examTypeId">
                    
                    <div class="mb-3">
                        <label for="examTypeName" class="form-label">Tên Loại Kỳ Thi <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="examTypeName" placeholder="VD: Giữa kỳ, Cuối kỳ..." required>
                    </div>

                    <div class="mb-3">
                        <label for="examTypeDescription" class="form-label">Mô Tả Chi Tiết</label>
                        <textarea class="form-control" id="examTypeDescription" rows="4" placeholder="Nhập mô tả..."></textarea>
                    </div>

                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="examTypeIsActive" checked>
                            <label class="form-check-label" for="examTypeIsActive">
                                Kích hoạt
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary" id="saveExamTypeBtn">Lưu</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = '/api/exam-types';

    // Load danh sách loại kỳ thi
    function loadExamTypes() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('examTypesTableBody');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Không có dữ liệu</td></tr>';
                    return;
                }

                data.forEach((item, index) => {
                    const statusBadge = item.isActive 
                        ? '<span class="badge bg-success">Hoạt động</span>' 
                        : '<span class="badge bg-danger">Vô hiệu</span>';
                    
                    const row = `
                        <tr>
                            <td>${index + 1}</td>
                            <td><strong>${item.name || 'N/A'}</strong></td>
                            <td>${item.description || 'Không có mô tả'}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="editExamType('${item.id}')">
                                    <i class="fas fa-edit"></i> Sửa
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteExamType('${item.id}')">
                                    <i class="fas fa-trash"></i> Xóa
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            })
            .catch(error => {
                console.error('Lỗi:', error);
                document.getElementById('examTypesTableBody').innerHTML = 
                    '<tr><td colspan="5" class="text-center text-danger py-4">Lỗi khi tải dữ liệu</td></tr>';
            });
    }

    // Thêm loại kỳ thi mới
    document.getElementById('saveExamTypeBtn').addEventListener('click', function() {
        const id = document.getElementById('examTypeId').value;
        const name = document.getElementById('examTypeName').value;
        const description = document.getElementById('examTypeDescription').value;
        const isActive = document.getElementById('examTypeIsActive').checked;

        if (!name.trim()) {
            alert('Vui lòng nhập tên loại kỳ thi');
            return;
        }

        const data = {
            name: name,
            description: description,
            isActive: isActive
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            alert(id ? 'Cập nhật thành công!' : 'Thêm mới thành công!');
            bootstrap.Modal.getInstance(document.getElementById('addExamTypeModal')).hide();
            resetForm();
            loadExamTypes();
        })
        .catch(error => {
            console.error('Lỗi:', error);
            alert('Có lỗi xảy ra. Vui lòng thử lại.');
        });
    });

    // Sửa loại kỳ thi
    function editExamType(id) {
        fetch(`${API_URL}/${id}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('examTypeId').value = data.id;
                document.getElementById('examTypeName').value = data.name;
                document.getElementById('examTypeDescription').value = data.description || '';
                document.getElementById('examTypeIsActive').checked = data.isActive;
                document.getElementById('modalTitle').textContent = 'Sửa Loại Kỳ Thi';
                
                const modal = new bootstrap.Modal(document.getElementById('addExamTypeModal'));
                modal.show();
            })
            .catch(error => {
                console.error('Lỗi:', error);
                alert('Không thể tải dữ liệu');
            });
    }

    // Xóa loại kỳ thi
    function deleteExamType(id) {
        if (confirm('Bạn có chắc chắn muốn xóa?')) {
            fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    alert('Xóa thành công!');
                    loadExamTypes();
                } else {
                    alert('Lỗi khi xóa');
                }
            })
            .catch(error => {
                console.error('Lỗi:', error);
                alert('Có lỗi xảy ra');
            });
        }
    }

    // Reset form
    function resetForm() {
        document.getElementById('examTypeForm').reset();
        document.getElementById('examTypeId').value = '';
        document.getElementById('modalTitle').textContent = 'Thêm Loại Kỳ Thi';
    }

    // Reset form khi đóng modal
    document.getElementById('addExamTypeModal').addEventListener('hidden.bs.modal', function() {
        resetForm();
    });

    // Load dữ liệu khi trang load
    document.addEventListener('DOMContentLoaded', function() {
        loadExamTypes();
    });
</script>
</body>
</html>
