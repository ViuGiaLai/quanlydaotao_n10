<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 - Không tìm thấy</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Source Sans Pro', sans-serif; background: #f4f6f9; }
        .card { border: 0; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
        .code { font-size: 72px; font-weight: 700; letter-spacing: 2px; color: #343a40; }
        .muted { color: #6c757d; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7">
            <div class="card p-4 p-md-5">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="code">404</div>
                    <div>
                        <h1 class="h3 mb-1">Không tìm thấy trang</h1>
                        <div class="muted">Đường dẫn bạn truy cập không tồn tại hoặc đã được đổi.</div>
                    </div>
                </div>

                <div class="d-flex flex-wrap gap-2 mt-3">
                    <a class="btn btn-primary" th:href="@{/admin}">Vào trang quản trị</a>
                    <a class="btn btn-outline-secondary" th:href="@{/login}">Đăng nhập</a>
                </div>

                <div class="muted mt-4 small" th:if="${path != null}">
                    <span>Path:</span> <code th:text="${path}"></code>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
