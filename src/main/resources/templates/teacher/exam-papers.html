<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{teacher/layout}">
<head>
    <title>Quản Lý Đề Thi</title>
</head>
<body>
<th:block layout:fragment="active_page_setter">
    <th:block th:with="activePage='exam-papers'"></th:block>
</th:block>

<div layout:fragment="content">
    <div class="container-fluid">
        <h2 class="mb-4">Quản Lý Đề Thi</h2>
        
        <div class="card mb-4">
            <div class="card-header"><h5>Upload Đề Thi Mới</h5></div>
            <div class="card-body">
                <form th:action="@{/teacher/exam-papers/upload}" method="post">
                    <div class="row">
                        <div class="col-md-4">
                            <input type="text" name="examId" class="form-control" placeholder="ID Kỳ Thi" required>
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="paperCode" class="form-control" placeholder="Mã Đề Thi" required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-upload"></i> Upload
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Tiêu Đề</th>
                            <th>Kỳ Thi</th>
                            <th>Ngày Tạo</th>
                            <th>Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="paper : ${papers}">
                            <td th:text="${paper.paperCode}">-</td>
                            <td th:text="${paper.examId}">-</td>
                            <td th:text="${paper.createdAt}">-</td>
                            <td><span class="badge bg-success">Hoạt động</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(papers)}">
                            <td colspan="4" class="text-center text-muted">Chưa có đề thi nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
