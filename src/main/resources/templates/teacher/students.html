<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{teacher/layout}">
<head>
    <title>Danh Sách Sinh Viên</title>
</head>
<body>
<th:block layout:fragment="active_page_setter">
    <th:block th:with="activePage='students'"></th:block>
</th:block>

<div layout:fragment="content">
    <div class="container-fluid">
        <h2 class="mb-4">Danh Sách Sinh Viên</h2>
        <div class="card">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Mã SV</th>
                            <th>Họ Tên</th>
                            <th>Ngày Sinh</th>
                            <th>Lớp</th>
                            <th>Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="student : ${students}">
                            <td th:text="${student.code}">-</td>
                            <td th:text="${student.fullname}">-</td>
                            <td th:text="${student.dateOfBirth}">-</td>
                            <td th:text="${student.majorId}">-</td>
                            <td><span class="badge bg-success">Đang học</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="5" class="text-center text-muted">Không có sinh viên nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
