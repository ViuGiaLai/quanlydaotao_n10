<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{teacher/layout}">

<head>
    <title>Niên Học - Giảng Viên</title>
    <th:block th:with="activePage='academic-years'"></th:block>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-calendar-alt"></i> Quản Lý Niên Học</h2>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-info-circle"></i> Niên Học Hiện Tại</h5>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center text-muted py-5">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p class="mt-2">Đang tải dữ liệu...</p>
                </div>
                <div id="currentContent" style="display: none;">
                    <div class="row">
                        <div class="col-md-6">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="40%" class="text-end">Mã Niên Học:</th>
                                    <td id="currentCode" class="fw-bold">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Tên Niên Học:</th>
                                    <td id="currentName">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Năm:</th>
                                    <td id="currentYear">-</td>
                                </tr>
                            </table>
                        </div>
                        <div class="col-md-6">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="40%" class="text-end">Ngày Bắt Đầu:</th>
                                    <td id="currentStartDate">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Ngày Kết Thúc:</th>
                                    <td id="currentEndDate">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Trạng Thái:</th>
                                    <td id="currentStatus">-</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
                <div id="noCurrentData" class="text-center text-muted py-5" style="display: none;">
                    <i class="fas fa-calendar-times fa-2x"></i>
                    <p class="mt-2">Không có niên học đang hoạt động</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-list"></i> Danh Sách Tất Cả Niên Học</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã</th>
                            <th>Tên</th>
                            <th>Năm</th>
                            <th>Mô Tả</th>
                            <th>Ngày Bắt Đầu</th>
                            <th>Ngày Kết Thúc</th>
                            <th>Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" class="text-center text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/academic-years';

        async function loadCurrent() {
            try {
                const res = await fetch(`${API_URL}/active`);
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (data && data.length > 0) {
                    const ay = data[0];
                    document.getElementById('currentCode').textContent = ay.code || '-';
                    document.getElementById('currentName').textContent = ay.name || '-';
                    document.getElementById('currentYear').textContent = ay.year || '-';
                    document.getElementById('currentStartDate').textContent = ay.startDate 
                        ? new Date(ay.startDate).toLocaleDateString('vi-VN') 
                        : '-';
                    document.getElementById('currentEndDate').textContent = ay.endDate 
                        ? new Date(ay.endDate).toLocaleDateString('vi-VN') 
                        : '-';
                    
                    const statusBadge = ay.isActive !== false 
                        ? '<span class="badge bg-success">Hoạt động</span>' 
                        : '<span class="badge bg-secondary">Khóa</span>';
                    document.getElementById('currentStatus').innerHTML = statusBadge;
                    
                    document.getElementById('currentContent').style.display = 'block';
                } else {
                    document.getElementById('noCurrentData').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('noCurrentData').style.display = 'block';
                console.error('Error:', e);
            }
        }

        async function loadAll() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const tbody = document.getElementById('tableBody');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Chưa có dữ liệu</td></tr>';
                    return;
                }
                
                let html = '';
                data.forEach((ay, i) => {
                    const startDate = ay.startDate ? new Date(ay.startDate).toLocaleDateString('vi-VN') : '-';
                    const endDate = ay.endDate ? new Date(ay.endDate).toLocaleDateString('vi-VN') : '-';
                    const status = ay.isActive !== false 
                        ? '<span class="badge bg-success">Hoạt động</span>' 
                        : '<span class="badge bg-secondary">Khóa</span>';
                    
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td>${ay.code || '-'}</td>
                        <td>${ay.name || '-'}</td>
                        <td>${ay.year || '-'}</td>
                        <td>${ay.description || '-'}</td>
                        <td>${startDate}</td>
                        <td>${endDate}</td>
                        <td>${status}</td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (e) {
                document.getElementById('tableBody').innerHTML = 
                    `<tr><td colspan="8" class="text-danger">Lỗi: ${e.message}</td></tr>`;
            }
        }

        loadCurrent();
        loadAll();
    </script>
    </div>
</body>
</html>
