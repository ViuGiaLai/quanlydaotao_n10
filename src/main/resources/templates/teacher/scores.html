<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{teacher/layout}">
<head>
    <title>Nhập Điểm</title>
</head>
<body>
<th:block layout:fragment="active_page_setter">
    <th:block th:with="activePage='scores'"></th:block>
</th:block>

<div layout:fragment="content">
    <div class="container-fluid">
        <h2 class="mb-4">Nhập Điểm</h2>
        
        <!-- Chọn lớp/môn học -->
        <div class="card mb-3">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-2">
                        <label class="form-label">Học Kỳ</label>
                        <select class="form-select" id="semesterId" onchange="loadCourseClasses()">
                            <option value="">-- Chọn Học Kỳ --</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Lớp Học</label>
                        <select class="form-select" id="courseClassId" onchange="loadSubjects()">
                            <option value="">-- Chọn Lớp --</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Môn Học</label>
                        <select class="form-select" id="subjectId">
                            <option value="">-- Tất cả --</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Trạng Thái</label>
                        <select class="form-select" id="statusFilter">
                            <option value="">-- Tất cả --</option>
                            <option value="DRAFT">Nháp</option>
                            <option value="SUBMITTED">Đã gửi</option>
                            <option value="APPROVED">Đã duyệt</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hành Động</label>
                        <div>
                            <button class="btn btn-primary" onclick="loadStudents()">
                                <i class="fas fa-search"></i> Tìm
                            </button>
                            <button class="btn btn-success" onclick="exportExcel()">
                                <i class="fas fa-file-excel"></i> Export
                            </button>
                            <button class="btn btn-warning" id="submitBtn" onclick="submitScores()" disabled>
                                <i class="fas fa-paper-plane"></i> Gửi
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thông báo trạng thái -->
        <div id="statusMessage" class="alert alert-info d-none"></div>

        <!-- Danh sách sinh viên -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Danh Sách Điểm Sinh Viên</h5>
                <div>
                    <span class="badge bg-warning me-2">Chuyên cần: 10%</span>
                    <span class="badge bg-info me-2">Kiểm tra: 20%</span>
                    <span class="badge bg-primary me-2">Giữa kỳ: 20%</span>
                    <span class="badge bg-success">Cuối kỳ: 50%</span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th rowspan="2" class="text-center align-middle">Mã SV</th>
                                <th rowspan="2" class="text-center align-middle">Họ Tên</th>
                                <th colspan="4" class="text-center">Điểm Thành Phần</th>
                                <th rowspan="2" class="text-center align-middle">Tổng</th>
                                <th rowspan="2" class="text-center align-middle">Trạng Thái</th>
                                <th rowspan="2" class="text-center align-middle">Thao Tác</th>
                            </tr>
                            <tr>
                                <th class="text-center">Chuyên cần<br>(10%)</th>
                                <th class="text-center">Kiểm tra<br>(20%)</th>
                                <th class="text-center">Giữa kỳ<br>(20%)</th>
                                <th class="text-center">Cuối kỳ<br>(50%)</th>
                            </tr>
                        </thead>
                        <tbody id="scoreTable">
                            <tr>
                                <td colspan="9" class="text-center text-muted">Vui lòng chọn lớp và môn học</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="scorePagination" class="d-flex justify-content-center mt-3"></div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script>
        const API_URL = "/api/exam-results";
        const PAGE_SIZE = 20;
        let scoreItems = [];
        let currentPage = 1;
        let isEditable = false;

        // Load danh sách học kỳ
        async function loadLookupData() {
            try {
                const semestersRes = await fetch("/api/semesters/list");
                const semesters = await semestersRes.json();
                
                const semesterSelect = document.getElementById("semesterId");
                semesters.forEach(s => {
                    semesterSelect.innerHTML += `<option value="${s.id}">${s.name || s.semesterName}</option>`;
                });
            } catch (e) {
                console.error("Load lookup error:", e);
            }
        }

        // Load lớp học theo học kỳ
        async function loadCourseClasses() {
            const semesterId = document.getElementById("semesterId").value;
            const classSelect = document.getElementById("courseClassId");
            const subjectSelect = document.getElementById("subjectId");
            
            // Reset
            classSelect.innerHTML = '<option value="">-- Chọn Lớp --</option>';
            subjectSelect.innerHTML = '<option value="">-- Tất cả --</option>';
            
            if (!semesterId) {
                document.getElementById("scoreTable").innerHTML = 
                    `<tr><td colspan="10" class="text-center text-muted">Vui lòng chọn học kỳ và lớp học</td></tr>`;
                return;
            }
            
            try {
                const res = await fetch(`/api/course-classes/list?semesterId=${semesterId}`);
                const classes = await res.json();
                
                classes.forEach(c => {
                    classSelect.innerHTML += `<option value="${c.id}">${c.className || c.name}</option>`;
                });
            } catch (e) {
                console.error("Load course classes error:", e);
            }
        }

        // Load môn học theo lớp
        async function loadSubjects() {
            const courseClassId = document.getElementById("courseClassId").value;
            const subjectSelect = document.getElementById("subjectId");
            
            // Reset
            subjectSelect.innerHTML = '<option value="">-- Tất cả --</option>';
            
            if (!courseClassId) {
                document.getElementById("scoreTable").innerHTML = 
                    `<tr><td colspan="10" class="text-center text-muted">Vui lòng chọn học kỳ và lớp học</td></tr>`;
                return;
            }
            
            try {
                // Lấy chi tiết lớp học
                const classRes = await fetch(`/api/course-classes/${courseClassId}`);
                const courseClass = await classRes.json();
                
                // Thử lấy từ bảng trung gian trước
                const ccsRes = await fetch(`/api/course-class-subjects?courseClassId=${courseClassId}`);
                const courseClassSubjects = await ccsRes.json();
                
                if (courseClassSubjects && courseClassSubjects.length > 0) {
                    // Lấy từ bảng trung gian
                    for (const cs of courseClassSubjects) {
                        const subjectRes = await fetch(`/api/subjects/${cs.subjectId}`);
                        const subject = await subjectRes.json();
                        
                        if (subject) {
                            subjectSelect.innerHTML += `<option value="${subject.id}">${subject.subjectName || subject.name}</option>`;
                        }
                    }
                } else if (courseClass && courseClass.subjectId) {
                    // Fallback: lấy từ CourseClass
                    const subjectRes = await fetch(`/api/subjects/${courseClass.subjectId}`);
                    const subject = await subjectRes.json();
                    
                    if (subject) {
                        subjectSelect.innerHTML += `<option value="${subject.id}">${subject.subjectName || subject.name}</option>`;
                    }
                }
            } catch (e) {
                console.error("Load subjects error:", e);
            }
        }

        // Load danh sách điểm
        async function loadStudents() {
            const semesterId = document.getElementById("semesterId").value;
            const courseClassId = document.getElementById("courseClassId").value;
            const subjectId = document.getElementById("subjectId").value;
            const statusFilter = document.getElementById("statusFilter").value;
            
            if (!semesterId || !courseClassId) {
                document.getElementById("scoreTable").innerHTML = 
                    `<tr><td colspan="10" class="text-center text-muted">Vui lòng chọn học kỳ và lớp học</td></tr>`;
                return;
            }

            try {
                // Gọi API với params
                let url = `${API_URL}?courseClassId=${courseClassId}`;
                if (subjectId) url += `&subjectId=${subjectId}`;
                if (statusFilter) url += `&status=${statusFilter}`;
                
                const res = await fetch(url);
                const data = await res.json();
                scoreItems = Array.isArray(data) ? data : [];
                currentPage = 1;
                
                // Kiểm tra có được phép sửa không
                isEditable = scoreItems.length > 0 && scoreItems[0].isEditable;
                
                renderTable();
                showStatus();
            } catch (e) {
                console.error("Load error:", e);
                document.getElementById("scoreTable").innerHTML = 
                    `<tr><td colspan="10" class="text-center text-danger">Lỗi: ${e.message}</td></tr>`;
            }
        }

        function showStatus() {
            const msgDiv = document.getElementById("statusMessage");
            
            // Đếm theo trạng thái
            const draftCount = scoreItems.filter(i => i.status === "DRAFT").length;
            const submittedCount = scoreItems.filter(i => i.status === "SUBMITTED").length;
            const approvedCount = scoreItems.filter(i => i.status === "APPROVED").length;
            
            let statusHtml = "";
            if (draftCount > 0) statusHtml += `<span class="badge bg-warning me-1">DRAFT: ${draftCount}</span>`;
            if (submittedCount > 0) statusHtml += `<span class="badge bg-info me-1">Đã gửi: ${submittedCount}</span>`;
            if (approvedCount > 0) statusHtml += `<span class="badge bg-success">Đã duyệt: ${approvedCount}</span>`;
            
            if (isEditable) {
                msgDiv.className = "alert alert-success";
                msgDiv.innerHTML = `<i class='fas fa-check-circle'></i> Mở nhập điểm | ${statusHtml}`;
            } else {
                msgDiv.className = "alert alert-warning";
                msgDiv.innerHTML = `<i class='fas fa-lock'></i> Đã khóa nhập điểm | ${statusHtml}`;
            }
            msgDiv.classList.remove("d-none");
            
            // Cập nhật nút gửi
            updateSubmitButton();
        }

        function renderTable() {
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageItems = scoreItems.slice(start, end);
            
            let html = "";
            if (pageItems.length === 0) {
                html = `<tr><td colspan="10" class="text-center text-muted">Không có dữ liệu</td></tr>`;
            } else {
                pageItems.forEach(item => {
                    html += `
                        <tr>
                            <td>${item.studentCode || '-'}</td>
                            <td>${item.studentName || '-'}</td>
                            <td>
                                <input type="number" step="0.1" min="0" max="10" 
                                       class="form-control form-control-sm" 
                                       value="${item.attendanceScore || ''}"
                                       ${!isEditable ? 'disabled' : ''}
                                       onchange="saveScore('${item.id}', 'attendanceScore', this.value)"
                                       placeholder="0-10">
                            </td>
                            <td>
                                <input type="number" step="0.1" min="0" max="10" 
                                       class="form-control form-control-sm" 
                                       value="${item.testScore || ''}"
                                       ${!isEditable ? 'disabled' : ''}
                                       onchange="saveScore('${item.id}', 'testScore', this.value)"
                                       placeholder="0-10">
                            </td>
                            <td>
                                <input type="number" step="0.1" min="0" max="10" 
                                       class="form-control form-control-sm" 
                                       value="${item.midtermScore || ''}"
                                       ${!isEditable ? 'disabled' : ''}
                                       onchange="saveScore('${item.id}', 'midtermScore', this.value)"
                                       placeholder="0-10">
                            </td>
                            <td>
                                <input type="number" step="0.1" min="0" max="10" 
                                       class="form-control form-control-sm" 
                                       value="${item.finalScore || ''}"
                                       ${!isEditable ? 'disabled' : ''}
                                       onchange="saveScore('${item.id}', 'finalScore', this.value)"
                                       placeholder="0-10">
                            </td>
                            <td class="text-center fw-bold">${item.totalScore || 0}</td>
                            <td class="text-center">${getStatusBadge(item.status)}</td>
                            <td>
                                <button class="btn btn-success btn-sm" 
                                        onclick="saveAllScores('${item.id}')"
                                        ${!isEditable ? 'disabled' : ''}
                                        title="Lưu">
                                    <i class="fas fa-save"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            document.getElementById("scoreTable").innerHTML = html;
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(scoreItems.length / PAGE_SIZE);
            if (totalPages <= 1) {
                document.getElementById("scorePagination").innerHTML = "";
                return;
            }
            
            let html = `<nav><ul class="pagination">`;
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <button class="page-link" onclick="goToPage(${currentPage - 1})">Trước</button>
            </li>`;
            
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <button class="page-link" onclick="goToPage(${i})">${i}</button>
                </li>`;
            }
            
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <button class="page-link" onclick="goToPage(${currentPage + 1})">Sau</button>
            </li></ul></nav>`;
            
            document.getElementById("scorePagination").innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(scoreItems.length / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }

        // Lưu từng loại điểm
        async function saveScore(id, field, value) {
            if (!isEditable) {
                alert("Admin chưa cho phép nhập điểm!");
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/${encodeURIComponent(id)}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        [field]: value ? parseFloat(value) : null
                    })
                });
                if (!res.ok) throw new Error("Save failed");
                
                // Cập nhật lại local data
                const item = scoreItems.find(i => i.id === id);
                if (item) {
                    item[field] = value ? parseFloat(value) : null;
                    item.totalScore = calculateTotal(item);
                }
                renderTable();
            } catch (e) {
                console.error("Save error:", e);
                alert("Lưu thất bại: " + e.message);
            }
        }

        // Lưu tất cả điểm
        async function saveAllScores(id) {
            if (!isEditable) {
                alert("Admin chưa cho phép nhập điểm!");
                return;
            }
            
            const item = scoreItems.find(i => i.id === id);
            if (!item) return;
            
            try {
                const res = await fetch(`${API_URL}/${encodeURIComponent(id)}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        attendanceScore: item.attendanceScore,
                        testScore: item.testScore,
                        midtermScore: item.midtermScore,
                        finalScore: item.finalScore
                    })
                });
                if (!res.ok) throw new Error("Save failed");
                alert("Lưu thành công!");
            } catch (e) {
                console.error("Save error:", e);
                alert("Lưu thất bại!");
            }
        }

        function calculateTotal(item) {
            let total = 0;
            if (item.attendanceScore) total += item.attendanceScore * 0.1;
            if (item.testScore) total += item.testScore * 0.2;
            if (item.midtermScore) total += item.midtermScore * 0.2;
            if (item.finalScore) total += item.finalScore * 0.5;
            return Math.round(total * 100) / 100;
        }

        // Export Excel
        function exportExcel() {
            const courseClassId = document.getElementById("courseClassId").value;
            const subjectId = document.getElementById("subjectId").value;
            if (!courseClassId || !subjectId) {
                alert("Vui lòng chọn lớp và môn học");
                return;
            }
            window.open(`${API_URL}/export?courseClassId=${courseClassId}&subjectId=${subjectId}&format=excel`, '_blank');
        }

        // Gửi điểm (DRAFT → SUBMITTED)
        async function submitScores() {
            if (scoreItems.length === 0) {
                alert("Không có điểm để gửi");
                return;
            }
            
            // Kiểm tra tất cả điểm phải ở trạng thái DRAFT
            const draftItems = scoreItems.filter(i => i.status === "DRAFT");
            if (draftItems.length === 0) {
                alert("Tất cả điểm đã được gửi hoặc đã duyệt");
                return;
            }
            
            if (!confirm(`Gửi ${draftItems.length} điểm? Sau khi gửi, bạn không thể sửa cho đến khi Admin trả lại.`)) {
                return;
            }
            
            try {
                const ids = draftItems.map(i => i.id);
                const res = await fetch(`${API_URL}/submit-multiple`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(ids)
                });
                
                if (!res.ok) throw new Error("Gửi thất bại");
                
                alert(`Đã gửi ${draftItems.length} điểm thành công!`);
                loadStudents(); // Tải lại danh sách
            } catch (e) {
                console.error("Submit error:", e);
                alert("Gửi thất bại: " + e.message);
            }
        }

        // Cập nhật trạng thái nút Gửi
        function updateSubmitButton() {
            const submitBtn = document.getElementById("submitBtn");
            if (!submitBtn) return;
            
            const draftCount = scoreItems.filter(i => i.status === "DRAFT").length;
            if (draftCount > 0 && isEditable) {
                submitBtn.disabled = false;
                submitBtn.title = `Gửi ${draftCount} điểm (DRAFT)`;
            } else {
                submitBtn.disabled = true;
                submitBtn.title = "Không có điểm DRAFT để gửi";
            }
        }

        // Hiển thị trạng thái điểm
        function getStatusBadge(status) {
            switch(status) {
                case "DRAFT": return '<span class="badge bg-warning">Nháp</span>';
                case "SUBMITTED": return '<span class="badge bg-info">Đã gửi</span>';
                case "APPROVED": return '<span class="badge bg-success">Đã duyệt</span>';
                case "REJECTED": return '<span class="badge bg-danger">Trả lại</span>';
                default: return '<span class="badge bg-secondary">-</span>';
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadLookupData();
        });
    </script>
</th:block>
</body>
</html>
