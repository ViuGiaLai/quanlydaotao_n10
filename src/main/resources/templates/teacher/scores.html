<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{teacher/layout}">
<head>
    <title>Nhập Điểm</title>
</head>
<body>
<th:block layout:fragment="active_page_setter">
    <th:block th:with="activePage='scores'"></th:block>
</th:block>

<div layout:fragment="content">
    <div class="container-fluid">
        <h2 class="mb-4">Nhập Điểm</h2>
        <div class="card">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Mã SV</th>
                            <th>Họ Tên</th>
                            <th>Môn Thi</th>
                            <th>Điểm</th>
                            <th>Ghi Chú</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="result : ${results}">
                            <td th:text="${result.registrationId}">-</td>
                            <td>-</td>
                            <td th:text="${result.examId}">-</td>
                            <td th:text="${result.score}">-</td>
                            <td th:text="${result.status}">-</td>
                            <td>
                                <form th:action="@{/teacher/scores/save}" method="post" class="d-flex">
                                    <input type="hidden" name="resultId" th:value="${result.id}">
                                    <input type="number" step="0.1" min="0" max="10" 
                                           name="score" th:value="${result.score}" class="form-control form-control-sm" style="width:80px">
                                    <input type="hidden" name="status" value="GRADED">
                                    <button type="submit" class="btn btn-success btn-sm">
                                        <i class="fas fa-save"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(results)}">
                            <td colspan="6" class="text-center text-muted">Chưa có dữ liệu</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
