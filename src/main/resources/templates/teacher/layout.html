<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giảng Viên - Hệ Thống Quản Lý Đào Tạo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ====
           PHONG CÁCH "CŨ CŨ" - TRANG GIẢNG VIÊN
           Giữ nguyên cấu trúc và class, chỉ đổi style
           Màu sắc: xanh rêu + nâu đất - vintage
        ==== */

        * {
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3b6e5c;
            /* Xanh rêu cũ kỹ - thay vì gradient xanh lục */
            --accent-color: #8b5a2b;
            /* Màu nâu đất vintage */
        }

        body {
            font-family: 'Courier New', 'Segoe UI', 'Source Sans Pro', monospace;
            background: #d9cfb0;
            /* Nền giấy cũ, hơi ố vàng */
            font-size: 14px;
            color: #2c281c;
        }

        /* Sidebar phong cách cũ - bỏ gradient, giữ màu đất và viền gỗ */
        .sidebar {
            width: 250px;
            background: #3d5a4c;
            /* Xanh rêu đậm thay vì gradient xanh ngọc */
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 3px solid #b29263;
            box-shadow: 4px 0 8px rgba(0, 0, 0, 0.1);
            background-image: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 2px, transparent 2px, transparent 8px);
        }

        /* Sidebar links kiểu menu cũ */
        .sidebar a {
            color: #f9efcf;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: 0.1s linear;
            font-size: 0.9rem;
            border-bottom: 1px solid #527a66;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .sidebar a:hover {
            background: #2e5a48;
            border-left: 5px solid #e0b062;
            padding-left: 20px;
            color: #fff7e3;
        }

        .sidebar a.active {
            background: #8b5a2b;
            /* Nâu đất khi active */
            border-left: 6px solid #f5cd94;
            font-weight: bold;
            color: #fff2cf;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* User info style cũ */
        .user-info {
            padding: 18px 15px;
            border-bottom: 2px solid #b49462;
            background: #2c4f3e;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #fff2cf;
            text-shadow: 1px 1px 0 #2e3a25;
        }

        .user-info i {
            font-size: 1.2rem;
            margin-right: 8px;
            color: #eedb9b;
        }

        /* Content area kiểu cổ điển */
        .content {
            margin-left: 250px;
            padding: 28px 25px;
            background: #e2dfcf;
            background-image: radial-gradient(circle at 20% 30%, rgba(150, 120, 70, 0.05) 2%, transparent 2.5%);
            background-size: 22px 22px;
            min-height: 100vh;
        }

        /* Card / Panel style cũ kỹ */
        .card,
        .panel,
        .table-responsive {
            background: #fffcf0;
            border: 1px solid #cfbf93;
            border-radius: 0px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.07);
            margin-bottom: 1.6rem;
        }

        .card-header {
            background: #e5d9bc;
            border-bottom: 1px solid #cbbd90;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #3a3522;
            padding: 10px 15px;
        }

        /* Table style rất "cổ lỗ" */
        .table {
            background-color: #fffcf0;
            border: 1px solid #cfbf93;
            font-size: 0.85rem;
        }

        .table thead th {
            background: #dacda4;
            border-bottom: 2px solid #b7a16e;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 8px;
            color: #2c2a1d;
            font-family: monospace;
        }

        .table td,
        .table th {
            border: 1px solid #ddd0ac;
            padding: 8px;
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background-color: #efe0bd;
        }

        /* Buttons - nút bấm giản dị, không bo góc */
        .btn {
            border-radius: 0px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 5px 14px;
            border-width: 1px;
            font-family: inherit;
        }

        .btn-primary {
            background-color: #7f6139;
            border-color: #68512e;
            color: #fff6e0;
        }

        .btn-primary:hover {
            background-color: #5c4527;
            border-color: #4e3b1f;
        }

        .btn-secondary {
            background-color: #9b8a64;
            border-color: #7a6844;
            color: #2e2b1c;
        }

        .btn-success {
            background-color: #6f7f4a;
            border-color: #5a673b;
            color: #fef8df;
        }

        .btn-warning {
            background-color: #d6ae5c;
            border-color: #b88d3c;
            color: #352b16;
        }

        .btn-danger {
            background-color: #aa6f5a;
            border-color: #8b5440;
        }

        .btn-info {
            background-color: #719e7c;
            border-color: #597a62;
            color: #2a2a1a;
        }

        /* Form controls kiểu xưa */
        input,
        select,
        textarea,
        .form-control {
            background: #fffef5;
            border: 1px solid #bea97c;
            border-radius: 0px;
            padding: 5px 8px;
            font-size: 0.85rem;
            box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.02);
        }

        input:focus,
        select:focus,
        .form-control:focus {
            border-color: #9c7a48;
            outline: none;
            box-shadow: 0 0 0 2px rgba(150, 110, 50, 0.25);
            background-color: #fffff2;
        }

        /* Pagination cũ */
        .pagination .page-link {
            background: #f3eada;
            border: 1px solid #ccb786;
            color: #69542e;
            font-size: 0.8rem;
        }

        .pagination .page-item.active .page-link {
            background: #836e42;
            border-color: #5c4a2a;
            color: white;
        }

        /* Alert / badge cổ điển */
        .alert {
            border-radius: 0px;
            border-left: 6px solid #b68948;
            background: #fef7e0;
            font-size: 0.85rem;
        }

        .badge {
            border-radius: 0px;
            font-size: 0.7rem;
            padding: 4px 7px;
            background-color: #9e874f;
            color: #26200e;
        }

        /* Breadcrumb (nếu có thêm) */
        .breadcrumb {
            background: #e9e2ce;
            border-radius: 0;
            padding: 8px 15px;
            border-left: 5px solid #b69760;
            margin-bottom: 1.5rem;
        }

        /* Link style đơn giản */
        a:not(.btn):not(.sidebar a) {
            color: #7a592e;
            text-decoration: underline dotted;
        }

        a:not(.btn):not(.sidebar a):hover {
            color: #4a351a;
        }

        /* Heading style cũ */
        h1,
        h2,
        h3,
        h4 {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            border-left: 4px solid #b68948;
            padding-left: 12px;
            margin-top: 0;
            margin-bottom: 1.2rem;
            color: #3f3a28;
        }

        /* Modal cũ kỹ (nếu xuất hiện) */
        .modal-content {
            background: #fcf5e7;
            border-radius: 0px;
            border: 1px solid #b29464;
        }

        .modal-header {
            border-bottom: 1px solid #d7c299;
            background: #efe3c9;
        }

        /* Footer hay các thành phần phụ đơn giản */
        footer,
        .small-footer {
            background: #dbd0b0;
            border-top: 2px solid #bba56c;
            font-size: 0.7rem;
            font-family: monospace;
            padding: 10px;
            text-align: center;
            margin-top: 25px;
        }

        /* list group cũ */
        .list-group-item {
            background-color: #fff6e6;
            border: 1px solid #decb9c;
        }

        /* Dropdown menu cũ */
        .dropdown-menu {
            background: #fff3e2;
            border: 1px solid #cdb28b;
            border-radius: 0px;
        }

        .dropdown-item {
            font-size: 0.85rem;
            color: #54482c;
        }

        .dropdown-item:hover {
            background: #e2cfac;
            color: #1e2a1c;
        }

        /* Responsive giữ nguyên cấu trúc sidebar */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
                z-index: 1050;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .content {
                margin-left: 0;
            }
        }

        /* Hiệu ứng cũ - kiểu phai màu */
        hr {
            border-top: 1px solid #caba8a;
        }

        /* Thẻ label cũ */
        label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #4e4127;
        }

        /* Các class phụ trợ boostrap giữ nguyên, chỉ thêm màu nền */
        .bg-light {
            background-color: #ede5cf !important;
        }

        .text-muted {
            color: #6b5a3a !important;
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <div class="sidebar">
            <div class="user-info text-white">
                <i class="fas fa-chalkboard-teacher me-2"></i>
                <span th:text="${teacher?.fullname ?: 'Giảng Viên'}">Giảng Viên</span>
            </div>
            <a th:href="@{/teacher}" th:classappend="${activePage == 'dashboard'} ? 'active'">
                <i class="fas fa-home me-2"></i> Trang Chủ
            </a>
            <a th:href="@{/teacher/exams}" th:classappend="${activePage == 'exams'} ? 'active'">
                <i class="fas fa-calendar-alt me-2"></i> Kỳ Thi Phụ Trách
            </a>
            <a th:href="@{/teacher/students}" th:classappend="${activePage == 'students'} ? 'active'">
                <i class="fas fa-users me-2"></i> Danh Sách SV
            </a>
            <a th:href="@{/teacher/scores}" th:classappend="${activePage == 'scores'} ? 'active'">
                <i class="fas fa-edit me-2"></i> Nhập Điểm
            </a>
            <a th:href="@{/teacher/exam-papers}" th:classappend="${activePage == 'exam-papers'} ? 'active'">
                <i class="fas fa-file-alt me-2"></i> Đề Thi
            </a>
            <a th:href="@{/teacher/attendance}" th:classappend="${activePage == 'attendance'} ? 'active'">
                <i class="fas fa-clipboard-check me-2"></i> Điểm Danh
            </a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" style="background: none; border: none; padding: 12px 20px; width: 100%; text-align: left; cursor: pointer; color: #f9efcf; text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid #527a66; font-weight: 500; letter-spacing: 0.3px; transition: 0.1s linear;">
                    <i class="fas fa-sign-out-alt me-2"></i> Đăng Xuất
                </button>
            </form>
        </div>
        <div class="content flex-grow-1 p-4">
            <th:block layout:fragment="content"></th:block>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // giữ nguyên hoàn toàn logic nhưng nếu cần toggle cho mobile
        document.addEventListener('DOMContentLoaded', function () {
            // chỉ để đảm bảo sidebar có thể ẩn hiện khi dùng thêm nút (không ảnh hưởng logic chính)
            var sidebar = document.querySelector('.sidebar');
            if (sidebar && window.innerWidth <= 768) {
                // không tự động thêm nút, giữ nguyên, chỉ để style responsive
                // nếu muốn giữ hành vi y hệt cũ, không thay đổi gì thêm
            }
        });
    </script>
    <th:block layout:fragment="script"></th:block>
</body>

</html>
