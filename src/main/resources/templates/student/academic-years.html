<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{student/layout}">

<head>
    <title>Niên Học - Sinh Viên</title>
    <th:block th:with="activePage='academic-years'"></th:block>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-calendar-alt"></i> Niên Học Hiện Tại</h2>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-info-circle"></i> Thông Tin Niên Học</h5>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center text-muted py-5">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p class="mt-2">Đang tải dữ liệu...</p>
                </div>
                <div id="content" style="display: none;">
                    <div class="row">
                        <div class="col-md-6">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="40%" class="text-end">Mã Niên Học:</th>
                                    <td id="code" class="fw-bold">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Tên Niên Học:</th>
                                    <td id="name">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Năm:</th>
                                    <td id="year">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Mô Tả:</th>
                                    <td id="description">-</td>
                                </tr>
                            </table>
                        </div>
                        <div class="col-md-6">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="40%" class="text-end">Ngày Bắt Đầu:</th>
                                    <td id="startDate">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Ngày Kết Thúc:</th>
                                    <td id="endDate">-</td>
                                </tr>
                                <tr>
                                    <th class="text-end">Trạng Thái:</th>
                                    <td id="status">-</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
                <div id="noData" class="text-center text-muted py-5" style="display: none;">
                    <i class="fas fa-calendar-times fa-2x"></i>
                    <p class="mt-2">Không có niên học nào đang hoạt động</p>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-history"></i> Lịch Sử Niên Học</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã</th>
                            <th>Tên</th>
                            <th>Năm</th>
                            <th>Ngày Bắt Đầu</th>
                            <th>Ngày Kết Thúc</th>
                            <th>Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable">
                        <tr><td colspan="7" class="text-center text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/academic-years';

        async function loadActive() {
            try {
                const res = await fetch(`${API_URL}/active`);
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (data && data.length > 0) {
                    const ay = data[0];
                    document.getElementById('code').textContent = ay.code || '-';
                    document.getElementById('name').textContent = ay.name || '-';
                    document.getElementById('year').textContent = ay.year || '-';
                    document.getElementById('description').textContent = ay.description || '-';
                    document.getElementById('startDate').textContent = ay.startDate ? new Date(ay.startDate).toLocaleDateString('vi-VN') : '-';
                    document.getElementById('endDate').textContent = ay.endDate ? new Date(ay.endDate).toLocaleDateString('vi-VN') : '-';
                    
                    const statusBadge = ay.isActive !== false 
                        ? '<span class="badge bg-success">Hoạt động</span>' 
                        : '<span class="badge bg-secondary">Khóa</span>';
                    document.getElementById('status').innerHTML = statusBadge;
                    
                    document.getElementById('content').style.display = 'block';
                } else {
                    document.getElementById('noData').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('noData').style.display = 'block';
                console.error('Error:', e);
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const tbody = document.getElementById('historyTable');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Chưa có dữ liệu</td></tr>';
                    return;
                }
                
                let html = '';
                data.forEach((ay, i) => {
                    const startDate = ay.startDate ? new Date(ay.startDate).toLocaleDateString('vi-VN') : '-';
                    const endDate = ay.endDate ? new Date(ay.endDate).toLocaleDateString('vi-VN') : '-';
                    const status = ay.isActive !== false 
                        ? '<span class="badge bg-success">Hoạt động</span>' 
                        : '<span class="badge bg-secondary">Khóa</span>';
                    
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td>${ay.code || '-'}</td>
                        <td>${ay.name || '-'}</td>
                        <td>${ay.year || '-'}</td>
                        <td>${startDate}</td>
                        <td>${endDate}</td>
                        <td>${status}</td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (e) {
                document.getElementById('historyTable').innerHTML = 
                    `<tr><td colspan="7" class="text-danger">Lỗi: ${e.message}</td></tr>`;
            }
        }

        loadActive();
        loadHistory();
    </script>
    </div>
</body>
</html>
