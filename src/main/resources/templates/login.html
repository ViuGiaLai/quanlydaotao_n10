<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Đăng nhập · Hệ thống Quản lý Đào tạo</title>
    
    <!-- Google Fonts + Font Awesome + Bootstrap 5 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden; /* Ngăn cuộn trang - KHÔNG còn khoảng trống dưới */
        }

        /* hiệu ứng nền động */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: shiftBackground 40s linear infinite;
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes shiftBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20%, -20%); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            transition: transform 0.3s ease;
            width: 100%;
            max-width: 460px;
            margin: 1rem;
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 2;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .card-header-custom {
            background: linear-gradient(120deg, #4f46e5, #7c3aed);
            padding: 2rem 1.5rem 1.8rem;
            text-align: center;
            color: white;
            border-bottom: none;
        }

        .brand-icon {
            font-size: 3.2rem;
            background: rgba(255,255,255,0.2);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon i {
            font-size: 3rem;
        }

        .login-title {
            font-weight: 700;
            font-size: 1.7rem;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }

        .login-sub {
            font-size: 0.85rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .card-body-custom {
            padding: 2rem 2rem 2.2rem;
        }

        .input-group-modern {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group-modern i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
            z-index: 10;
            transition: color 0.2s;
        }

        .input-group-modern input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 1rem;
            font-size: 0.95rem;
            transition: all 0.25s;
            background-color: #fafbfc;
            font-weight: 500;
        }

        .input-group-modern input:focus {
            outline: none;
            border-color: #7c3aed;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .input-group-modern input:focus + i {
            color: #7c3aed;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 1.5rem;
            font-size: 0.85rem;
        }

        .checkbox-custom {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #4b5563;
        }

        .checkbox-custom input {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: #7c3aed;
        }

        .forgot-link {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        .btn-login {
            background: linear-gradient(95deg, #4f46e5, #7c3aed);
            border: none;
            padding: 0.85rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 1rem;
            width: 100%;
            color: white;
            transition: all 0.25s;
            box-shadow: 0 5px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
            background: linear-gradient(95deg, #4338ca, #6d28d9);
        }

        .alert-custom {
            border-radius: 1rem;
            font-size: 0.85rem;
            padding: 0.7rem 1rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid;
            background: #fff;
        }

        .alert-danger-custom {
            border-left-color: #dc2626;
            background: #fef2f2;
            color: #991b1b;
        }

        .alert-success-custom {
            border-left-color: #10b981;
            background: #ecfdf5;
            color: #065f46;
        }

        .info-footer {
            text-align: center;
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 1.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid #edf2f7;
        }

        /* Ẩn thanh cuộn nhưng vẫn cho phép kéo nếu cần (tùy chọn) */
        body::-webkit-scrollbar {
            display: none;
        }
        
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 500px) {
            .card-body-custom {
                padding: 1.5rem;
            }
            .login-title {
                font-size: 1.4rem;
            }
            .brand-icon {
                width: 65px;
                height: 65px;
                line-height: 65px;
            }
            .brand-icon i {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="card-header-custom">
        <div class="brand-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <div class="login-title">Chào mừng trở lại</div>
        <div class="login-sub">Đăng nhập để quản lý đào tạo</div>
    </div>
    
    <div class="card-body-custom">
        <!-- thông báo lỗi / logout với class tùy chỉnh -->
        <div th:if="${param.error}" class="alert alert-danger-custom alert-custom" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i> Sai tên đăng nhập / email hoặc mật khẩu.
        </div>
        <div th:if="${param.logout}" class="alert alert-success-custom alert-custom" role="alert">
            <i class="fas fa-check-circle me-2"></i> Bạn đã đăng xuất thành công.
        </div>
        
        <form th:action="@{/login}" method="post">
            <div class="input-group-modern">
                <i class="fas fa-envelope"></i>
                <input type="text" id="username" name="username" placeholder="Tên đăng nhập hoặc email" 
                       autocomplete="username" required autofocus>
            </div>
            
            <div class="input-group-modern">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Mật khẩu" 
                       autocomplete="current-password" required>
            </div>
            
            <div class="form-options">
                <label class="checkbox-custom">
                    <input type="checkbox" name="remember-me"> Ghi nhớ đăng nhập
                </label>
                <a href="#" class="forgot-link">Quên mật khẩu?</a>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket me-2"></i> Đăng nhập
            </button>
        </form>
        
        <div class="info-footer">
            <i class="fas fa-shield-alt me-1"></i> Phiên đăng nhập bảo mật · Khu vực quản trị
            <div class="mt-1 small">
                <i class="far fa-clock"></i> JSESSIONID · Chỉ truy cập <code class="bg-light px-1 rounded">/admin</code>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        const inputs = document.querySelectorAll('.input-group-modern input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });
        });
    })();
</script>
</body>
</html>
