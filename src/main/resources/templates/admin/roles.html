<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Roles</title>

    <!-- CSS Modal thuần -->
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            transform: translateY(-30px);
            transition: transform 0.3s ease;
            width: 100%;
            max-width: 500px;
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='roles'"></th:block>

        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <i class="bi bi-shield-plus"></i> Thêm Vai Trò
                        </button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Danh Sách Vai Trò</h3>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped align-middle">
                                        <thead>
                                            <tr>
                                                <th>Mã Vai Trò</th>
                                                <th>Tên Vai Trò</th>
                                                <th>Mô Tả</th>
                                                <th>Hệ Thống</th>
                                                <th>Hành Động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="roleTable"></tbody>
                                    </table>
                                    <div id="rolePagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODAL -->
        <div class="modal fade" id="roleModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Thêm Vai Trò</h5>
                        <button type="button" class="btn-close" onclick="closeRoleModal()" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="roleForm">
                            <input type="hidden" id="roleId">
                            <div class="mb-3">
                                <label class="form-label">Mã Vai Trò</label>
                                <input type="text" class="form-control" id="roleCode" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tên Vai Trò</label>
                                <input type="text" class="form-control" id="roleName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mô Tả</label>
                                <textarea class="form-control" id="description" rows="3"></textarea>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="isSystem" checked>
                                <label class="form-check-label">Hệ Thống</label>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeRoleModal()">Hủy</button>
                        <button type="button" class="btn btn-primary" onclick="saveRole()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const API_URL = "/api/roles";
            const PAGE_SIZE = 10;

            let roleItems = [];
            let currentPage = 1;

            async function loadRoles() {
                try {
                    const res = await fetch(API_URL);
                    if (!res.ok) throw new Error(res.status);
                    roleItems = await res.json();
                    currentPage = 1;
                    renderTable();
                } catch (e) {
                    console.error(e);
                    const tbody = document.getElementById("roleTable");
                    if (tbody) tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Lỗi: ${e.message}</td></tr>`;
                }
            }

            function escapeHtml(str) {
                if (!str) return "";
                return String(str)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;");
            }

            function renderTable() {
                const start = (currentPage - 1) * PAGE_SIZE;
                const pageItems = roleItems.slice(start, start + PAGE_SIZE);
                let html = "";

                pageItems.forEach(r => {
                    html += `
                        <tr>
                            <td>${escapeHtml(r.roleCode || r.code || "")}</td>
                            <td>${escapeHtml(r.name || "")}</td>
                            <td>${escapeHtml(r.description || "")}</td>
                            <td><span class="badge ${r.isSystem ? 'text-bg-primary' : 'text-bg-secondary'}">${r.isSystem ? 'Hệ Thống' : 'Tùy Chỉnh'}</span></td>
                            <td>
                                <button class="btn btn-warning btn-sm me-1" onclick="editRole('${r.id}')"><i class="bi bi-pencil-square"></i></button>
                                <button class="btn btn-danger btn-sm" onclick="deleteRole('${r.id}')"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>`;
                });

                const tbody = document.getElementById("roleTable");
                if (tbody) tbody.innerHTML = html || `<tr><td colspan="5" class="text-center text-muted">Không có dữ liệu</td></tr>`;

                renderPagination();
            }

            function renderPagination() {
                const total = Math.ceil(roleItems.length / PAGE_SIZE);
                const pagi = document.getElementById("rolePagination");
                if (!pagi) return;
                if (total <= 1) {
                    pagi.innerHTML = "";
                    return;
                }
                let html = `<ul class="pagination">`;
                for (let i = 1; i <= total; i++) {
                    html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><button class="page-link" onclick="goToPage(${i})">${i}</button></li>`;
                }
                html += `</ul>`;
                pagi.innerHTML = html;
            }

            function goToPage(page) {
                currentPage = page;
                renderTable();
            }

            /* ================= MODAL ================= */
            function showModal() {
                const modal = document.getElementById('roleModal');
                if (modal) modal.classList.add('show');
                document.body.classList.add('modal-open');
            }

            function closeRoleModal() {
                const modal = document.getElementById('roleModal');
                if (modal) modal.classList.remove('show');
                document.body.classList.remove('modal-open');
            }

            function openAddModal() {
                const form = document.getElementById("roleForm");
                if (form) form.reset();

                const idField = document.getElementById("roleId");
                if (idField) idField.value = "";

                const isSystem = document.getElementById("isSystem");
                if (isSystem) isSystem.checked = true;

                const title = document.getElementById("modalTitle");
                if (title) title.innerText = "Thêm Vai Trò";

                showModal();
            }

            function editRole(id) {
                const r = roleItems.find(x => String(x.id) === String(id));
                if (!r) return;

                document.getElementById("roleId").value = r.id || "";
                document.getElementById("roleCode").value = r.roleCode || r.code || "";
                document.getElementById("roleName").value = r.name || "";
                document.getElementById("description").value = r.description || "";

                const isSystem = document.getElementById("isSystem");
                if (isSystem) isSystem.checked = !!r.isSystem;

                const title = document.getElementById("modalTitle");
                if (title) title.innerText = "Chỉnh Sửa Vai Trò";

                showModal();
            }

            async function saveRole() {
                const id = document.getElementById("roleId").value;
                const data = {
                    code: document.getElementById("roleCode").value,
                    name: document.getElementById("roleName").value,
                    description: document.getElementById("description").value,
                    isSystem: document.getElementById("isSystem").checked
                };

                const url = id ? `${API_URL}/${encodeURIComponent(id)}` : API_URL;
                const method = id ? "PUT" : "POST";

                try {
                    const res = await fetch(url, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });

                    if (!res.ok) throw new Error("Lưu thất bại");

                    closeRoleModal();
                    loadRoles();
                } catch (e) {
                    console.error(e);
                    alert("Lưu thất bại: " + e.message);
                }
            }

            async function deleteRole(id) {
                if (!confirm("Bạn có chắc muốn xóa vai trò này không?")) return;
                try {
                    const res = await fetch(`${API_URL}/${encodeURIComponent(id)}`, { method: "DELETE" });
                    if (res.ok) loadRoles();
                    else alert("Xóa thất bại!");
                } catch (e) {
                    alert("Xóa thất bại");
                }
            }

            /* ================= INIT ================= */
            document.addEventListener("DOMContentLoaded", () => {
                loadRoles();

                const modal = document.getElementById('roleModal');
                if (modal) {
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) closeRoleModal();
                    });
                }
            });
        </script>
    </th:block>
</body>

</html>
