<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản Lý Môn Học - Admin</title>
    <th:block th:with="activePage='subjects'"></th:block>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-book"></i> Quản Lý Môn Học</h2>
        </div>

        <!-- Form thêm/sửa -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Thêm/Sửa Môn Học</h5>
            </div>
            <div class="card-body">
                <form id="subjectForm">
                    <input type="hidden" id="subjectId">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">Mã Môn</label>
                            <input type="text" class="form-control" id="subjectCode" required placeholder="TOAN">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tên Môn</label>
                            <input type="text" class="form-control" id="subjectName" required placeholder="Toán học">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Số Tín Chỉ</label>
                            <input type="number" class="form-control" id="credits" value="3">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Khoa</label>
                            <select class="form-select" id="department">
                                <option value="">-- Chọn Khoa --</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-9">
                            <label class="form-label">Mô Tả</label>
                            <input type="text" class="form-control" id="description" placeholder="Mô tả môn học...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Hành Động</label>
                            <div>
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save"></i> Lưu
                                </button>
                                <button type="reset" class="btn btn-secondary">
                                    <i class="fas fa-undo"></i> Reset
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Danh sách -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-list"></i> Danh Sách Môn Học</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã Môn</th>
                            <th>Tên Môn</th>
                            <th>Tín Chỉ</th>
                            <th>Khoa</th>
                            <th>Mô Tả</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="subjectTable">
                        <tr><td colspan="7" class="text-center text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/subjects';
        const DEPT_API_URL = '/api/departments';

        // Load departments for select
        async function loadDepartments() {
            try {
                const res = await fetch(DEPT_API_URL + '/active');
                const data = await res.json();
                const select = document.getElementById("department");
                data.forEach(dept => {
                    const opt = document.createElement("option");
                    opt.value = dept.name;
                    opt.textContent = dept.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error("Load departments error:", e);
            }
        }

        // Load all
        async function loadSubjects() {
            try {
                const res = await fetch(API_URL + '/list');
                const data = await res.json();
                renderTable(data);
            } catch (e) {
                console.error("Load error:", e);
            }
        }

        // Render table
        function renderTable(data) {
            const tbody = document.getElementById("subjectTable");
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Chưa có dữ liệu</td></tr>';
                return;
            }
            
            let html = '';
            data.forEach((item, index) => {
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.subjectCode || '-'}</td>
                        <td>${item.subjectName || '-'}</td>
                        <td>${item.credits || '-'}</td>
                        <td>${item.department || '-'}</td>
                        <td>${item.description || '-'}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="editSubject('${item.id}')">
                                <i class="fas fa-edit"></i> Sửa
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteSubject('${item.id}')">
                                <i class="fas fa-trash"></i> Xóa
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Edit
        async function editSubject(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const item = await res.json();
                
                document.getElementById("subjectId").value = item.id;
                document.getElementById("subjectCode").value = item.subjectCode;
                document.getElementById("subjectName").value = item.subjectName;
                document.getElementById("credits").value = item.credits;
                document.getElementById("department").value = item.department || '';
                document.getElementById("description").value = item.description || '';
                
                // Scroll lên form
                document.getElementById("subjectForm").scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (e) {
                console.error("Edit error:", e);
            }
        }

        // Delete
        async function deleteSubject(id) {
            if (!confirm('Bạn có chắc muốn xóa?')) return;
            
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadSubjects();
            } catch (e) {
                console.error("Delete error:", e);
            }
        }

        // Save
        document.getElementById("subjectForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const id = document.getElementById("subjectId").value;
            const data = {
                subjectCode: document.getElementById("subjectCode").value,
                subjectName: document.getElementById("subjectName").value,
                credits: parseInt(document.getElementById("credits").value),
                department: document.getElementById("department").value,
                description: document.getElementById("description").value
            };
            
            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/${id}` : API_URL;
                
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                document.getElementById("subjectForm").reset();
                loadSubjects();
            } catch (e) {
                console.error("Save error:", e);
            }
        });

        // Init
        loadDepartments();
        loadSubjects();
    </script>
    </div>
</body>
</html>
