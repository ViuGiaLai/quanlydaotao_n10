<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Đào Tạo</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 250px;
            --header-height: 60px;
            --primary-color: #343a40;
            --accent-color: #007bff;
        }
        
        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: #f4f6f9;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            background-color: var(--primary-color);
            color: #fff;
            overflow-y: auto;
        }
        
        .sidebar .sidebar-header {
            padding: 20px;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid #4b545c;
            display: flex;
            align-items: center;
        }

        .sidebar .sidebar-header img {
            width: 33px;
            height: 33px;
            margin-right: 10px;
        }
        
        .sidebar .nav-link {
            padding: 12px 20px;
            font-size: 1.1em;
            display: block;
            color: #c2c7d0;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .sidebar .nav-link.active {
            background-color: var(--accent-color);
            color: #fff;
            border-radius: 4px;
            margin: 0 10px;
        }

        .sidebar .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        /* Content Styles */
        .main-container {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
        }
        
        .navbar {
            height: var(--header-height);
            background-color: #fff;
            border-bottom: 1px solid #dee2e6;
            padding: 0 20px;
        }

        .main-content {
            padding: 20px;
        }

        .main-footer {
            padding: 15px 20px;
            border-top: 1px solid #dee2e6;
            background: #fff;
            text-align: center;
            color: #6c757d;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                margin-left: -250px;
            }
            .sidebar.active {
                margin-left: 0;
            }
            .main-container {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div th:fragment="sidebar">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="https://adminlte.io/themes/v3/dist/img/AdminLTELogo.png" alt="Logo" class="brand-image img-circle elevation-3">
                <span class="brand-text font-weight-light">QUẢN LÝ ĐÀO TẠO</span>
            </div>

            <div class="nav flex-column">
                <a th:href="@{/admin/students}" class="nav-link" th:classappend="${activePage == 'students'} ? 'active' : ''">
                    <i class="nav-icon bi bi-person-fill"></i>
                    <span>Quản Lý Học Sinh</span>
                </a>
                <a th:href="@{/admin/exam-papers}" class="nav-link" th:classappend="${activePage == 'exam-papers'} ? 'active' : ''">
                    <i class="nav-icon bi bi-file-earmark-fill"></i>
                    <span>Quản Lý Đề Thi</span>
                </a>
                <a th:href="@{/admin/exam-types}" class="nav-link" th:classappend="${activePage == 'exam-types'} ? 'active' : ''">
                    <i class="nav-icon bi bi-calendar-check-fill"></i>
                    <span>Quản Lý Loại Kỳ Thi</span>
                </a>
                <a th:href="@{/admin/exams}" class="nav-link" th:classappend="${activePage == 'exams'} ? 'active' : ''">
                    <i class="nav-icon bi bi-calendar-check-fill"></i>
                    <span>Quản Lý Lịch Thi</span>
                </a>
                <a th:href="@{/admin/exam-rooms}" class="nav-link" th:classappend="${activePage == 'exam-rooms'} ? 'active' : ''">
                    <i class="nav-icon bi bi-building-fill"></i>
                    <span>Quản Lý Phòng Thi</span>
                </a>
                <a th:href="@{/admin/roles}" class="nav-link" th:classappend="${activePage == 'roles'} ? 'active' : ''">
                    <i class="nav-icon bi bi-person-rolodex"></i>
                    <span>Quản Lý Vai Trò</span>
                </a>
                <a th:href="@{/admin/users}" class="nav-link" th:classappend="${activePage == 'users'} ? 'active' : ''">
                    <i class="nav-icon bi bi-person-lines-fill"></i>
                    <span>Quản Lý Người Dùng</span>
                </a>
                <a th:href="@{/admin/permissions}" class="nav-link" th:classappend="${activePage == 'permissions'} ? 'active' : ''">
                    <i class="nav-icon bi bi-key-fill"></i>
                    <span>Quản Lý Quyền</span>
                </a>
                <a th:href="@{/admin/role-permissions}" class="nav-link" th:classappend="${activePage == 'role-permissions'} ? 'active' : ''">
                    <i class="nav-icon bi bi-person-plus"></i>
                    <span>Quản Lý Gán Quyền Vai Trò</span>
                </a>
                <a th:href="@{/admin/user-roles}" class="nav-link" th:classappend="${activePage == 'user-roles'} ? 'active' : ''">
                    <i class="nav-icon bi bi-person-lines-fill"></i>
                    <span>Quản Lý Gán Vai Trò Người Dùng</span>
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content Wrapper -->
    <div th:fragment="main-content">
        <div class="main-container">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-outline-secondary d-md-none">
                        <i class="bi bi-list"></i>
                    </button>
                    
                    <div class="ms-auto d-flex align-items-center">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
                                <img src="https://adminlte.io/themes/v3/dist/img/user2-160x160.jpg" class="rounded-circle me-2" width="30" height="30" alt="User">
                                <span class="d-none d-md-inline">Admin</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="main-content" id="page-content">
                <!-- Page content goes here -->
            </div>
            
            <footer class="main-footer">
                <strong>Copyright &copy; 2024 <a href="#">Quản Lý Đào Tạo</a>.</strong>
                All rights reserved.
            </footer>
        </div>
    </div>

    <!-- Modal fragment for child pages -->
    <div th:fragment="modal-container"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        $(document).ready(function () {
            $('#sidebarCollapse').on('click', function () {
                $('.sidebar').toggleClass('active');
            });
            
            // Auto-set active menu based on current URL
            var currentPath = window.location.pathname;
            $('.sidebar .nav-link').each(function() {
                var href = $(this).attr('href');
                if (href && currentPath.includes(href.replace('/admin/', ''))) {
                    $(this).addClass('active');
                }
            });
        });
    </script>

    </body>
</html>
