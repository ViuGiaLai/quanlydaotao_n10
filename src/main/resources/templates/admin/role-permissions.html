<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Role Permissions</title>
</head>
<body>
    <div th:replace="~{admin/layout :: sidebar}"></div>
    <div th:replace="~{admin/layout :: modal-container}"></div>
    <div th:replace="~{admin/layout :: main-content}">
        <div th:fragment="page-content" class="container-fluid">
            <div class="row mb-3">
                <div class="col-12 text-end">
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="bi bi-plus-lg"></i> Gán Quyền Mới
                    </button>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Danh Sách Gán Quyền Vai Trò</h3>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-striped align-middle mb-0">
                                    <thead>
                                        <tr>
                                            <th>Vai Trò</th>
                                            <th>Quyền</th>
                                            <th>Trạng Thái</th>
                                            <th>Hành Động</th>
                                        </tr>
                                    </thead>
                                    <tbody id="rolePermissionTable"></tbody>
                                </table>
                            </div>
                            <div class="p-3 border-top" id="rolePermissionPagination"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="rolePermissionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Gán Quyền Cho Vai Trò</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="rolePermissionForm">
                        <div class="mb-3">
                            <label for="roleId" class="form-label">Vai Trò</label>
                            <select class="form-select" id="roleId" required>
                                <option value="">-- Chọn Vai Trò --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="permissionId" class="form-label">Quyền</label>
                            <select class="form-select" id="permissionId" required>
                                <option value="">-- Chọn Quyền --</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveRolePermission()">L��u</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const ROLE_API_URL = "/api/roles/list";
    const PERMISSION_API_URL = "/api/permissions/list";
    const ROLE_PERMISSION_API_URL = "/api/role-permissions";
    const ROLE_PERMISSION_PAGE_SIZE = 10;
    let rolesList = [];
    let permissionsList = [];
    let rolePermissionItems = [];
    let rolePermissionCurrentPage = 1;

    const AdminPagination = {
        paginate: function(items, page, pageSize) {
            const start = (page - 1) * pageSize;
            return items.slice(start, start + pageSize);
        },
        render: function(elementId, totalItems, currentPage, pageSize, callback) {
            const totalPages = Math.ceil(totalItems / pageSize);
            if (totalPages <= 1) return;
            let html = '<nav><ul class="pagination mb-0">';
            for (let i = 1; i <= totalPages; i++) {
                html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '">';
                html += '<a class="page-link" href="#">' + i + '</a></li>';
            }
            html += '</ul></nav>';
            const container = document.getElementById(elementId);
            if (container) {
                container.innerHTML = html;
                container.querySelectorAll('.page-link').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        callback(parseInt(e.target.textContent));
                    });
                });
            }
        }
    };

    async function loadRolesAndPermissions() {
        try {
            const [rolesRes, permsRes] = await Promise.all([
                fetch(ROLE_API_URL),
                fetch(PERMISSION_API_URL)
            ]);
            rolesList = await rolesRes.json();
            permissionsList = await permsRes.json();
            populateSelects();
        } catch (error) {
            console.error("Load roles/permissions error:", error);
        }
    }

    function populateSelects() {
        const roleSelect = document.getElementById("roleId");
        const permSelect = document.getElementById("permissionId");
        if (!roleSelect || !permSelect) return;
        roleSelect.innerHTML = '<option value="">-- Chọn Vai Trò --</option>';
        permSelect.innerHTML = '<option value="">-- Chọn Quyền --</option>';
        rolesList.forEach(function(r) {
            roleSelect.innerHTML += '<option value="' + r.id + '">' + r.name + '</option>';
        });
        permissionsList.forEach(function(p) {
            permSelect.innerHTML += '<option value="' + p.id + '">' + p.name + '</option>';
        });
    }

    function getRoleName(roleId) {
        if (!roleId) return "";
        if (!Array.isArray(rolesList) || rolesList.length === 0) return String(roleId).substring(0, 8);
        const role = rolesList.find(function(r) { return String(r.id) === String(roleId); });
        return role ? role.name : String(roleId).substring(0, 8);
    }

    function getPermissionName(permId) {
        if (!permId) return "";
        if (!Array.isArray(permissionsList) || permissionsList.length === 0) return String(permId).substring(0, 8);
        const perm = permissionsList.find(function(p) { return String(p.id) === String(permId); });
        return perm ? perm.name : String(permId).substring(0, 8);
    }

    async function loadRolePermissions() {
        try {
            const res = await fetch(ROLE_PERMISSION_API_URL);
            const data = await res.json();
            rolePermissionItems = Array.isArray(data) ? data : [];
            rolePermissionCurrentPage = 1;
            if (rolesList.length === 0 || permissionsList.length === 0) {
                await loadRolesAndPermissions();
            }
            renderRolePermissionTable();
        } catch (error) {
            console.error("Load role permissions error:", error);
            alert("Không thể tải role permissions.");
        }
    }

    function renderRolePermissionTable() {
        const pageItems = AdminPagination.paginate(rolePermissionItems, rolePermissionCurrentPage, ROLE_PERMISSION_PAGE_SIZE);
        let html = "";
        pageItems.forEach(function(item) {
            html += '<tr>';
            html += '<td>' + getRoleName(item.roleId) + '</td>';
            html += '<td>' + getPermissionName(item.permissionId) + '</td>';
            html += '<td><span class="badge ' + (item.isActive ? 'bg-success' : 'bg-secondary') + '">' + (item.isActive ? 'Hoạt động' : 'Mặc định') + '</span></td>';
            html += '<td><button class="btn btn-danger btn-sm" onclick="deleteRolePermission(\'' + item.roleId + '\',\'' + item.permissionId + '\')"><i class="bi bi-trash"></i></button></td>';
            html += '</tr>';
        });
        document.getElementById("rolePermissionTable").innerHTML = html;
        AdminPagination.render("rolePermissionPagination", rolePermissionItems.length, rolePermissionCurrentPage, ROLE_PERMISSION_PAGE_SIZE, function(nextPage) {
            rolePermissionCurrentPage = nextPage;
            renderRolePermissionTable();
        });
    }

    function openAddModal() {
        document.getElementById("rolePermissionForm").reset();
        new bootstrap.Modal(document.getElementById("rolePermissionModal")).show();
    }

    async function saveRolePermission() {
        const roleId = document.getElementById("roleId").value.trim();
        const permissionId = document.getElementById("permissionId").value.trim();
        if (!roleId || !permissionId) {
            alert("Vui lòng chọn Vai Trò và Quyền.");
            return;
        }
        try {
            const res = await fetch(ROLE_PERMISSION_API_URL + "?roleId=" + encodeURIComponent(roleId) + "&permissionId=" + encodeURIComponent(permissionId), {
                method: "POST"
            });
            if (!res.ok) throw new Error("Save failed");
            bootstrap.Modal.getInstance(document.getElementById("rolePermissionModal")).hide();
            loadRolePermissions();
        } catch (error) {
            console.error("Save role permission error:", error);
            alert("Gán quyền thất bại.");
        }
    }

    async function deleteRolePermission(roleId, permissionId) {
        if (!confirm("Bạn có chắc muốn xóa gán quyền này?")) return;
        try {
            const res = await fetch(ROLE_PERMISSION_API_URL + "?roleId=" + encodeURIComponent(roleId) + "&permissionId=" + encodeURIComponent(permissionId), {
                method: "DELETE"
            });
            if (!res.ok) throw new Error("Delete failed");
            loadRolePermissions();
        } catch (error) {
            console.error("Delete role permission error:", error);
            alert("Xóa gán quyền thất bại.");
        }
    }

    document.addEventListener("DOMContentLoaded", async function() {
        await loadRolesAndPermissions();
        await loadRolePermissions();
    });
    </script>
</body>
</html>
