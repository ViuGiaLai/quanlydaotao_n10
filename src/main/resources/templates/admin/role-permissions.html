<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Role Permissions</title>
    
    <!-- CSS Modal -->
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.show {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            transform: translateY(-30px);
            transition: transform 0.3s ease;
            width: 100%;
            max-width: 500px;
        }
        
        .modal.show .modal-content {
            transform: translateY(0);
        }
        
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='role-permissions'"></th:block>

        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <i class="bi bi-plus-lg"></i> Gán Quyền Mới
                        </button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Danh Sách Gán Quyền Vai Trò</h3>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped align-middle">
                                        <thead>
                                            <tr>
                                                <th>Vai Trò</th>
                                                <th>Quyền</th>
                                                <th>Trạng Thái</th>
                                                <th>Hành Động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="rolePermissionTable"></tbody>
                                    </table>
                                </div>
                                <div id="rolePermissionPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODAL -->
        <div class="modal fade" id="rolePermissionModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Gán Quyền Cho Vai Trò</h5>
                        <button type="button" class="btn-close" onclick="closeRolePermissionModal()" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="rolePermissionForm">
                            <input type="hidden" id="rolePermissionId">
                            <div class="mb-3">
                                <label class="form-label">Vai Trò</label>
                                <select class="form-select" id="roleId" required>
                                    <option value="">-- Chọn Vai Trò --</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Quyền</label>
                                <select class="form-select" id="permissionId" required>
                                    <option value="">-- Chọn Quyền --</option>
                                </select>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rpIsActive" checked>
                                <label class="form-check-label">Kích hoạt</label>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="closeRolePermissionModal()">Hủy</button>
                        <button class="btn btn-primary" onclick="saveRolePermission()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const ROLE_API_URL = "/api/roles/list";
            const PERMISSION_API_URL = "/api/permissions/list";
            const ROLE_PERMISSION_API_URL = "/api/role-permissions";
            const PAGE_SIZE = 10;

            let rolesList = [];
            let permissionsList = [];
            let rolePermissionItems = [];
            let currentPage = 1;

            async function loadLookupData() {
                try {
                    const [rolesRes, permsRes] = await Promise.all([
                        fetch(ROLE_API_URL),
                        fetch(PERMISSION_API_URL)
                    ]);
                    rolesList = await rolesRes.json();
                    permissionsList = await permsRes.json();
                    populateSelects();
                } catch (e) {
                    console.error("Load lookup error:", e);
                }
            }

            function populateSelects() {
                const roleSelect = document.getElementById("roleId");
                const permSelect = document.getElementById("permissionId");

                if (roleSelect) {
                    roleSelect.innerHTML = `<option value="">-- Chọn Vai Trò --</option>`;
                    rolesList.forEach(r => {
                        roleSelect.innerHTML += `<option value="${r.id}">${r.name}</option>`;
                    });
                }
                if (permSelect) {
                    permSelect.innerHTML = `<option value="">-- Chọn Quyền --</option>`;
                    permissionsList.forEach(p => {
                        permSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                    });
                }
            }

            function getRoleName(id) {
                const r = rolesList.find(x => String(x.id) === String(id));
                return r ? r.name : "-";
            }

            function getPermissionName(id) {
                const p = permissionsList.find(x => String(x.id) === String(id));
                return p ? p.name : "-";
            }

            function escapeHtml(str) {
                if (!str) return "";
                return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]);
            }

            async function loadRolePermissions() {
                try {
                    const res = await fetch(ROLE_PERMISSION_API_URL);
                    if (!res.ok) throw new Error("API error");
                    rolePermissionItems = await res.json();
                    currentPage = 1;
                    renderTable();
                } catch (e) {
                    console.error(e);
                    document.getElementById("rolePermissionTable").innerHTML = 
                        `<tr><td colspan="4" class="text-center text-danger">Lỗi tải dữ liệu</td></tr>`;
                }
            }

            function renderTable() {
                const start = (currentPage - 1) * PAGE_SIZE;
                const pageItems = rolePermissionItems.slice(start, start + PAGE_SIZE);
                let html = "";

                pageItems.forEach(item => {
                    html += `
                        <tr>
                            <td>${escapeHtml(getRoleName(item.roleId))}</td>
                            <td>${escapeHtml(getPermissionName(item.permissionId))}</td>
                            <td><span class="badge ${item.isActive ? 'text-bg-success' : 'text-bg-danger'}">${item.isActive ? 'Hoạt động' : 'Vô hiệu'}</span></td>
                            <td>
                                <button class="btn btn-danger btn-sm" onclick="deleteRolePermission('${item.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                });

                document.getElementById("rolePermissionTable").innerHTML = html || 
                    `<tr><td colspan="4" class="text-center text-muted">Không có dữ liệu</td></tr>`;

                renderPagination();
            }

            function renderPagination() {
                // ... giữ nguyên code phân trang của bạn
                const totalPages = Math.ceil(rolePermissionItems.length / PAGE_SIZE);
                if (totalPages <= 1) {
                    document.getElementById("rolePermissionPagination").innerHTML = "";
                    return;
                }
                let html = `<ul class="pagination">`;
                for (let i = 1; i <= totalPages; i++) {
                    html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><button class="page-link" onclick="goToPage(${i})">${i}</button></li>`;
                }
                html += `</ul>`;
                document.getElementById("rolePermissionPagination").innerHTML = html;
            }

            function goToPage(page) {
                currentPage = page;
                renderTable();
            }

            //  MODAL 
            function showModal() {
                const modal = document.getElementById('rolePermissionModal');
                if (modal) {
                    modal.classList.add('show');
                    document.body.classList.add('modal-open');
                }
            }

            function closeRolePermissionModal() {
                const modal = document.getElementById('rolePermissionModal');
                if (modal) {
                    modal.classList.remove('show');
                    document.body.classList.remove('modal-open');
                }
            }

            function openAddModal() {
                const form = document.getElementById("rolePermissionForm");
                if (form) form.reset();
                
                document.getElementById("rolePermissionId").value = "";
                document.getElementById("rpIsActive").checked = true;
                showModal();
            }

            async function saveRolePermission() {
                const roleId = document.getElementById("roleId").value;
                const permissionId = document.getElementById("permissionId").value;

                if (!roleId || !permissionId) {
                    alert("Vui lòng chọn Vai Trò và Quyền");
                    return;
                }

                try {
                    const res = await fetch(
                        `${ROLE_PERMISSION_API_URL}?roleId=${roleId}&permissionId=${permissionId}`,
                        { method: "POST" }
                    );

                    if (!res.ok) throw new Error("Save failed");

                    closeRolePermissionModal();
                    loadRolePermissions();
                } catch (e) {
                    console.error(e);
                    alert("Gán quyền thất bại");
                }
            }

            async function deleteRolePermission(id) {
                if (!confirm("Bạn chắc chắn muốn xóa?")) return;
                try {
                    const res = await fetch(`${ROLE_PERMISSION_API_URL}/${id}`, { method: "DELETE" });
                    if (res.ok) loadRolePermissions();
                } catch (e) {
                    alert("Xóa thất bại");
                }
            }

            //  INIT 
            document.addEventListener("DOMContentLoaded", async () => {
                await loadLookupData();
                await loadRolePermissions();

                // Đóng modal khi click backdrop
                const modal = document.getElementById('rolePermissionModal');
                if (modal) {
                    modal.addEventListener('click', function(e) {
                        if (e.target === modal) closeRolePermissionModal();
                    });
                }
            });
        </script>
    </th:block>
</body>
</html>
