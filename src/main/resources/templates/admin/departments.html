<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản Lý Khoa - Admin</title>
    <th:block th:with="activePage='departments'"></th:block>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-building"></i> Quản Lý Khoa</h2>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Thêm/Sửa Khoa</h5>
            </div>
            <div class="card-body">
                <form id="form">
                    <input type="hidden" id="id">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">Mã Khoa <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="code" required placeholder="KTOAN">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tên Khoa <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" required placeholder="Khoa Toán">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Trưởng Khoa</label>
                            <input type="text" class="form-control" id="deanName" placeholder="TS. Nguyễn Văn A">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Điện Thoại</label>
                            <input type="text" class="form-control" id="phone" placeholder="0123456789">
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-4">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="khoa@example.edu.vn">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Vị Trí</label>
                            <input type="text" class="form-control" id="officeLocation" placeholder="Tầng 1, nhà A">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Mô Tả</label>
                            <input type="text" class="form-control" id="description" placeholder="Mô tả...">
                        </div>
                        <div class="col-md-1">
                            <label class="form-label">Hoạt Động</label>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="isActive" checked>
                            </div>
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-12">
                            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Lưu</button>
                            <button type="reset" class="btn btn-secondary"><i class="fas fa-undo"></i> Reset</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-list"></i> Danh Sách Khoa</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã Khoa</th>
                            <th>Tên Khoa</th>
                            <th>Trưởng Khoa</th>
                            <th>Điện Thoại</th>
                            <th>Email</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" class="text-center text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/departments';
        let items = [];

        async function load() {
            try {
                const res = await fetch(API_URL);
                items = await res.json();
                render();
            } catch (e) {
                document.getElementById("tableBody").innerHTML = `<tr><td colspan="8" class="text-danger">Lỗi: ${e.message}</td></tr>`;
            }
        }

        function render() {
            let html = items.length ? '' : '<tr><td colspan="8" class="text-muted">Chưa có dữ liệu</td></tr>';
            items.forEach((o, i) => {
                const status = o.isActive !== false ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Khóa</span>';
                html += `<tr>
                    <td>${i+1}</td>
                    <td>${o.code}</td>
                    <td>${o.name}</td>
                    <td>${o.deanName || '-'}</td>
                    <td>${o.phone || '-'}</td>
                    <td>${o.email || '-'}</td>
                    <td>${status}</td>
                    <td>
                        <button class="btn btn-primary btn-sm me-1" onclick="edit('${o.id}')">Sửa</button>
                        <button class="btn btn-danger btn-sm" onclick="del('${o.id}')">Xóa</button>
                    </td>
                </tr>`;
            });
            document.getElementById("tableBody").innerHTML = html;
        }

        async function edit(id) {
            const o = items.find(x => x.id === id);
            if (!o) return;
            document.getElementById("id").value = o.id;
            document.getElementById("code").value = o.code || '';
            document.getElementById("name").value = o.name || '';
            document.getElementById("deanName").value = o.deanName || '';
            document.getElementById("phone").value = o.phone || '';
            document.getElementById("email").value = o.email || '';
            document.getElementById("officeLocation").value = o.officeLocation || '';
            document.getElementById("description").value = o.description || '';
            document.getElementById("isActive").checked = o.isActive !== false;
        }

        async function del(id) {
            if (!confirm('Xóa?')) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            load();
        }

        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("id").value;
            const data = {
                code: document.getElementById("code").value,
                name: document.getElementById("name").value,
                deanName: document.getElementById("deanName").value,
                phone: document.getElementById("phone").value,
                email: document.getElementById("email").value,
                officeLocation: document.getElementById("officeLocation").value,
                description: document.getElementById("description").value,
                isActive: document.getElementById("isActive").checked
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;
            await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            document.getElementById("form").reset();
            document.getElementById("id").value = '';
            load();
        });

        load();
    </script>
    </div>
</body>
</html>
