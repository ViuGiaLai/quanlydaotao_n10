<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản Lý Điểm</title>
</head>

<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='exam-results'"></th:block>

        <div class="app-content">
            <div class="container-fluid">
                <!-- Action Button Row -->
                <div class="row mb-3">
                    <div class="col-6">
                        <h3 class="mb-0">Quản Lý Điểm</h3>
                    </div>
                    <div class="col-6 text-end">
                        <button class="btn btn-success me-2" id="openEditBtn" onclick="openEditSelected()" disabled>
                            <i class="bi bi-unlock"></i> Mở nhập
                        </button>
                        <button class="btn btn-warning me-2" id="lockEditBtn" onclick="lockEditSelected()" disabled>
                            <i class="bi bi-lock"></i> Khóa nhập
                        </button>
                        <button class="btn btn-primary me-2" id="approveBtn" onclick="approveSelected()" disabled>
                            <i class="bi bi-check-circle"></i> Duyệt
                        </button>
                        <button class="btn btn-info me-2" id="returnBtn" onclick="returnSelected()" disabled>
                            <i class="bi bi-arrow-return-left"></i> Trả lại
                        </button>
                        <button class="btn btn-success me-2" onclick="exportExcel()">
                            <i class="bi bi-file-earmark-excel"></i> Export Excel
                        </button>
                        <button class="btn btn-danger" onclick="exportPDF()">
                            <i class="bi bi-file-earmark-pdf"></i> Export PDF
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <label class="form-label">Lớp Học</label>
                                <select class="form-select" id="courseClassId" onchange="loadResults()">
                                    <option value="">-- Tất cả --</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Môn Học</label>
                                <select class="form-select" id="subjectId" onchange="loadResults()">
                                    <option value="">-- Tất cả --</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Trạng Thái</label>
                                <select class="form-select" id="filterStatus" onchange="loadResults()">
                                    <option value="">-- Tất cả --</option>
                                    <option value="true">Đã mở nhập</option>
                                    <option value="false">Đã khóa</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Tìm kiếm</label>
                                <input type="text" class="form-control" id="searchText" placeholder="Mã SV hoặc tên..." onkeyup="loadResults()">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Card -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">Danh Sách Điểm</h5>
                                <div>
                                    <span class="badge bg-warning me-2">Chuyên cần: 10%</span>
                                    <span class="badge bg-info me-2">Kiểm tra: 20%</span>
                                    <span class="badge bg-primary me-2">Giữa kỳ: 20%</span>
                                    <span class="badge bg-success">Cuối kỳ: 50%</span>
                                </div>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-bordered table-hover">
                                        <thead class="table-dark">
                                            <tr>
                                                <th rowspan="2" class="text-center align-middle">
                                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                                </th>
                                <th rowspan="2" class="text-center align-middle">Mã SV</th>
                                                <th rowspan="2" class="text-center align-middle">Họ Tên</th>
                                                <th rowspan="2" class="text-center align-middle">Môn Học</th>
                                                <th rowspan="2" class="text-center align-middle">Lớp</th>
                                                <th colspan="4" class="text-center">Điểm Thành Phần</th>
                                                <th rowspan="2" class="text-center align-middle">Tổng</th>
                                                <th rowspan="2" class="text-center align-middle">Cho Phép Nhập</th>
                                                <th rowspan="2" class="text-center align-middle">Trạng Thái</th>
                                                <th rowspan="2" class="text-center align-middle">Thao Tác</th>
                                            </tr>
                                            <tr>
                                                <th class="text-center">CC(10%)</th>
                                                <th class="text-center">KT(20%)</th>
                                                <th class="text-center">GK(20%)</th>
                                                <th class="text-center">CK(50%)</th>
                                            </tr>
                                        </thead>
                                        <tbody id="examResultTableBody">
                                            <!-- Data will be loaded here -->
                                        </tbody>
                                    </table>
                                </div>
                                <div id="examResultPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Special Edit (Complaints) -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Chỉnh Sửa Đặc Biệt (Khiếu Nại)</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editForm">
                            <input type="hidden" id="resultId">
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="form-label">Điểm Chuyên Cần (10%)</label>
                                    <input type="number" step="0.1" min="0" max="10" class="form-control" id="attendanceScore">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Điểm Kiểm Tra (20%)</label>
                                    <input type="number" step="0.1" min="0" max="10" class="form-control" id="testScore">
                                </div>
                            </div>
                            <div class="row mt-2">
                                <div class="col-md-6">
                                    <label class="form-label">Điểm Giữa Kỳ (20%)</label>
                                    <input type="number" step="0.1" min="0" max="10" class="form-control" id="midtermScore">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Điểm Cuối Kỳ (50%)</label>
                                    <input type="number" step="0.1" min="0" max="10" class="form-control" id="finalScore">
                                </div>
                            </div>
                            <div class="row mt-2">
                                <div class="col-md-12">
                                    <label class="form-label">Ghi Chú</label>
                                    <textarea class="form-control" id="adminNote" rows="2" placeholder="Lý do chỉnh sửa..."></textarea>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="button" class="btn btn-primary" onclick="saveSpecialEdit()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const API_URL = "/api/exam-results";
            const PAGE_SIZE = 15;
            let resultItems = [];
            let currentPage = 1;

            async function loadLookupData() {
                try {
                    const [classesRes, subjectsRes] = await Promise.all([
                        fetch("/api/course-classes/list"),
                        fetch("/api/subjects/list")
                    ]);
                    const classes = await classesRes.json();
                    const subjects = await subjectsRes.json();
                    
                    const classSelect = document.getElementById("courseClassId");
                    const subjectSelect = document.getElementById("subjectId");
                    
                    classes.forEach(c => {
                        classSelect.innerHTML += `<option value="${c.id}">${c.className || c.name}</option>`;
                    });
                    subjects.forEach(s => {
                        subjectSelect.innerHTML += `<option value="${s.id}">${s.subjectName || s.name}</option>`;
                    });
                } catch (e) {
                    console.error("Load lookup error:", e);
                }
            }

            async function loadResults() {
                try {
                    const courseClassId = document.getElementById("courseClassId").value;
                    const subjectId = document.getElementById("subjectId").value;
                    const filterStatus = document.getElementById("filterStatus").value;
                    const searchText = document.getElementById("searchText").value;
                    
                    let url = API_URL + "?";
                    if (courseClassId) url += "courseClassId=" + courseClassId + "&";
                    if (subjectId) url += "subjectId=" + subjectId + "&";
                    if (filterStatus) url += "isEditable=" + filterStatus + "&";
                    if (searchText) url += "search=" + encodeURIComponent(searchText) + "&";
                    
                    const res = await fetch(url);
                    if (!res.ok) throw new Error("API error: " + res.status);
                    const data = await res.json();
                    resultItems = Array.isArray(data) ? data : [];
                    currentPage = 1;
                    renderTable();
                } catch (e) {
                    console.error("Load error:", e);
                    document.getElementById("examResultTableBody").innerHTML = 
                        `<tr><td colspan="9" class="text-center text-danger">Lỗi: ${e.message}</td></tr>`;
                }
            }

            function renderTable() {
                const start = (currentPage - 1) * PAGE_SIZE;
                const pageItems = resultItems.slice(start, start + PAGE_SIZE);
                
                let html = "";
                if (pageItems.length === 0) {
                    html = `<tr><td colspan="9" class="text-center text-muted">Không có dữ liệu</td></tr>`;
                } else {
                    pageItems.forEach(r => {
                        html += `
                            <tr>
                                <td class="text-center">
                                    <input type="checkbox" class="result-checkbox" value="${r.id}" onchange="updateActionButtons()">
                                </td>
                                <td>${r.studentCode || '-'}</td>
                                <td>${r.studentName || '-'}</td>
                                <td class="text-center">${r.attendanceScore ?? '-'}</td>
                                <td class="text-center">${r.testScore ?? '-'}</td>
                                <td class="text-center">${r.midtermScore ?? '-'}</td>
                                <td class="text-center">${r.finalScore ?? '-'}</td>
                                <td class="text-center fw-bold">${r.totalScore ?? 0}</td>
                                <td class="text-center">${r.isEditable ? '<span class="badge bg-success">Mở</span>' : '<span class="badge bg-danger">Khóa</span>'}</td>
                                <td>${getStatusBadge(r.status)}</td>
                                <td>
                                    <button class="btn btn-success btn-sm me-1" onclick="toggleEditable('${r.id}', ${r.isEditable ? false : true})" 
                                            title="${r.isEditable ? 'Khóa nhập điểm' : 'Mở nhập điểm'}">
                                        <i class="bi ${r.isEditable ? 'bi-lock' : 'bi-unlock'}"></i>
                                    </button>
                                    <button class="btn btn-primary btn-sm me-1" onclick="approveScore('${r.id}')" 
                                            title="Duyệt điểm" ${r.status !== 'SUBMITTED' ? 'disabled' : ''}>
                                        <i class="bi bi-check-circle"></i>
                                    </button>
                                    <button class="btn btn-info btn-sm me-1" onclick="returnScore('${r.id}')" 
                                            title="Trả lại" ${r.status !== 'SUBMITTED' ? 'disabled' : ''}>
                                        <i class="bi bi-arrow-return-left"></i>
                                    </button>
                                    <button class="btn btn-secondary btn-sm" onclick="editResult('${r.id}')" title="Xem chi tiết">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }
                document.getElementById("examResultTableBody").innerHTML = html;
                renderPagination();
            }

            function renderPagination() {
                const totalPages = Math.ceil(resultItems.length / PAGE_SIZE);
                if (totalPages <= 1) {
                    document.getElementById("examResultPagination").innerHTML = "";
                    return;
                }
                
                let html = `<nav><ul class="pagination">`;
                html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <button class="page-link" onclick="goToPage(${currentPage - 1})">Trước</button>
                </li>`;
                
                for (let i = 1; i <= totalPages; i++) {
                    html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                        <button class="page-link" onclick="goToPage(${i})">${i}</button>
                    </li>`;
                }
                
                html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <button class="page-link" onclick="goToPage(${currentPage + 1})">Sau</button>
                </li></ul></nav>`;
                
                document.getElementById("examResultPagination").innerHTML = html;
            }

            function goToPage(page) {
                const totalPages = Math.ceil(resultItems.length / PAGE_SIZE);
                if (page < 1 || page > totalPages) return;
                currentPage = page;
                renderTable();
            }

            // Toggle isEditable - Mở/Khóa nhập điểm cho 1 record
            async function toggleEditable(id, isEditable) {
                const action = isEditable ? "mở" : "khóa";
                if (!confirm(`Bạn có chắc muốn ${action} nhập điểm cho sinh viên này?`)) return;
                
                try {
                    const res = await fetch(`${API_URL}/${encodeURIComponent(id)}/toggle-edit`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ isEditable: isEditable })
                    });
                    if (!res.ok) {
                        let message = `Toggle failed (${res.status})`;
                        const text = await res.text();
                        try {
                            const json = JSON.parse(text);
                            if (json?.message) message = json.message;
                        } catch (_err) {
                            if (text) message = text;
                        }
                        throw new Error(message);
                    }
                    loadResults();
                } catch (e) {
                    console.error("Toggle error:", e);
                    alert("Thất bại: " + e.message);
                }
            }

            // Mở nhập điểm hàng loạt
            async function openEditSelected() {
                const selected = getSelectedIds();
                if (selected.length === 0) {
                    alert("Vui lòng chọn điểm để mở nhập");
                    return;
                }
                if (!confirm(`Mở nhập điểm cho ${selected.length} sinh viên?`)) return;
                
                try {
                    const res = await fetch(`${API_URL}/toggle-edit-multiple`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ ids: selected, isEditable: true })
                    });
                    if (!res.ok) throw new Error("Mở nhập thất bại");
                    alert(`Đã mở nhập điểm cho ${selected.length} sinh viên!`);
                    loadResults();
                } catch (e) {
                    console.error("Open edit error:", e);
                    alert("Lỗi: " + e.message);
                }
            }

            // Khóa nhập điểm hàng loạt
            async function lockEditSelected() {
                const selected = getSelectedIds();
                if (selected.length === 0) {
                    alert("Vui lòng chọn điểm để khóa nhập");
                    return;
                }
                if (!confirm(`Khóa nhập điểm cho ${selected.length} sinh viên?`)) return;
                
                try {
                    const res = await fetch(`${API_URL}/toggle-edit-multiple`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ ids: selected, isEditable: false })
                    });
                    if (!res.ok) throw new Error("Khóa nhập thất bại");
                    alert(`Đã khóa nhập điểm cho ${selected.length} sinh viên!`);
                    loadResults();
                } catch (e) {
                    console.error("Lock edit error:", e);
                    alert("Lỗi: " + e.message);
                }
            }

            // Edit special - Chỉnh sửa đặc biệt
            function editResult(id) {
                const r = resultItems.find(item => item.id === id);
                if (!r) return;
                
                document.getElementById("resultId").value = id;
                document.getElementById("attendanceScore").value = r.attendanceScore || "";
                document.getElementById("testScore").value = r.testScore || "";
                document.getElementById("midtermScore").value = r.midtermScore || "";
                document.getElementById("finalScore").value = r.finalScore || "";
                document.getElementById("adminNote").value = "";
                
                var modalEl = document.getElementById('editModal');
                if (modalEl) {
                    var myModal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                    myModal.show();
                }
            }

            async function saveSpecialEdit() {
                const id = document.getElementById("resultId").value;
                if (!id) return;
                
                const data = {
                    attendanceScore: parseFloat(document.getElementById("attendanceScore").value) || null,
                    testScore: parseFloat(document.getElementById("testScore").value) || null,
                    midtermScore: parseFloat(document.getElementById("midtermScore").value) || null,
                    finalScore: parseFloat(document.getElementById("finalScore").value) || null,
                    adminNote: document.getElementById("adminNote").value
                };
                
                try {
                    const res = await fetch(`${API_URL}/${encodeURIComponent(id)}/admin-edit`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                    if (!res.ok) throw new Error("Save failed");
                    var modalEl = document.getElementById('editModal');
                if (modalEl) {
                    var myModal = bootstrap.Modal.getInstance(modalEl);
                    if (myModal) myModal.hide();
                }
                    loadResults();
                    alert("Lưu thành công!");
                } catch (e) {
                    console.error("Save error:", e);
                    alert("Lưu thất bại: " + e.message);
                }
            }

            // Export
            function exportExcel() {
                const courseClassId = document.getElementById("courseClassId").value;
                const subjectId = document.getElementById("subjectId").value;
                let url = API_URL + "/export?format=excel";
                if (courseClassId) url += "&courseClassId=" + courseClassId;
                if (subjectId) url += "&subjectId=" + subjectId;
                window.open(url, '_blank');
            }

            function exportPDF() {
                const courseClassId = document.getElementById("courseClassId").value;
                const subjectId = document.getElementById("subjectId").value;
                let url = API_URL + "/export?format=pdf";
                if (courseClassId) url += "&courseClassId=" + courseClassId;
                if (subjectId) url += "&subjectId=" + subjectId;
                window.open(url, '_blank');
            }

            // ========== Score Status Functions ==========
            
            // Duyệt 1 điểm
            async function approveScore(id) {
                if (!confirm("Duyệt điểm này? Sau khi duyệt, sinh viên sẽ xem được điểm.")) return;
                try {
                    const res = await fetch(`${API_URL}/${encodeURIComponent(id)}/approve`, { method: "POST" });
                    if (!res.ok) throw new Error("Duyệt thất bại");
                    alert("Đã duyệt điểm!");
                    loadResults();
                } catch (e) {
                    alert("Lỗi: " + e.message);
                }
            }
            
            // Trả lại 1 điểm
            async function returnScore(id) {
                if (!confirm("Trả lại điểm này? Giảng viên sẽ có thể sửa lại.")) return;
                try {
                    const res = await fetch(`${API_URL}/${encodeURIComponent(id)}/return`, { method: "POST" });
                    if (!res.ok) throw new Error("Trả lại thất bại");
                    alert("Đã trả lại điểm!");
                    loadResults();
                } catch (e) {
                    alert("Lỗi: " + e.message);
                }
            }
            
            // Duyệt nhiều điểm
            async function approveSelected() {
                const selected = getSelectedIds();
                if (selected.length === 0) {
                    alert("Vui lòng chọn điểm để duyệt");
                    return;
                }
                if (!confirm(`Duyệt ${selected.length} điểm?`)) return;
                try {
                    const res = await fetch(`${API_URL}/approve-multiple`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(selected)
                    });
                    if (!res.ok) throw new Error("Duyệt thất bại");
                    alert(`Đã duyệt ${selected.length} điểm!`);
                    loadResults();
                } catch (e) {
                    alert("Lỗi: " + e.message);
                }
            }
            
            // Trả lại nhiều điểm
            async function returnSelected() {
                const selected = getSelectedIds();
                if (selected.length === 0) {
                    alert("Vui lòng chọn điểm để trả lại");
                    return;
                }
                if (!confirm(`Trả lại ${selected.length} điểm?`)) return;
                try {
                    const res = await fetch(`${API_URL}/return-multiple`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(selected)
                    });
                    if (!res.ok) throw new Error("Trả lại thất bại");
                    alert(`Đã trả lại ${selected.length} điểm!`);
                    loadResults();
                } catch (e) {
                    alert("Lỗi: " + e.message);
                }
            }
            
            // Lấy danh sách ID được chọn
            function getSelectedIds() {
                const checkboxes = document.querySelectorAll('.result-checkbox:checked');
                return Array.from(checkboxes).map(cb => cb.value);
            }
            
            // Checkbox all
            function toggleSelectAll() {
                const selectAll = document.getElementById("selectAll");
                const checkboxes = document.querySelectorAll('.result-checkbox');
                checkboxes.forEach(cb => cb.checked = selectAll.checked);
                updateActionButtons();
            }
            
            // Cập nhật nút hành động
            function updateActionButtons() {
                const selected = getSelectedIds();
                const submittedItems = resultItems.filter(r => r.status === "SUBMITTED" && selected.includes(r.id));
                
                document.getElementById("approveBtn").disabled = submittedItems.length === 0;
                document.getElementById("returnBtn").disabled = submittedItems.length === 0;
                document.getElementById("openEditBtn").disabled = selected.length === 0;
                document.getElementById("lockEditBtn").disabled = selected.length === 0;
            }
            
            // Hiển thị badge trạng thái
            function getStatusBadge(status) {
                switch(status) {
                    case "DRAFT": return '<span class="badge bg-warning">Nháp</span>';
                    case "SUBMITTED": return '<span class="badge bg-info">Chờ duyệt</span>';
                    case "APPROVED": return '<span class="badge bg-success">Đã duyệt</span>';
                    case "REJECTED": return '<span class="badge bg-danger">Trả lại</span>';
                    default: return '<span class="badge bg-secondary">-</span>';
                }
            }

            document.addEventListener("DOMContentLoaded", async () => {
                await loadLookupData();
                await loadResults();
            });
        </script>
    </th:block>
</body>
</html>
