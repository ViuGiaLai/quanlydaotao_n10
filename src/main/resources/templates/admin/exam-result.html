<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Exam Result</title>
    <th:block layout:fragment="css"></th:block>
</head>
<body>
<th:block layout:fragment="active_page_setter">
    <th:block th:with="activePage='exam-result'"></th:block>
</th:block>

<div layout:fragment="content">
    <div class="app-content">
        <div class="container-fluid">
            <div class="row mb-3">
                <div class="col-12 text-end">
                    <button class="btn btn-primary" onclick="openResultModal()">
                        <i class="bi bi-plus-lg"></i> Thêm Kết Quả Thi
                    </button>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Danh Sách Kết Quả Thi</h3>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-striped align-middle mb-0">
                                    <thead>
                                    <tr>
                                        <th>Đăng Ký Thi</th>
                                        <th>Điểm</th>
                                        <th>Trạng Thái</th>
                                        <th>Khóa</th>
                                        <th>Kích Hoạt</th>
                                        <th>Hành Động</th>
                                    </tr>
                                    </thead>
                                    <tbody id="resultTableBody"></tbody>
                                </table>
                            </div>
                            <div class="p-3 border-top" id="resultPagination"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultModalTitle">Thêm Kết Quả Thi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="resultForm">
                        <input type="hidden" id="resultId">

                        <div class="mb-3">
                            <label for="registrationId" class="form-label">Đăng Ký Thi</label>
                            <select class="form-select" id="registrationId" required>
                                <option value="">-- Chọn Đăng Ký Thi --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="score" class="form-label">Điểm</label>
                            <input type="number" step="0.01" class="form-control" id="score" required>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">Trạng Thái</label>
                            <input type="text" class="form-control" id="status" required>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="isLocked">
                            <label class="form-check-label" for="isLocked">Khóa kết quả</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isActive" checked>
                            <label class="form-check-label" for="isActive">Kích hoạt</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveResult()">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script>
        const SELECTOR_SIDEBAR_WRAPPER = ".sidebar-wrapper";
        const Default = {
            scrollbarTheme: "os-theme-light",
            scrollbarAutoHide: "leave",
            scrollbarClickScroll: true
        };
        document.addEventListener("DOMContentLoaded", function () {
            const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
            if (sidebarWrapper && OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined) {
                OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
                    scrollbars: {
                        theme: Default.scrollbarTheme,
                        autoHide: Default.scrollbarAutoHide,
                        clickScroll: Default.scrollbarClickScroll
                    }
                });
            }
        });
    </script>

    <script>
        const REGISTRATION_API_URL = "/api/exam-registrations/list";
        const RESULT_API_URL = "/api/exam-results";
        const RESULT_PAGE_SIZE = 10;
        let registrationsList = [];
        let resultItems = [];
        let resultCurrentPage = 1;

        async function loadLookupData() {
            try {
                const res = await fetch(REGISTRATION_API_URL);
                registrationsList = await res.json();
                populateSelects();
            } catch (error) {
                console.error("Load lookup data error:", error);
            }
        }

        function populateSelects() {
            const regSelect = document.getElementById("registrationId");
            if (!regSelect) return;
            regSelect.innerHTML = '<option value="">-- Chọn Đăng Ký Thi --</option>';
            registrationsList.forEach(r => {
                regSelect.innerHTML += `<option value="${r.id}">${r.rollNumber || r.id}</option>`;
            });
        }

        function getRegistrationInfo(regId) {
            if (!regId) return "";
            if (!Array.isArray(registrationsList) || registrationsList.length === 0) return String(regId).substring(0, 8);
            const reg = registrationsList.find(r => String(r.id) === String(regId));
            return reg ? (reg.rollNumber || String(regId).substring(0, 8)) : String(regId).substring(0, 8);
        }

        async function loadResults() {
            try {
                const res = await fetch(RESULT_API_URL);
                const data = await res.json();
                resultItems = Array.isArray(data) ? data : [];
                resultCurrentPage = 1;
                if (registrationsList.length === 0) {
                    await loadLookupData();
                }
                renderResultTable();
            } catch (error) {
                console.error("Load results error:", error);
                alert("Không thể tải danh sách kết quả thi.");
            }
        }

        function renderResultTable() {
            const pageItems = AdminPagination.paginate(resultItems, resultCurrentPage, RESULT_PAGE_SIZE);
            let html = "";
            pageItems.forEach((result) => {
                    html += `
                        <tr>
                            <td>${getRegistrationInfo(result.registrationId)}</td>
                            <td>${result.score ?? ""}</td>
                            <td>${result.status || ""}</td>
                            <td>
                                <span class="badge ${result.isLocked ? "text-bg-warning" : "text-bg-secondary"}">
                                    ${result.isLocked ? "Đã khóa" : "Mở"}
                                </span>
                            </td>
                            <td>
                                <span class="badge ${result.isActive ? "text-bg-success" : "text-bg-danger"}">
                                    ${result.isActive ? "Hoạt động" : "Vô hiệu"}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick='editResult(${JSON.stringify(result)})'>
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteResult('${result.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            document.getElementById("resultTableBody").innerHTML = html;
            AdminPagination.render("resultPagination", resultItems.length, resultCurrentPage, RESULT_PAGE_SIZE, (nextPage) => {
                resultCurrentPage = nextPage;
                renderResultTable();
            });
        }

        function openResultModal() {
            document.getElementById("resultModalTitle").innerText = "Thêm Kết Quả Thi";
            document.getElementById("resultId").value = "";
            document.getElementById("resultForm").reset();
            document.getElementById("isActive").checked = true;
            document.getElementById("isLocked").checked = false;
            $("#resultModal").modal("show");
        }

        function editResult(result) {
            document.getElementById("resultModalTitle").innerText = "Sửa Kết Quả Thi";
            document.getElementById("resultId").value = result.id || "";
            document.getElementById("registrationId").value = result.registrationId || "";
            document.getElementById("score").value = result.score ?? "";
            document.getElementById("status").value = result.status || "";
            document.getElementById("isLocked").checked = !!result.isLocked;
            document.getElementById("isActive").checked = !!result.isActive;
            $("#resultModal").modal("show");
        }

        async function saveResult() {
            const id = document.getElementById("resultId").value;
            const payload = {
                registrationId: document.getElementById("registrationId").value.trim(),
                score: Number(document.getElementById("score").value),
                status: document.getElementById("status").value.trim(),
                isLocked: document.getElementById("isLocked").checked,
                isActive: document.getElementById("isActive").checked
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${RESULT_API_URL}/${id}` : RESULT_API_URL;

            try {
                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(errorText || "Save failed");
                }

                $("#resultModal").modal("hide");
                loadResults();
            } catch (error) {
                console.error("Save result error:", error);
                alert("Lưu kết quả thi thất bại.");
            }
        }

        async function deleteResult(id) {
            if (!confirm("Bạn có chắc muốn xóa kết quả này?")) {
                return;
            }
            try {
                const res = await fetch(`${RESULT_API_URL}/${id}`, { method: "DELETE" });
                if (!res.ok) {
                    throw new Error("Delete failed");
                }
                loadResults();
            } catch (error) {
                console.error("Delete result error:", error);
                alert("Xóa kết quả thi thất bại.");
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            await loadLookupData();
            await loadResults();
        });
    </script>
</th:block>
</body>
</html>
