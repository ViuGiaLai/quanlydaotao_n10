<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Students</title>
</head>
<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='students'"></th:block>
        
        <div class="app-content">
          <!--begin::Container-->
          <div class="container-fluid">
            <h3>Danh sách sinh viên</h3>

                <button class="btn btn-primary mb-3" onclick="openAddModal()">
                    <i class="fa fa-plus"></i> Thêm sinh viên
                </button>

                <table class="table table-bordered table-hover">
                    <thead class="thead-dark">
                    <tr>
                        <th>Code</th>
                        <th>Họ tên</th>
                        <th>Giới tính</th>
                        <th>Ngày sinh</th>
                        <th>Địa chỉ</th>
                        <th>Trạng thái</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
                <div id="studentPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
          </div>
          <!--end::Container-->
        </div>
        
    </div>

    <!-- Modal for Add/Edit -->
    <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Thêm Sinh Viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="studentForm">
                        <input type="hidden" id="studentId">
                        <div class="mb-3">
                            <label for="code" class="form-label">Mã Sinh Viên</label>
                            <input type="text" class="form-control" id="code" required>
                        </div>
                        <div class="mb-3">
                            <label for="fullname" class="form-label">Họ Tên</label>
                            <input type="text" class="form-control" id="fullname" required>
                        </div>
                        <div class="mb-3">
                            <label for="gender" class="form-label">Giới Tính</label>
                            <select class="form-control" id="gender">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="dateOfBirth" class="form-label">Ngày Sinh</label>
                            <input type="datetime-local" class="form-control" id="dateOfBirth">
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Địa Chỉ</label>
                            <input type="text" class="form-control" id="address">
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">Trạng Thái</label>
                            <input type="text" class="form-control" id="status">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="isActive" checked>
                                <label class="form-check-label" for="isActive">Kích hoạt</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveStudent()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
      const API_URL = "/api/students";
      const STUDENT_PAGE_SIZE = 10;
      let studentItems = [];
      let studentCurrentPage = 1;

      // Load data
      async function loadStudents() {
          try {
              console.log("Loading students from:", API_URL);
              const res = await fetch(API_URL);
              console.log("Response status:", res.status);
              if (!res.ok) throw new Error("API error: " + res.status);
              const data = await res.json();
              console.log("Data:", data);
              studentItems = Array.isArray(data) ? data : [];
              console.log("Items count:", studentItems.length);
              studentCurrentPage = 1;
              renderStudentTable();
          } catch (e) {
              console.error("Load error:", e);
              const tableBody = document.getElementById("studentTableBody");
              if (tableBody) {
                  tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-danger">Lỗi: ${e.message}</td></tr>`;
              }
          }
      }

      function renderStudentTable() {
          const pageItems = AdminPagination.paginate(studentItems, studentCurrentPage, STUDENT_PAGE_SIZE);
          let html = "";
          pageItems.forEach(s => {
              html += `
                  <tr>
                      <td>${s.code}</td>
                      <td>${s.fullname}</td>
                      <td>${s.gender}</td>
                      <td>${formatDate(s.date_of_birth)}</td>
                      <td>${s.address}</td>
                      <td>${s.status}</td>
                      <td>
                          <button class="btn btn-warning btn-sm" onclick='editStudent(${JSON.stringify(s)})'>
                              <i class="fa fa-edit"></i>
                          </button>
                          <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">
                              <i class="fa fa-trash"></i>
                          </button>
                      </td>
                  </tr>
              `;
          });

          document.getElementById("studentTable").innerHTML = html;
          AdminPagination.render("studentPagination", studentItems.length, studentCurrentPage, STUDENT_PAGE_SIZE, (nextPage) => {
              studentCurrentPage = nextPage;
              renderStudentTable();
          });
      }

      function formatDate(date) {
          return date ? new Date(date).toLocaleDateString() : "";
      }

      // Add
      function openAddModal() {
          var modalTitle = document.getElementById("modalTitle");
          if (modalTitle) modalTitle.innerText = "Thêm sinh viên";
          var studentIdEl = document.getElementById("studentId");
          if (studentIdEl) studentIdEl.value = "";
          var studentForm = document.getElementById("studentForm");
          if (studentForm) studentForm.reset();
          var isActiveEl = document.getElementById("isActive");
          if (isActiveEl) isActiveEl.checked = true;
          var modalEl = document.getElementById('studentModal');
          if (modalEl) {
              var myModal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
              myModal.show();
          }
      }

      // Edit
      function editStudent(s) {
          var modalTitle = document.getElementById("modalTitle");
          if (modalTitle) modalTitle.innerText = "Sửa sinh viên";
          var studentIdEl = document.getElementById("studentId");
          if (studentIdEl) studentIdEl.value = s.id;
          var codeEl = document.getElementById("code");
          if (codeEl) codeEl.value = s.code;
          var fullnameEl = document.getElementById("fullname");
          if (fullnameEl) fullnameEl.value = s.fullname;
          var genderEl = document.getElementById("gender");
          if (genderEl) genderEl.value = s.gender;
          var dobEl = document.getElementById("dateOfBirth");
          if (dobEl) dobEl.value = s.date_of_birth ? s.date_of_birth.slice(0, 16) : "";
          var addressEl = document.getElementById("address");
          if (addressEl) addressEl.value = s.address;
          var statusEl = document.getElementById("status");
          if (statusEl) statusEl.value = s.status || "";
          var isActiveEl = document.getElementById("isActive");
          if (isActiveEl) isActiveEl.checked = !!s.isActive;
          var modalEl = document.getElementById('studentModal');
          if (modalEl) {
              var myModal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
              myModal.show();
          }
      }

      // Save (Add + Update)
      async function saveStudent() {
          const id = document.getElementById("studentId").value;

          const student = {
              code: document.getElementById("code").value,
              fullname: document.getElementById("fullname").value,
              gender: document.getElementById("gender").value,
              date_of_birth: document.getElementById("dateOfBirth").value || null,
              address: document.getElementById("address").value,
              status: document.getElementById("status").value,
              isActive: document.getElementById("isActive").checked
          };

          if (id) {
              // UPDATE
              await fetch(API_URL + "/" + id, {
                  method: "PUT",
                  headers: {"Content-Type": "application/json"},
                  body: JSON.stringify(student)
              });
          } else {
              // CREATE
              await fetch(API_URL, {
                  method: "POST",
                  headers: {"Content-Type": "application/json"},
                  body: JSON.stringify(student)
              });
          }

          var modalEl = document.getElementById('studentModal');
                if (modalEl) {
                    var myModal = bootstrap.Modal.getInstance(modalEl);
                    if (myModal) myModal.hide();
                }
          loadStudents();
      }

      // Delete
      async function deleteStudent(id) {
          if (!confirm("Bạn có chắc muốn xóa?")) return;

          const res = await fetch(API_URL + "/" + id, {
              method: "DELETE"
          });

          if (!res.ok) {
              const err = await res.json();
              alert(err.message || "Xóa thất bại!");
              return;
          }

          loadStudents();
      }

      // Init
      loadStudents();
  </script>

    </th:block>
</body>
</html>
