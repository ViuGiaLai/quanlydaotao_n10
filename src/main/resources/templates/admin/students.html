<script>
      const API_URL = "/api/students";
      const STUDENT_PAGE_SIZE = 10;
      let studentItems = [];
      let studentCurrentPage = 1;

      // Load data
      async function loadStudents() {
          const res = await fetch(API_URL);
          const data = await res.json();
          studentItems = Array.isArray(data) ? data : [];
          studentCurrentPage = 1;
          renderStudentTable();
      }

      function renderStudentTable() {
          const pageItems = AdminPagination.paginate(studentItems, studentCurrentPage, STUDENT_PAGE_SIZE);
          let html = "";
          pageItems.forEach(s => {
              html += `
                  <tr>
                      <td>${s.code}</td>
                      <td>${s.fullname}</td>
                      <td>${s.gender}</td>
                      <td>${formatDate(s.date_of_birth)}</td>
                      <td>${s.address}</td>
                      <td>${s.status}</td>
                      <td>
                          <button class="btn btn-warning btn-sm" onclick='editStudent(${JSON.stringify(s)})'>
                              <i class="fa fa-edit"></i>
                          </button>
                          <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">
                              <i class="fa fa-trash"></i>
                          </button>
                      </td>
                  </tr>
              `;
          });

          document.getElementById("studentTable").innerHTML = html;
          AdminPagination.render("studentPagination", studentItems.length, studentCurrentPage, STUDENT_PAGE_SIZE, (nextPage) => {
              studentCurrentPage = nextPage;
              renderStudentTable();
          });
      }

      function formatDate(date) {
          return date ? new Date(date).toLocaleDateString() : "";
      }

      // Add
      function openAddModal() {
          document.getElementById("modalTitle").innerText = "Thêm sinh viên";
          document.getElementById("studentId").value = "";
          document.getElementById("studentForm").reset();
          document.getElementById("isActive").checked = true;
          $("#studentModal").modal("show");
      }

      // Edit
      function editStudent(s) {
          document.getElementById("modalTitle").innerText = "Sửa sinh viên";
          document.getElementById("studentId").value = s.id;
          document.getElementById("code").value = s.code;
          document.getElementById("fullname").value = s.fullname;
          document.getElementById("gender").value = s.gender;
          document.getElementById("dateOfBirth").value = s.date_of_birth ? s.date_of_birth.slice(0, 16) : "";
          document.getElementById("address").value = s.address;
          document.getElementById("status").value = s.status || "";
          document.getElementById("isActive").checked = !!s.isActive;

          $("#studentModal").modal("show");
      }

      // Save (Add + Update)
      async function saveStudent() {
          const id = document.getElementById("studentId").value;

          const student = {
              code: document.getElementById("code").value,
              fullname: document.getElementById("fullname").value,
              gender: document.getElementById("gender").value,
              date_of_birth: document.getElementById("dateOfBirth").value || null,
              address: document.getElementById("address").value,
              status: document.getElementById("status").value,
              isActive: document.getElementById("isActive").checked
          };

          if (id) {
              // UPDATE
              await fetch(API_URL + "/" + id, {
                  method: "PUT",
                  headers: {"Content-Type": "application/json"},
                  body: JSON.stringify(student)
              });
          } else {
              // CREATE
              await fetch(API_URL, {
                  method: "POST",
                  headers: {"Content-Type": "application/json"},
                  body: JSON.stringify(student)
              });
          }

          $("#studentModal").modal("hide");
          loadStudents();
      }

      // Delete
      async function deleteStudent(id) {
          if (!confirm("Bạn có chắc muốn xóa?")) return;

          const res = await fetch(API_URL + "/" + id, {
              method: "DELETE"
          });

          if (!res.ok) {
              const err = await res.json();
              alert(err.message || "Xóa thất bại!");
              return;
          }

          loadStudents();
      }

      // Init
      loadStudents();
  </script>
