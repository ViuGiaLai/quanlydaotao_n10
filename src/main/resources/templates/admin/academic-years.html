<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản Lý Niên Học - Admin</title>
    <th:block th:with="activePage='academic-years'"></th:block>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-calendar-alt"></i> Quản Lý Niên Học</h2>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Thêm/Sửa Niên Học</h5>
            </div>
            <div class="card-body">
                <form id="form">
                    <input type="hidden" id="id">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">Mã Niên Học <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="code" required placeholder="NH2026">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tên Niên Học <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" required placeholder="Năm học 2026-2027">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Năm <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="year" required value="2026">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Mô Tả</label>
                            <input type="text" class="form-control" id="description" placeholder="Mô tả">
                        </div>
                        <div class="col-md-1">
                            <label class="form-label">Hoạt Động</label>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="isActive" checked>
                            </div>
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-12">
                            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Lưu</button>
                            <button type="reset" class="btn btn-secondary"><i class="fas fa-undo"></i> Reset</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-list"></i> Danh Sách Niên Học</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã</th>
                            <th>Tên</th>
                            <th>Năm</th>
                            <th>Mô Tả</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="text-center text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/academic-years';
        let items = [];
        const PAGE_SIZE = 10;
        let currentPage = 1;

        async function load() {
            try {
                const res = await fetch(API_URL);
                items = await res.json();
                render();
            } catch (e) {
                document.getElementById("tableBody").innerHTML = `<tr><td colspan="7" class="text-danger">Lỗi: ${e.message}</td></tr>`;
            }
        }

        function render() {
            const start = (currentPage - 1) * PAGE_SIZE;
            const paged = items.slice(start, start + PAGE_SIZE);
            const totalPages = Math.ceil(items.length / PAGE_SIZE);
            
            let html = paged.length ? '' : '<tr><td colspan="7" class="text-muted">Chưa có dữ liệu</td></tr>';
            paged.forEach((o, i) => {
                const status = o.isActive !== false ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Khóa</span>';
                html += `<tr>
                    <td>${start + i + 1}</td>
                    <td>${o.code}</td>
                    <td>${o.name}</td>
                    <td>${o.year || '-'}</td>
                    <td>${o.description || '-'}</td>
                    <td>${status}</td>
                    <td>
                        <button class="btn btn-primary btn-sm me-1" onclick="edit('${o.id}')">Sửa</button>
                        <button class="btn btn-danger btn-sm" onclick="del('${o.id}')">Xóa</button>
                    </td>
                </tr>`;
            });
            
            // Pagination
            let pg = '';
            if (totalPages > 1) {
                pg = `<tr><td colspan="7" class="text-center">
                    <nav><ul class="pagination justify-content-center mb-0">`;
                for (let p = 1; p <= totalPages; p++) {
                    pg += `<li class="page-item ${p === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="goPage(${p});return false;">${p}</a></li>`;
                }
                pg += `</ul></nav></td></tr>`;
            }
            document.getElementById("tableBody").innerHTML = html + pg;
        }

        function goPage(p) {
            currentPage = p;
            render();
        }

        async function edit(id) {
            const o = items.find(x => x.id === id);
            if (!o) return;
            document.getElementById("id").value = o.id;
            document.getElementById("code").value = o.code || '';
            document.getElementById("name").value = o.name || '';
            document.getElementById("year").value = o.year || '';
            document.getElementById("description").value = o.description || '';
            document.getElementById("isActive").checked = o.isActive !== false;
            // Scroll lên form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function del(id) {
            if (!confirm('Xóa?')) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            load();
        }

        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("id").value;
            const data = {
                code: document.getElementById("code").value,
                name: document.getElementById("name").value,
                year: document.getElementById("year").value,
                description: document.getElementById("description").value,
                isActive: document.getElementById("isActive").checked
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;
            await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            document.getElementById("form").reset();
            document.getElementById("id").value = '';
            load();
        });

        load();
    </script>
    </div>
</body>
</html>
