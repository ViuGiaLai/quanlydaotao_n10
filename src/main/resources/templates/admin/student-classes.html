<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản Lý Lớp Sinh Viên - Admin</title>
    <th:block th:with="activePage='student-classes'"></th:block>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-users"></i> Quản Lý Lớp Sinh Viên</h2>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Thêm/Sửa Lớp Sinh Viên</h5>
            </div>
            <div class="card-body">
                <form id="studentClasseForm">
                    <input type="hidden" id="classeId">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">Mã Lớp <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="code" required placeholder="KST23I">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tên Lớp <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" required placeholder="Khoa ST23I">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Niên Học</label>
                            <select class="form-select" id="academicYearId">
                                <option value="">-- Chọn Niên Học --</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Khoa</label>
                            <select class="form-select" id="departmentId">
                                <option value="">-- Chọn Khoa --</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-3">
                            <label class="form-label">Ngành</label>
                            <select class="form-select" id="majorId">
                                <option value="">-- Chọn Ngành --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Chương Trình Đào Tạo</label>
                            <select class="form-select" id="trainingProgramId">
                                <option value="">-- Chọn CTĐT --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Cố Vấn</label>
                            <select class="form-select" id="employeeId">
                                <option value="">-- Chọn Giảng Viên --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Kích Hoạt</label>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="isActive" checked>
                                <label class="form-check-label" for="isActive">Hoạt động</label>
                            </div>
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-12">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Lưu
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-list"></i> Danh Sách Lớp Sinh Viên</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã Lớp</th>
                            <th>Tên Lớp</th>
                            <th>Niên Học</th>
                            <th>Khoa</th>
                            <th>Ngành</th>
                            <th>CTĐT</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="classeTable">
                        <tr><td colspan="9" class="text-center text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/student-classes';
        const ACADEMIC_URL = '/api/academic-years';
        const DEPT_URL = '/api/departments';
        const MAJOR_URL = '/api/majors';
        const TRAIN_URL = '/api/training-programs';
        const TEACHER_URL = '/api/teachers';
        
        let classeItems = [];
        let academicYears = [];
        let departments = [];
        let majors = [];
        let trainingPrograms = [];
        let teachers = [];

        async function loadAll() {
            try {
                const [r1, r2, r3, r4, r5, r6] = await Promise.all([
                    fetch(API_URL), fetch(ACADEMIC_URL), fetch(DEPT_URL),
                    fetch(MAJOR_URL), fetch(TRAIN_URL), fetch(TEACHER_URL)
                ]);
                classeItems = await r1.json();
                academicYears = await r2.json();
                departments = await r3.json();
                majors = await r4.json();
                trainingPrograms = await r5.json();
                teachers = await r6.json();
                
                renderDropdowns();
                renderTable();
            } catch (e) {
                console.error("Load error:", e);
                document.getElementById("classeTable").innerHTML = 
                    `<tr><td colspan="9" class="text-center text-danger">Lỗi: ${e.message}</td></tr>`;
            }
        }

        function renderDropdowns() {
            // Academic Years
            let html = '<option value="">-- Chọn Niên Học --</option>';
            academicYears.forEach(o => html += `<option value="${o.id}">${o.yearName}</option>`);
            document.getElementById("academicYearId").innerHTML = html;

            // Departments
            html = '<option value="">-- Chọn Khoa --</option>';
            departments.forEach(o => html += `<option value="${o.id}">${o.departmentName}</option>`);
            document.getElementById("departmentId").innerHTML = html;

            // Majors
            html = '<option value="">-- Chọn Ngành --</option>';
            majors.forEach(o => html += `<option value="${o.id}">${o.majorName}</option>`);
            document.getElementById("majorId").innerHTML = html;

            // Training Programs
            html = '<option value="">-- Chọn CTĐT --</option>';
            trainingPrograms.forEach(o => html += `<option value="${o.id}">${o.programName}</option>`);
            document.getElementById("trainingProgramId").innerHTML = html;

            // Teachers
            html = '<option value="">-- Chọn Giảng Viên --</option>';
            teachers.forEach(o => html += `<option value="${o.id}">${o.fullname}</option>`);
            document.getElementById("employeeId").innerHTML = html;
        }

        function renderTable() {
            const tbody = document.getElementById("classeTable");
            if (classeItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Chưa có dữ liệu</td></tr>';
                return;
            }
            
            let html = '';
            classeItems.forEach((c, index) => {
                const ac = academicYears.find(o => o.id === c.academicYearId);
                const dept = departments.find(o => o.id === c.departmentId);
                const major = majors.find(o => o.id === c.majorId);
                const train = trainingPrograms.find(o => o.id === c.trainingProgramId);
                const isActive = c.isActive !== false ? 
                    '<span class="badge bg-success">Hoạt động</span>' : 
                    '<span class="badge bg-secondary">Khóa</span>';
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${c.code || '-'}</td>
                        <td>${c.name || '-'}</td>
                        <td>${ac ? ac.yearName : '-'}</td>
                        <td>${dept ? dept.departmentName : '-'}</td>
                        <td>${major ? major.majorName : '-'}</td>
                        <td>${train ? train.programName : '-'}</td>
                        <td>${isActive}</td>
                        <td>
                            <button class="btn btn-primary btn-sm me-1" onclick="editClasse('${c.id}')">
                                <i class="fas fa-edit"></i> Sửa
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteClasse('${c.id}')">
                                <i class="fas fa-trash"></i> Xóa
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        async function editClasse(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const c = await res.json();
                
                document.getElementById("classeId").value = c.id;
                document.getElementById("code").value = c.code || '';
                document.getElementById("name").value = c.name || '';
                document.getElementById("academicYearId").value = c.academicYearId || '';
                document.getElementById("departmentId").value = c.departmentId || '';
                document.getElementById("majorId").value = c.majorId || '';
                document.getElementById("trainingProgramId").value = c.trainingProgramId || '';
                document.getElementById("employeeId").value = c.employeeId || '';
                document.getElementById("isActive").checked = c.isActive !== false;
                
                document.getElementById("studentClasseForm").scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                console.error("Edit error:", e);
            }
        }

        async function deleteClasse(id) {
            if (!confirm('Bạn có chắc muốn xóa?')) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadAll();
            } catch (e) {
                alert('Lỗi: ' + e.message);
            }
        }

        document.getElementById("studentClasseForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const id = document.getElementById("classeId").value;
            const data = {
                code: document.getElementById("code").value,
                name: document.getElementById("name").value,
                academicYearId: document.getElementById("academicYearId").value || null,
                departmentId: document.getElementById("departmentId").value || null,
                majorId: document.getElementById("majorId").value || null,
                trainingProgramId: document.getElementById("trainingProgramId").value || null,
                employeeId: document.getElementById("employeeId").value || null,
                isActive: document.getElementById("isActive").checked
            };
            
            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/${id}` : API_URL;
                
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!res.ok) {
                    const err = await res.text();
                    alert('Lỗi: ' + err);
                    return;
                }
                
                document.getElementById("studentClasseForm").reset();
                document.getElementById("classeId").value = '';
                loadAll();
                alert('Lưu thành công!');
            } catch (e) {
                alert('Lỗi: ' + e.message);
            }
        });

        loadAll();
    </script>
    </div>
</body>
</html>
