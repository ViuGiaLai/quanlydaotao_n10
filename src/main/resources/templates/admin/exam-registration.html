<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Exam Registrations</title>
</head>

<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='exam-registrations'"></th:block>

        <div class="app-content">
            <div class="container-fluid">

                <!-- Action -->
                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" onclick="openRegistrationModal()">
                            <i class="bi bi-plus-lg"></i> Thêm Đăng Ký Thi
                        </button>
                    </div>
                </div>

                <!-- Table -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Danh Sách Đăng Ký Thi</h3>
                            </div>

                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped align-middle">
                                        <thead>
                                            <tr>
                                                <th>Kỳ Thi</th>
                                                <th>Phòng Thi</th>
                                                <th>Sinh Viên</th>
                                                <th>Số Báo Danh</th>
                                                <th>Trạng thái</th>
                                                <th>Hành động</th>
                                            </tr>
                                        </thead>

                                        <tbody id="registrationTableBody"></tbody>
                                    </table>
                                </div>

                                <div id="registrationPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- MODAL -->
        <div class="modal fade" id="registrationModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Thêm Đăng Ký Thi</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <form id="registrationForm">
                            <input type="hidden" id="registrationId">

                            <div class="mb-3">
                                <label>Kỳ Thi</label>
                                <select class="form-select" id="examId" required>
                                    <option value="">-- Chọn Kỳ Thi --</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Phòng Thi</label>
                                <select class="form-select" id="examRoomId">
                                    <option value="">-- Chọn Phòng Thi --</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Sinh Viên</label>
                                <select class="form-select" id="studentId" required>
                                    <option value="">-- Chọn Sinh Viên --</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Số Báo Danh</label>
                                <input class="form-control" id="rollNumber" placeholder="Để trống sẽ tự động sinh">
                            </div>

                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="isActive" checked>
                                <label class="form-check-label">Kích hoạt</label>
                            </div>
                        </form>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button class="btn btn-primary" onclick="saveRegistration()">Lưu</button>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <th:block layout:fragment="script">
        <script>
            const API_URL = "/api/exam-registrations";
            const EXAM_API = "/api/exams";
            const ROOM_API = "/api/exam-rooms";
            const STUDENT_API = "/api/students";
            const PAGE_SIZE = 10;

            let registrationItems = [];
            let examItems = [];
            let roomItems = [];
            let studentItems = [];
            let currentPage = 1;

            /* ---------------- LOAD ---------------- */
            async function loadRegistrations() {
                try {
                    const res = await fetch(API_URL);
                    if (!res.ok) throw new Error("API error " + res.status);

                    const data = await res.json();
                    registrationItems = Array.isArray(data) ? data : [];

                    currentPage = 1;
                    renderTable();
                } catch (e) {
                    console.error("Load error:", e);
                }
            }

            async function loadExams() {
                try {
                    const res = await fetch(EXAM_API);
                    if (!res.ok) throw new Error("API error");
                    examItems = await res.json();
                } catch (e) {
                    console.error("Load exams error:", e);
                }
            }

            async function loadRooms() {
                try {
                    const res = await fetch(ROOM_API);
                    if (!res.ok) throw new Error("API error");
                    roomItems = await res.json();
                } catch (e) {
                    console.error("Load rooms error:", e);
                }
            }

            async function loadStudents() {
                try {
                    const res = await fetch(STUDENT_API);
                    if (!res.ok) throw new Error("API error");
                    studentItems = await res.json();
                } catch (e) {
                    console.error("Load students error:", e);
                }
            }

            function populateDropdowns() {
                // Populate exam dropdown
                const examSelect = document.getElementById("examId");
                examItems.forEach(e => {
                    examSelect.innerHTML += `<option value="${e.id}">${e.examName || e.name || e.id}</option>`;
                });

                // Populate room dropdown
                const roomSelect = document.getElementById("examRoomId");
                roomItems.forEach(r => {
                    roomSelect.innerHTML += `<option value="${r.id}">${r.examRoomName || r.roomName || r.name || r.id}</option>`;
                });

                // Populate student dropdown
                const studentSelect = document.getElementById("studentId");
                studentItems.forEach(s => {
                    studentSelect.innerHTML += `<option value="${s.id}">${s.code || s.studentCode} - ${s.fullName || s.name}</option>`;
                });
            }

            function getExamName(examId) {
                if (!examId) return "-";
                const exam = examItems.find(e => String(e.id) === String(examId));
                return exam ? (exam.name || exam.examName || examId) : examId;
            }

            function getRoomName(roomId) {
                if (!roomId) return "-";
                const room = roomItems.find(r => String(r.id) === String(roomId));
                return room ? (room.examRoomName || room.name || roomId) : roomId;
            }

            function getStudentName(studentId) {
                if (!studentId) return "-";
                const student = studentItems.find(s => String(s.id) === String(studentId));
                return student ? (student.name || student.fullname || student.code || studentId) : studentId;
            }

            /* ---------------- RENDER ---------------- */
            function renderTable() {
                const start = (currentPage - 1) * PAGE_SIZE;
                const pageItems = registrationItems.slice(start, start + PAGE_SIZE);

                let html = "";

                pageItems.forEach(r => {
                    html += `
        <tr>
            <td>${escapeHtml(r.examName || '-')}</td>
            <td>${escapeHtml(r.roomName || '-')}</td>
            <td>${escapeHtml(r.studentName || '-')} <small class="text-muted">(${r.studentCode || '-'})</small></td>
            <td>${escapeHtml(r.rollNumber || '-')}</td>
            <td>
                <span class="badge ${r.isActive ? 'text-bg-success' : 'text-bg-danger'}">
                    ${r.isActive ? 'Hoạt động' : 'Vô hiệu'}
                </span>
            </td>
            <td>
                <button class="btn btn-warning btn-sm"
                        onclick="editRegistration('${r.id}')">
                    <i class="bi bi-pencil-square"></i>
                </button>

                <button class="btn btn-danger btn-sm"
                        onclick="deleteRegistration('${r.id}')">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>`;
                });

                document.getElementById("registrationTableBody").innerHTML =
                    html || `<tr><td colspan="6" class="text-center">Không có dữ liệu</td></tr>`;

                renderPagination();
            }

            /* ---------------- PAGINATION ---------------- */
            function renderPagination() {
                const totalPages = Math.ceil(registrationItems.length / PAGE_SIZE);
                const div = document.getElementById("registrationPagination");

                if (!div) return;

                if (totalPages <= 1) {
                    div.innerHTML = "";
                    return;
                }

                let html = `<ul class="pagination pagination-sm">`;

                for (let i = 1; i <= totalPages; i++) {
                    html += `
        <li class="page-item ${i === currentPage ? 'active' : ''}">
            <button class="page-link" onclick="goToPage(${i})">${i}</button>
        </li>`;
                }

                html += `</ul>`;
                div.innerHTML = html;
            }

            function goToPage(p) {
                currentPage = p;
                renderTable();
            }

            /* ---------------- MODAL ---------------- */
            function openRegistrationModal() {
                document.getElementById("modalTitle").innerText = "Thêm Đăng Ký Thi";
                document.getElementById("registrationForm").reset();
                document.getElementById("registrationId").value = "";
                document.getElementById("isActive").checked = true;

                showModal();
            }

            async function editRegistration(id) {
                const item = registrationItems.find(x => x.id == id);
                if (!item) return;

                document.getElementById("modalTitle").innerText = "Chỉnh Sửa";
                document.getElementById("registrationId").value = item.id;
                document.getElementById("examId").value = item.examId || item.examId || "";
                document.getElementById("examRoomId").value = item.examRoomId || item.examRoomId || "";
                document.getElementById("studentId").value = item.studentId || item.studentId || "";
                document.getElementById("rollNumber").value = item.rollNumber || "";
                document.getElementById("isActive").checked = !!item.isActive;

                showModal();
            }

            function showModal() {
                const el = document.getElementById("registrationModal");
                if (!el) return;

                const modal = bootstrap.Modal.getOrCreateInstance(el);
                modal.show();
            }

            /* ---------------- SAVE ---------------- */
            async function saveRegistration() {
                const id = document.getElementById("registrationId").value;

                const body = {
                    examId: document.getElementById("examId").value,
                    examRoomId: document.getElementById("examRoomId").value,
                    studentId: document.getElementById("studentId").value,
                    rollNumber: document.getElementById("rollNumber").value,
                    isActive: document.getElementById("isActive").checked
                };

                const url = id ? `${API_URL}/${encodeURIComponent(id)}` : API_URL;
                const method = id ? "PUT" : "POST";

                try {
                    const res = await fetch(url, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body)
                    });

                    if (!res.ok) throw new Error("Save failed");

                    bootstrap.Modal.getInstance(
                        document.getElementById("registrationModal")
                    )?.hide();

                    loadRegistrations();

                } catch (e) {
                    alert(e.message);
                }
            }

            /* ---------------- DELETE ---------------- */
            async function deleteRegistration(id) {
                if (!confirm("Xóa đăng ký này?")) return;

                await fetch(`${API_URL}/${encodeURIComponent(id)}`, { method: "DELETE" });
                loadRegistrations();
            }

            /* ---------------- UTIL ---------------- */
            function escapeHtml(str) {
                if (!str) return "";
                return String(str)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;");
            }

            document.addEventListener("DOMContentLoaded", async () => {
                await Promise.all([loadExams(), loadRooms(), loadStudents()]);
                populateDropdowns();
                loadRegistrations();
            });
        </script>
    </th:block>

</body>

</html>
