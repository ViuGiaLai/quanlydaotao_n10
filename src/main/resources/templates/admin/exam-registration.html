<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Exam Registration</title>
    <th:block layout:fragment="css"></th:block>
</head>
<body>
<th:block layout:fragment="active_page_setter">
    <th:block th:with="activePage='exam-registration'"></th:block>
</th:block>

<div layout:fragment="content">
    <div class="app-content">
        <div class="container-fluid">
            <div class="row mb-3">
                <div class="col-12 text-end">
                    <button class="btn btn-primary" onclick="openRegistrationModal()">
                        <i class="bi bi-plus-lg"></i> Thêm Đăng Ký Thi
                    </button>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Danh Sách Đăng Ký Thi</h3>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-striped align-middle mb-0">
                                    <thead>
                                    <tr>
                                        <th>Kỳ Thi</th>
                                        <th>Phòng Thi</th>
                                        <th>Sinh Viên</th>
                                        <th>Số Báo Danh</th>
                                        <th>Trạng Thái</th>
                                        <th>Hành Động</th>
                                    </tr>
                                    </thead>
                                    <tbody id="registrationTableBody"></tbody>
                                </table>
                            </div>
                            <div class="p-3 border-top" id="registrationPagination"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registrationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registrationModalTitle">Thêm Đăng Ký Thi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="registrationForm">
                        <input type="hidden" id="registrationId">

                        <div class="mb-3">
                            <label for="examId" class="form-label">Kỳ Thi</label>
                            <select class="form-select" id="examId" required>
                                <option value="">-- Chọn Kỳ Thi --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="examRoomId" class="form-label">Phòng Thi</label>
                            <select class="form-select" id="examRoomId" required>
                                <option value="">-- Chọn Phòng Thi --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="studentId" class="form-label">Sinh Viên</label>
                            <select class="form-select" id="studentId" required>
                                <option value="">-- Chọn Sinh Viên --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="rollNumber" class="form-label">Số Báo Danh</label>
                            <input type="text" class="form-control" id="rollNumber" required>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isActive" checked>
                            <label class="form-check-label" for="isActive">Kích hoạt</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveRegistration()">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script>
        const SELECTOR_SIDEBAR_WRAPPER = ".sidebar-wrapper";
        const Default = {
            scrollbarTheme: "os-theme-light",
            scrollbarAutoHide: "leave",
            scrollbarClickScroll: true
        };
        document.addEventListener("DOMContentLoaded", function () {
            const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
            if (sidebarWrapper && OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined) {
                OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
                    scrollbars: {
                        theme: Default.scrollbarTheme,
                        autoHide: Default.scrollbarAutoHide,
                        clickScroll: Default.scrollbarClickScroll
                    }
                });
            }
        });
    </script>

    <script>
        const EXAM_API_URL = "/api/exams/list";
        const EXAM_ROOM_API_URL = "/api/exam-rooms/list";
        const STUDENT_API_URL = "/api/students/list";
        const REGISTRATION_API_URL = "/api/exam-registrations";
        const REGISTRATION_PAGE_SIZE = 10;
        let examsList = [];
        let examRoomsList = [];
        let studentsList = [];
        let registrationItems = [];
        let registrationCurrentPage = 1;

        async function loadLookupData() {
            try {
                const [examsRes, roomsRes, studentsRes] = await Promise.all([
                    fetch(EXAM_API_URL),
                    fetch(EXAM_ROOM_API_URL),
                    fetch(STUDENT_API_URL)
                ]);
                examsList = await examsRes.json();
                examRoomsList = await roomsRes.json();
                studentsList = await studentsRes.json();
                populateSelects();
            } catch (error) {
                console.error("Load lookup data error:", error);
            }
        }

        function populateSelects() {
            const examSelect = document.getElementById("examId");
            const roomSelect = document.getElementById("examRoomId");
            const studentSelect = document.getElementById("studentId");
            if (!examSelect || !roomSelect || !studentSelect) return;
            
            examSelect.innerHTML = '<option value="">-- Chọn Kỳ Thi --</option>';
            roomSelect.innerHTML = '<option value="">-- Chọn Phòng Thi --</option>';
            studentSelect.innerHTML = '<option value="">-- Chọn Sinh Viên --</option>';
            
            examsList.forEach(e => {
                examSelect.innerHTML += `<option value="${e.id}">${e.examName || e.name || e.id}</option>`;
            });
            examRoomsList.forEach(r => {
                roomSelect.innerHTML += `<option value="${r.id}">${r.roomName || r.name || r.id}</option>`;
            });
            studentsList.forEach(s => {
                studentSelect.innerHTML += `<option value="${s.id}">${s.fullName || s.name || s.code || s.id}</option>`;
            });
        }

        function getExamName(examId) {
            if (!examId) return "";
            if (!Array.isArray(examsList) || examsList.length === 0) return String(examId).substring(0, 8);
            const exam = examsList.find(e => String(e.id) === String(examId));
            return exam ? (exam.examName || exam.name || String(examId).substring(0, 8)) : String(examId).substring(0, 8);
        }

        function getExamRoomName(roomId) {
            if (!roomId) return "";
            if (!Array.isArray(examRoomsList) || examRoomsList.length === 0) return String(roomId).substring(0, 8);
            const room = examRoomsList.find(r => String(r.id) === String(roomId));
            return room ? (room.roomName || room.name || String(roomId).substring(0, 8)) : String(roomId).substring(0, 8);
        }

        function getStudentName(studentId) {
            if (!studentId) return "";
            if (!Array.isArray(studentsList) || studentsList.length === 0) return String(studentId).substring(0, 8);
            const student = studentsList.find(s => String(s.id) === String(studentId));
            return student ? (student.fullName || student.name || student.code || String(studentId).substring(0, 8)) : String(studentId).substring(0, 8);
        }

        async function loadRegistrations() {
            try {
                const res = await fetch(REGISTRATION_API_URL);
                if (!res.ok) throw new Error("Load failed");
                const data = await res.json();
                registrationItems = Array.isArray(data) ? data : [];
                registrationCurrentPage = 1;
                if (examsList.length === 0 || examRoomsList.length === 0 || studentsList.length === 0) {
                    await loadLookupData();
                }
                renderRegistrationTable();
            } catch (error) {
                console.error("Load registrations error:", error);
            }
        }

        function renderRegistrationTable() {
            const pageItems = AdminPagination.paginate(registrationItems, registrationCurrentPage, REGISTRATION_PAGE_SIZE);
            let html = "";
            pageItems.forEach((registration) => {
                    html += `
                        <tr>
                            <td>${getExamName(registration.examId)}</td>
                            <td>${getExamRoomName(registration.examRoomId)}</td>
                            <td>${getStudentName(registration.studentId)}</td>
                            <td>${registration.rollNumber || ""}</td>
                            <td>
                                <span class="badge ${registration.isActive ? "text-bg-success" : "text-bg-danger"}">
                                    ${registration.isActive ? "Hoạt động" : "Vô hiệu"}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick='editRegistration(${JSON.stringify(registration)})'>
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteRegistration('${registration.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            document.getElementById("registrationTableBody").innerHTML = html;
            AdminPagination.render("registrationPagination", registrationItems.length, registrationCurrentPage, REGISTRATION_PAGE_SIZE, (nextPage) => {
                registrationCurrentPage = nextPage;
                renderRegistrationTable();
            });
        }

        function openRegistrationModal() {
            document.getElementById("registrationModalTitle").innerText = "Thêm Đăng Ký Thi";
            document.getElementById("registrationId").value = "";
            document.getElementById("registrationForm").reset();
            document.getElementById("isActive").checked = true;
            $("#registrationModal").modal("show");
        }

        function editRegistration(registration) {
            document.getElementById("registrationModalTitle").innerText = "Sửa Đăng Ký Thi";
            document.getElementById("registrationId").value = registration.id || "";
            document.getElementById("examId").value = registration.examId || "";
            document.getElementById("examRoomId").value = registration.examRoomId || "";
            document.getElementById("studentId").value = registration.studentId || "";
            document.getElementById("rollNumber").value = registration.rollNumber || "";
            document.getElementById("isActive").checked = !!registration.isActive;
            $("#registrationModal").modal("show");
        }

        async function saveRegistration() {
            const id = document.getElementById("registrationId").value;
            const payload = {
                examId: document.getElementById("examId").value.trim(),
                examRoomId: document.getElementById("examRoomId").value.trim(),
                studentId: document.getElementById("studentId").value.trim(),
                rollNumber: document.getElementById("rollNumber").value.trim(),
                isActive: document.getElementById("isActive").checked
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${REGISTRATION_API_URL}/${id}` : REGISTRATION_API_URL;

            try {
                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    let errorMsg = "Lưu đăng ký thi thất bại.";
                    try {
                        const errorJson = JSON.parse(errorText);
                        errorMsg = errorJson.message || errorJson.error || errorJson.cause || errorText;
                    } catch (e) {
                        errorMsg = errorText;
                    }
                    alert("Lỗi: " + errorMsg);
                    throw new Error(errorText);
                }

                $("#registrationModal").modal("hide");
                loadRegistrations();
            } catch (error) {
                console.error("Save registration error:", error);
            }
        }

        async function deleteRegistration(id) {
            if (!confirm("Bạn có chắc muốn xóa đăng ký này?")) {
                return;
            }
            try {
                const res = await fetch(`${REGISTRATION_API_URL}/${id}`, { method: "DELETE" });
                if (!res.ok) throw new Error("Delete failed");
                loadRegistrations();
            } catch (error) {
                console.error("Delete registration error:", error);
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            await loadLookupData();
            await loadRegistrations();
        });
    </script>
</th:block>
</body>
</html>
