<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản Lý Lớp Học - Admin</title>
    <th:block th:with="activePage='course-classes'"></th:block>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-users"></i> Quản Lý Lớp Học</h2>
        </div>

        <!-- Form thêm/sửa -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Thêm/Sửa Lớp Học</h5>
            </div>
            <div class="card-body">
                <form id="courseClassForm">
                    <input type="hidden" id="courseClassId">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">Mã Lớp</label>
                            <input type="text" class="form-control" id="classCode" required placeholder="ST23I">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tên Lớp</label>
                            <input type="text" class="form-control" id="className" required placeholder="Lớp ST23I">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Học Kỳ</label>
                            <select class="form-select" id="semesterId" required>
                                <option value="">-- Chọn Học Kỳ --</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Số Tín Chỉ Tối Đa</label>
                            <input type="number" class="form-control" id="maxStudents" value="50">
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-12">
                            <label class="form-label">Mô Tả</label>
                            <input type="text" class="form-control" id="description" placeholder="Mô tả lớp học...">
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-12">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Lưu
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Danh sách -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-list"></i> Danh Sách Lớp Học</h5>
                <div class="col-md-3">
                    <select class="form-select" id="filterSemesterId" onchange="loadCourseClasses()">
                        <option value="">-- Tất cả Học Kỳ --</option>
                    </select>
                </div>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã Lớp</th>
                            <th>Tên Lớp</th>
                            <th>Học Kỳ</th>
                            <th>SV Tối Đa</th>
                            <th>SV Hiện Tại</th>
                            <th>Mô Tả</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="courseClassTable">
                        <tr><td colspan="8" class="text-center text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/course-classes';
        const API_SEMESTERS = '/api/semesters/list';

        let allSemesters = [];

        // Load semesters
        async function loadLookupData() {
            try {
                const res = await fetch(API_SEMESTERS);
                allSemesters = await res.json();
                
                const options = allSemesters.map(s => 
                    `<option value="${s.id}">${s.semesterName || s.name}</option>`
                ).join('');
                
                document.getElementById("semesterId").innerHTML = '<option value="">-- Chọn Học Kỳ --</option>' + options;
                document.getElementById("filterSemesterId").innerHTML = '<option value="">-- Tất cả Học Kỳ --</option>' + options;
            } catch (e) {
                console.error("Load lookup error:", e);
            }
        }

        // Load all
        async function loadCourseClasses() {
            try {
                const semesterId = document.getElementById("filterSemesterId").value;
                const url = semesterId ? `${API_URL}/list?semesterId=${semesterId}` : `${API_URL}/list`;
                const res = await fetch(url);
                const data = await res.json();
                renderTable(data);
            } catch (e) {
                console.error("Load error:", e);
            }
        }

        // Render table
        function renderTable(data) {
            const tbody = document.getElementById("courseClassTable");
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Chưa có dữ liệu</td></tr>';
                return;
            }
            
            let html = '';
            data.forEach((item, index) => {
                const semester = allSemesters.find(s => s.id === item.semesterId) || {};
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.classCode || '-'}</td>
                        <td>${item.className || '-'}</td>
                        <td>${semester.semesterName || '-'}</td>
                        <td>${item.maxStudents || '-'}</td>
                        <td>${item.currentStudents || 0}</td>
                        <td>${item.description || '-'}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="editCourseClass('${item.id}')">
                                <i class="fas fa-edit"></i> Sửa
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCourseClass('${item.id}')">
                                <i class="fas fa-trash"></i> Xóa
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Edit
        async function editCourseClass(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const item = await res.json();
                
                document.getElementById("courseClassId").value = item.id;
                document.getElementById("classCode").value = item.classCode;
                document.getElementById("className").value = item.className;
                document.getElementById("semesterId").value = item.semesterId || '';
                document.getElementById("maxStudents").value = item.maxStudents || 50;
                document.getElementById("description").value = item.description || '';
                
                // Scroll lên form
                document.getElementById("courseClassForm").scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (e) {
                console.error("Edit error:", e);
            }
        }

        // Delete
        async function deleteCourseClass(id) {
            if (!confirm('Bạn có chắc muốn xóa?')) return;
            
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadCourseClasses();
            } catch (e) {
                console.error("Delete error:", e);
            }
        }

        // Save
        document.getElementById("courseClassForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const id = document.getElementById("courseClassId").value;
            const data = {
                classCode: document.getElementById("classCode").value,
                className: document.getElementById("className").value,
                semesterId: document.getElementById("semesterId").value,
                maxStudents: parseInt(document.getElementById("maxStudents").value),
                description: document.getElementById("description").value
            };
            
            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/${id}` : API_URL;
                
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                document.getElementById("courseClassForm").reset();
                loadCourseClasses();
            } catch (e) {
                console.error("Save error:", e);
            }
        });

        // Init
        loadLookupData().then(loadCourseClasses);
    </script>
    </div>
</body>
</html>
