<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Permissions</title>
    
    <!-- CSS cho Modal thuần -->
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.show {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            transform: translateY(-30px);
            transition: transform 0.3s ease;
            width: 100%;
            max-width: 500px;
        }
        
        .modal.show .modal-content {
            transform: translateY(0);
        }
        
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='permissions'"></th:block>
        
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <i class="bi bi-plus-lg"></i> Thêm Quyền
                        </button>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Danh Sách Quyền</h3>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped align-middle">
                                        <thead>
                                            <tr>
                                                <th>Mã Quyền</th>
                                                <th>Tên Quyền</th>
                                                <th>Module</th>
                                                <th>Mô Tả</th>
                                                <th>Trạng Thái</th>
                                                <th>Hành Động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="permissionTable"></tbody>
                                    </table>
                                    <div id="permissionPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Add/Edit - Modal thuần CSS -->
        <div class="modal fade" id="permissionModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Thêm Quyền</h5>
                        <button type="button" class="btn-close" onclick="closePermissionModal()" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="permissionForm">
                            <input type="hidden" id="permissionId">
                            <div class="mb-3">
                                <label for="permissionCode" class="form-label">Mã Quyền</label>
                                <input type="text" class="form-control" id="permissionCode" required>
                            </div>
                            <div class="mb-3">
                                <label for="permissionName" class="form-label">Tên Quyền</label>
                                <input type="text" class="form-control" id="permissionName" required>
                            </div>
                            <div class="mb-3">
                                <label for="module" class="form-label">Module</label>
                                <input type="text" class="form-control" id="module">
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Mô Tả</label>
                                <textarea class="form-control" id="description" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="isActive" checked>
                                    <label class="form-check-label" for="isActive">Kích hoạt</label>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closePermissionModal()">Hủy</button>
                        <button type="button" class="btn btn-primary" onclick="savePermission()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const API_URL = "/api/permissions";
            const PAGE_SIZE = 10;
            let permissionItems = [];
            let currentPage = 1;

            async function loadPermissions() {
                try {
                    const res = await fetch(API_URL);
                    if (!res.ok) throw new Error("API error: " + res.status);
                    const data = await res.json();
                    permissionItems = Array.isArray(data) ? data : [];
                    currentPage = 1;
                    renderTable();
                } catch (e) {
                    console.error("Load error:", e);
                    const tableBody = document.getElementById("permissionTable");
                    if (tableBody) {
                        tableBody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Lỗi: ${e.message}</td></tr>`;
                    }
                }
            }

            function renderTable() {
                const pageItems = AdminPagination.paginate(permissionItems, currentPage, PAGE_SIZE);
                let html = "";
                pageItems.forEach(p => {
                    html += `
                        <tr>
                            <td>${escapeHtml(p.permissionCode || p.code || '')}</td>
                            <td>${escapeHtml(p.name || '')}</td>
                            <td>${escapeHtml(p.module || '')}</td>
                            <td>${escapeHtml(p.description || '')}</td>
                            <td><span class="badge ${p.isActive ? 'text-bg-success' : 'text-bg-danger'}">${p.isActive ? 'Hoạt động' : 'Vô hiệu'}</span></td>
                            <td>
                                <button class="btn btn-warning btn-sm me-1" onclick='editPermission(${JSON.stringify(p)})'>
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deletePermission('${p.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById("permissionTable").innerHTML = html;

                if (typeof AdminPagination !== 'undefined' && AdminPagination.render) {
                    AdminPagination.render("permissionPagination", permissionItems.length, currentPage, PAGE_SIZE, (nextPage) => {
                        currentPage = nextPage;
                        renderTable();
                    });
                }
            }

            function escapeHtml(str) {
                if (!str) return "";
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            //  MODAL FUNCTIONS 
            function showModal() {
                const modal = document.getElementById('permissionModal');
                modal.classList.add('show');
                document.body.classList.add('modal-open');
            }

            function closePermissionModal() {
                const modal = document.getElementById('permissionModal');
                modal.classList.remove('show');
                document.body.classList.remove('modal-open');
            }

            function openAddModal() {
                document.getElementById("modalTitle").innerText = "Thêm Quyền";
                document.getElementById("permissionId").value = "";
                document.getElementById("permissionForm").reset();
                document.getElementById("isActive").checked = true;
                showModal();
            }

            function editPermission(p) {
                document.getElementById("modalTitle").innerText = "Chỉnh Sửa Quyền";
                document.getElementById("permissionId").value = p.id || "";
                document.getElementById("permissionCode").value = p.permissionCode || p.code || "";
                document.getElementById("permissionName").value = p.name || "";
                document.getElementById("module").value = p.module || "";
                document.getElementById("description").value = p.description || "";
                document.getElementById("isActive").checked = !!p.isActive;
                showModal();
            }

            //  CRUD 
            async function savePermission() {
                const id = document.getElementById("permissionId").value;
                const permissionData = {
                    code: document.getElementById("permissionCode").value,
                    name: document.getElementById("permissionName").value,
                    module: document.getElementById("module").value,
                    description: document.getElementById("description").value,
                    isActive: document.getElementById("isActive").checked
                };

                const method = id ? "PUT" : "POST";
                const url = id ? `${API_URL}/${id}` : API_URL;

                try {
                    const res = await fetch(url, {
                        method: method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(permissionData)
                    });

                    if (!res.ok) {
                        const errorText = await res.text();
                        throw new Error(errorText || "Lưu thất bại");
                    }

                    closePermissionModal();
                    loadPermissions();
                } catch (error) {
                    console.error("Save error:", error);
                    alert("Lưu thất bại: " + error.message);
                }
            }

            async function deletePermission(id) {
                if (!confirm("Bạn có chắc chắn muốn xóa quyền này không?")) return;
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                    if (!res.ok) throw new Error("Xóa thất bại");
                    loadPermissions();
                } catch (error) {
                    console.error("Delete error:", error);
                    alert("Xóa thất bại!");
                }
            }

            //  INIT 
            document.addEventListener('DOMContentLoaded', () => {
                loadPermissions();

                // Đóng modal khi click vào backdrop
                const modal = document.getElementById('permissionModal');
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        closePermissionModal();
                    }
                });
            });
        </script>
    </th:block>
</body>
</html>
