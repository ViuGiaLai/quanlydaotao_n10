<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Users</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- CSS cho Modal thuần -->
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            transform: translateY(-30px);
            transition: transform 0.3s ease;
            width: 100%;
            max-width: 500px;
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='users'"></th:block>

        <div class="app-content">
            <div class="container-fluid">

                <!-- Import Excel -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-file-excel"></i> Import Excel Người Dùng (CSV/XLSX)</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <button class="btn btn-outline-primary" onclick="downloadNDTemplate()">
                                    <i class="fas fa-download"></i> Tải File Mẫu
                                </button>
                            </div>
                            <div class="col-md-3">
                                <input type="file" class="form-control" id="ndExcelFile" accept=".xlsx,.xls,.csv">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-warning" onclick="previewNDExcel()">Xem Trước</button>
                                <button class="btn btn-success" onclick="importNDExcel()">Import</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Preview -->
                <div class="card mb-3" id="ndPreviewCard" style="display:none;">
                    <div class="card-body">
                        <table class="table table-bordered">
                            <thead><tr><th>STT</th><th>Username</th><th>Email</th><th>Vai trò</th><th>Trạng Thái</th></tr></thead>
                            <tbody id="ndPreviewBody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="openAddModal()">
                                <i class="bi bi-person-plus"></i> Thêm
                            </button>
                            <button class="btn btn-info" onclick="exportUserExcel()">
                                <i class="fas fa-download"></i> Export
                            </button>
                            <button class="btn btn-success" onclick="toggleImportSection()">
                                <i class="fas fa-upload"></i> Import
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Import Section (collapsible) -->
                <div class="card mb-3" id="importSection" style="display:none;">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-file-excel"></i> Import Excel (CSV/XLSX)</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <button class="btn btn-outline-primary" onclick="downloadNDTemplate()">
                                    <i class="fas fa-file-download"></i> Tải File Mẫu
                                </button>
                            </div>
                            <div class="col-md-4">
                                <input type="file" class="form-control" id="ndExcelFile" accept=".xlsx,.xls,.csv">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-warning" onclick="previewNDExcel()">Xem Trước</button>
                                <button class="btn btn-success" onclick="importNDExcel()">Import</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Import Log -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-history"></i> Lịch Sử Import</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-sm table-bordered">
                            <thead><tr><th>STT</th><th>File</th><th>Ngày</th><th>Tổng</th><th>OK</th><th>Lỗi</th><th>Người import</th><th></th></tr></thead>
                            <tbody id="userImportLogTable"></tbody>
                        </table>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Danh Sách Người Dùng</h3>
                            </div>

                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped align-middle">
                                        <thead>
                                            <tr>
                                                <th>Username</th>
                                                <th>Email</th>
                                                <th>Điện Thoại</th>
                                                <th>Trạng Thái</th>
                                                <th>Hành Động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="userTable"></tbody>
                                    </table>

                                    <div id="userPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!--  MODAL  -->
        <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="userModalTitle">Thêm Người Dùng</h5>
                        <button type="button" class="btn-close" onclick="closeUserModal()" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <form id="userForm">
                            <input type="hidden" id="userId">

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Điện Thoại</label>
                                <input type="text" class="form-control" id="phone">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Avatar URL</label>
                                <input type="text" class="form-control" id="avatarUrl">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mật Khẩu</label>
                                <input type="password" class="form-control" id="password">
                            </div>
                        </form>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeUserModal()">Hủy</button>
                        <button type="button" class="btn btn-primary" onclick="saveUser()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const API_URL = "/api/users";
            const PAGE_SIZE = 10;

            let userItems = [];
            let currentPage = 1;
            let ndPreviewData = [];

            function toggleImportSection() {
                const section = document.getElementById('importSection');
                section.style.display = section.style.display === 'none' ? 'block' : 'none';
            }

            function exportUserExcel() {
                if (userItems.length === 0) { alert('Không có dữ liệu'); return; }
                const data = userItems.map((u, i) => ({
                    STT: i + 1, Username: u.username, Email: u.email,
                    Phone: u.phone, IsActive: u.isActive
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Users');
                XLSX.writeFile(wb, 'users_export.xlsx');
            }

            function downloadNDTemplate() {
                const headers = ['STT', 'Username', 'Email', 'VaiTro', 'TrangThai'];
                const sample = [['1', 'user001', 'user001@edu.vn', 'ROLE_STUDENT', 'true']];
                let csv = headers.join(',') + '\n';
                sample.forEach(r => csv += r.join(',') + '\n');
                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'mau_import_nguoidung.csv';
                link.click();
            }

            async function previewNDExcel() {
                const fileInput = document.getElementById('ndExcelFile');
                if (!fileInput.files[0]) { alert('Chọn file'); return; }
                try {
                    const data = await readNDFile(fileInput.files[0]);
                    ndPreviewData = validateNDData(data);
                    renderNDPreview();
                } catch (e) { alert('Lỗi: ' + e.message); }
            }

            async function readNDFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    const fileName = file.name.toLowerCase();
                    reader.onload = (e) => {
                        try {
                            if (fileName.endsWith('.csv')) {
                                const text = e.target.result;
                                const lines = text.split('\n').filter(l => l.trim());
                                const data = lines.map(line => {
                                    const result = [];
                                    let current = '';
                                    let inQuotes = false;
                                    for (let i = 0; i < line.length; i++) {
                                        const char = line[i];
                                        if (char === '"') { inQuotes = !inQuotes; }
                                        else if (char === ',' && !inQuotes) {
                                            result.push(current.trim());
                                            current = '';
                                        } else { current += char; }
                                    }
                                    result.push(current.trim());
                                    return result;
                                });
                                resolve(data);
                            } else {
                                const wb = XLSX.read(e.target.result, { type: 'array' });
                                const sheet = wb.Sheets[wb.SheetNames[0]];
                                resolve(XLSX.utils.sheet_to_json(sheet, { header: 1 }));
                            }
                        } catch (err) { reject(err); }
                    };
                    reader.onerror = reject;
                    if (fileName.endsWith('.csv')) {
                        reader.readAsText(file, 'UTF-8');
                    } else {
                        reader.readAsArrayBuffer(file);
                    }
                });
            }

            function validateNDData(data) {
                return data.slice(1).filter(r => r && r.length >= 2).map(r => ({
                    stt: r[0], username: r[1], email: r[2], vaiTro: r[3],
                    trangThai: r[4],
                    isValid: !!r[1] && !!r[2], errorMsg: !r[1] ? 'Thiếu username' : ''
                }));
            }

            function renderNDPreview() {
                const tbody = document.getElementById('ndPreviewBody');
                document.getElementById('ndPreviewCard').style.display = 'block';
                let html = '';
                ndPreviewData.forEach((d, i) => {
                    html += `<tr class="${d.isValid?'table-success':'table-danger'}">
                        <td>${i+1}</td><td>${d.username||''}</td><td>${d.email||''}</td>
                        <td>${d.vaiTro||''}</td><td>${d.trangThai||''}</td></tr>`;
                });
                tbody.innerHTML = html;
            }

            async function importNDExcel() {
                const validRows = ndPreviewData.filter(d => d.isValid);
                const errorRows = ndPreviewData.filter(d => !d.isValid);
                if (validRows.length === 0 && errorRows.length === 0) { alert('Không có dữ liệu'); return; }
                if (!confirm(`Import ${validRows.length} người dùng?`)) return;
                try {
                    const res = await fetch(API_URL + '/import', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(validRows)
                    });
                    if (res.ok) {
                        // Save import log
                        const logData = {
                            module: 'users',
                            filename: document.getElementById('ndExcelFile').value.split('\\').pop(),
                            totalRows: ndPreviewData.length,
                            successRows: validRows.length,
                            errorRows: errorRows.length,
                            importedBy: 'admin',
                            errorDetails: JSON.stringify(errorRows)
                        };
                        await fetch('/api/import-logs', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(logData)
                        });
                        
                        if (errorRows.length > 0) {
                            if (confirm(`Import thành công! Có ${errorRows.length} dòng lỗi. Tải file lỗi?`)) {
                                exportUserErrorRows(errorRows, 'users_loi');
                            }
                        } else {
                            alert('Import thành công!');
                        }
                        document.getElementById('ndPreviewCard').style.display = 'none';
                        loadUsers();
                        loadUserImportLog();
                    } else { alert('Lỗi: ' + await res.text()); }
                } catch (e) { alert('Lỗi: ' + e.message); }
            }

            function exportUserErrorRows(errors, filename) {
                const data = errors.map(e => ({
                    STT: e.stt, Username: e.username, Email: e.email,
                    VaiTro: e.vaiTro, TrangThai: e.trangThai, Loi: e.errorMsg
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Loi');
                XLSX.writeFile(wb, filename + '.xlsx');
            }

            async function loadUserImportLog() {
                try {
                    const res = await fetch('/api/import-logs/users');
                    const logs = await res.json();
                    let html = '';
                    logs.forEach((l, i) => {
                        const date = l.importedAt ? new Date(l.importedAt).toLocaleString('vi-VN') : '';
                        html += `<tr>
                            <td>${i+1}</td><td>${l.filename||''}</td><td>${date}</td>
                            <td>${l.totalRows||0}</td><td class="text-success">${l.successRows||0}</td>
                            <td class="text-danger">${l.errorRows||0}</td><td>${l.importedBy||''}</td>
                            <td>${l.errorRows > 0 ? `<button class="btn btn-sm btn-outline-danger" onclick="downloadUserErrorLog('${l.id}')"><i class="fas fa-download"></i></button>` : ''}</td>
                        </tr>`;
                    });
                    document.getElementById('userImportLogTable').innerHTML = html || '<tr><td colspan="8" class="text-muted">Chưa có lịch sử import</td></tr>';
                } catch (e) { console.error(e); }
            }

            async function downloadUserErrorLog(id) {
                try {
                    const res = await fetch('/api/import-logs/' + id);
                    const log = await res.json();
                    if (log.errorDetails) {
                        const errors = JSON.parse(log.errorDetails);
                        exportUserErrorRows(errors, 'users_loi_' + log.id);
                    }
                } catch (e) { alert('Lỗi: ' + e.message); }
            }

            async function loadUsers() {
                try {
                    const res = await fetch(API_URL);
                    if (!res.ok) throw new Error("API error: " + res.status);

                    userItems = await res.json();
                    currentPage = 1;
                    renderTable();
                } catch (e) {
                    console.error(e);
                    const tbody = document.getElementById("userTable");
                    if (tbody) tbody.innerHTML = `<tr><td colspan="5" class="text-danger text-center">Lỗi: ${e.message}</td></tr>`;
                }
            }

            function escapeHtml(str) {
                if (!str) return "";
                return String(str)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function renderTable() {
                const pageItems = AdminPagination.paginate(userItems, currentPage, PAGE_SIZE);
                let html = "";

                pageItems.forEach(u => {
                    html += `
                        <tr>
                            <td>${escapeHtml(u.username || '')}</td>
                            <td>${escapeHtml(u.email || '')}</td>
                            <td>${escapeHtml(u.phone || '')}</td>
                            <td>
                                <span class="badge ${u.isActive ? 'text-bg-success' : 'text-bg-danger'}">
                                    ${u.isActive ? 'Hoạt động' : 'Vô hiệu'}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-warning btn-sm me-1" onclick="editUserById('${u.id}')">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                });

                const tbody = document.getElementById("userTable");
                if (tbody) tbody.innerHTML = html || `<tr><td colspan="5" class="text-center text-muted">Không có dữ liệu</td></tr>`;

                if (typeof AdminPagination !== 'undefined') {
                    AdminPagination.render("userPagination", userItems.length, currentPage, PAGE_SIZE, (p) => {
                        currentPage = p;
                        renderTable();
                    });
                }
            }

            /* ================= MODAL ================= */
            function showModal() {
                const modal = document.getElementById('userModal');
                if (modal) {
                    modal.classList.add('show');
                    document.body.classList.add('modal-open');
                }
            }

            function closeUserModal() {
                const modal = document.getElementById('userModal');
                if (modal) {
                    modal.classList.remove('show');
                    document.body.classList.remove('modal-open');
                }
            }

            function openAddModal() {
                const title = document.getElementById("userModalTitle");
                if (title) title.innerText = "Thêm Người Dùng";

                const form = document.getElementById("userForm");
                if (form) form.reset();

                document.getElementById("userId").value = "";
                showModal();
            }

            function editUserById(id) {
                const u = userItems.find(x => String(x.id) === String(id));
                if (!u) return;

                const title = document.getElementById("userModalTitle");
                if (title) title.innerText = "Sửa Người Dùng";

                document.getElementById("userId").value = u.id || "";
                document.getElementById("username").value = u.username || "";
                document.getElementById("email").value = u.email || "";
                document.getElementById("phone").value = u.phone || "";
                document.getElementById("avatarUrl").value = u.avatarUrl || "";
                document.getElementById("password").value = "";

                showModal();
            }

            async function saveUser() {
                const id = document.getElementById("userId").value;
                const payload = {
                    username: document.getElementById("username").value.trim(),
                    email: document.getElementById("email").value.trim(),
                    phone: document.getElementById("phone").value.trim(),
                    avatarUrl: document.getElementById("avatarUrl").value.trim(),
                    password: document.getElementById("password").value.trim()
                };

                const method = id ? "PUT" : "POST";
                const url = id ? `${API_URL}/${encodeURIComponent(id)}` : API_URL;

                try {
                    const res = await fetch(url, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!res.ok) throw new Error("Lưu thất bại");

                    closeUserModal();
                    loadUsers();
                } catch (e) {
                    console.error(e);
                    alert("Lưu thất bại: " + e.message);
                }
            }

            async function deleteUser(id) {
                if (!confirm("Bạn có chắc muốn xóa người dùng này không?")) return;
                try {
                    const res = await fetch(`${API_URL}/${encodeURIComponent(id)}`, { method: "DELETE" });
                    if (res.ok) loadUsers();
                    else alert("Xóa thất bại!");
                } catch (e) {
                    console.error(e);
                    alert("Xóa thất bại!");
                }
            }

            /* ================= INIT ================= */
            document.addEventListener("DOMContentLoaded", () => {
                loadUsers();
                loadUserImportLog();

                // Click backdrop to close
                const modal = document.getElementById('userModal');
                if (modal) {
                    modal.addEventListener('click', function(e) {
                        if (e.target === modal) closeUserModal();
                    });
                }
            });
        </script>
    </th:block>
</body>
</html>
