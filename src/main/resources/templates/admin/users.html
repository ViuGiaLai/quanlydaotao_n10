<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Users</title>
    
    <!-- CSS cho Modal thuần -->
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            transform: translateY(-30px);
            transition: transform 0.3s ease;
            width: 100%;
            max-width: 500px;
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='users'"></th:block>

        <div class="app-content">
            <div class="container-fluid">

                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <i class="bi bi-person-plus"></i> Thêm Người Dùng
                        </button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Danh Sách Người Dùng</h3>
                            </div>

                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped align-middle">
                                        <thead>
                                            <tr>
                                                <th>Username</th>
                                                <th>Email</th>
                                                <th>Điện Thoại</th>
                                                <th>Trạng Thái</th>
                                                <th>Hành Động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="userTable"></tbody>
                                    </table>

                                    <div id="userPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!--  MODAL  -->
        <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="userModalTitle">Thêm Người Dùng</h5>
                        <button type="button" class="btn-close" onclick="closeUserModal()" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <form id="userForm">
                            <input type="hidden" id="userId">

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Điện Thoại</label>
                                <input type="text" class="form-control" id="phone">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Avatar URL</label>
                                <input type="text" class="form-control" id="avatarUrl">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mật Khẩu</label>
                                <input type="password" class="form-control" id="password">
                            </div>
                        </form>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeUserModal()">Hủy</button>
                        <button type="button" class="btn btn-primary" onclick="saveUser()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const API_URL = "/api/users";
            const PAGE_SIZE = 10;

            let userItems = [];
            let currentPage = 1;

            async function loadUsers() {
                try {
                    const res = await fetch(API_URL);
                    if (!res.ok) throw new Error("API error: " + res.status);

                    userItems = await res.json();
                    currentPage = 1;
                    renderTable();
                } catch (e) {
                    console.error(e);
                    const tbody = document.getElementById("userTable");
                    if (tbody) tbody.innerHTML = `<tr><td colspan="5" class="text-danger text-center">Lỗi: ${e.message}</td></tr>`;
                }
            }

            function escapeHtml(str) {
                if (!str) return "";
                return String(str)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function renderTable() {
                const pageItems = AdminPagination.paginate(userItems, currentPage, PAGE_SIZE);
                let html = "";

                pageItems.forEach(u => {
                    html += `
                        <tr>
                            <td>${escapeHtml(u.username || '')}</td>
                            <td>${escapeHtml(u.email || '')}</td>
                            <td>${escapeHtml(u.phone || '')}</td>
                            <td>
                                <span class="badge ${u.isActive ? 'text-bg-success' : 'text-bg-danger'}">
                                    ${u.isActive ? 'Hoạt động' : 'Vô hiệu'}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-warning btn-sm me-1" onclick="editUserById('${u.id}')">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                });

                const tbody = document.getElementById("userTable");
                if (tbody) tbody.innerHTML = html || `<tr><td colspan="5" class="text-center text-muted">Không có dữ liệu</td></tr>`;

                if (typeof AdminPagination !== 'undefined') {
                    AdminPagination.render("userPagination", userItems.length, currentPage, PAGE_SIZE, (p) => {
                        currentPage = p;
                        renderTable();
                    });
                }
            }

            /* ================= MODAL ================= */
            function showModal() {
                const modal = document.getElementById('userModal');
                if (modal) {
                    modal.classList.add('show');
                    document.body.classList.add('modal-open');
                }
            }

            function closeUserModal() {
                const modal = document.getElementById('userModal');
                if (modal) {
                    modal.classList.remove('show');
                    document.body.classList.remove('modal-open');
                }
            }

            function openAddModal() {
                const title = document.getElementById("userModalTitle");
                if (title) title.innerText = "Thêm Người Dùng";

                const form = document.getElementById("userForm");
                if (form) form.reset();

                document.getElementById("userId").value = "";
                showModal();
            }

            function editUserById(id) {
                const u = userItems.find(x => String(x.id) === String(id));
                if (!u) return;

                const title = document.getElementById("userModalTitle");
                if (title) title.innerText = "Sửa Người Dùng";

                document.getElementById("userId").value = u.id || "";
                document.getElementById("username").value = u.username || "";
                document.getElementById("email").value = u.email || "";
                document.getElementById("phone").value = u.phone || "";
                document.getElementById("avatarUrl").value = u.avatarUrl || "";
                document.getElementById("password").value = "";

                showModal();
            }

            async function saveUser() {
                const id = document.getElementById("userId").value;
                const payload = {
                    username: document.getElementById("username").value.trim(),
                    email: document.getElementById("email").value.trim(),
                    phone: document.getElementById("phone").value.trim(),
                    avatarUrl: document.getElementById("avatarUrl").value.trim(),
                    password: document.getElementById("password").value.trim()
                };

                const method = id ? "PUT" : "POST";
                const url = id ? `${API_URL}/${id}` : API_URL;

                try {
                    const res = await fetch(url, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!res.ok) throw new Error("Lưu thất bại");

                    closeUserModal();
                    loadUsers();
                } catch (e) {
                    console.error(e);
                    alert("Lưu thất bại: " + e.message);
                }
            }

            async function deleteUser(id) {
                if (!confirm("Bạn có chắc muốn xóa người dùng này không?")) return;
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                    if (res.ok) loadUsers();
                    else alert("Xóa thất bại!");
                } catch (e) {
                    console.error(e);
                    alert("Xóa thất bại!");
                }
            }

            /* ================= INIT ================= */
            document.addEventListener("DOMContentLoaded", () => {
                loadUsers();

                // Click backdrop to close
                const modal = document.getElementById('userModal');
                if (modal) {
                    modal.addEventListener('click', function(e) {
                        if (e.target === modal) closeUserModal();
                    });
                }
            });
        </script>
    </th:block>
</body>
</html>
