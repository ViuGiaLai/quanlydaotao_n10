<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Phân Công Môn-Lớp - Admin</title>
    <th:block th:with="activePage='course-class-subjects'"></th:block>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-book"></i> Phân Công Môn-Lớp</h2>
        </div>

        <!-- Import Excel -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-file-excel"></i> Import Excel</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <button class="btn btn-outline-primary" onclick="downloadPCMTemplate()">
                            <i class="fas fa-download"></i> Tải File Mẫu
                        </button>
                    </div>
                    <div class="col-md-4">
                        <input type="file" class="form-control" id="pcmExcelFile" accept=".xlsx,.xls,.csv">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-warning" onclick="previewPCMExcel()">Xem Trước</button>
                        <button class="btn btn-success" onclick="importPCMExcel()">Import</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Preview -->
        <div class="card mb-4" id="pcmPreviewCard" style="display:none;">
            <div class="card-body">
                <table class="table table-bordered">
                    <thead><tr><th>STT</th><th>Mã Lớp</th><th>Mã Môn</th><th>Mã GV</th><th>Ghi Chú</th></tr></thead>
                    <tbody id="pcmPreviewBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Chọn học kỳ và lớp -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-filter"></i> Chọn Học Kỳ và Lớp</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label class="form-label">Học Kỳ</label>
                        <select class="form-select" id="semesterId" onchange="loadCourseClasses()">
                            <option value="">-- Chọn Học Kỳ --</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Lớp Học</label>
                        <select class="form-select" id="courseClassId" onchange="loadSubjects()">
                            <option value="">-- Chọn Lớp --</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Thêm Môn Học</label>
                        <select class="form-select" id="newSubjectId">
                            <option value="">-- Chọn Môn --</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Hành Động</label>
                        <button class="btn btn-success" onclick="addSubject()">
                            <i class="fas fa-plus"></i> Thêm Môn
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Danh sách môn của lớp -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-list"></i> Danh Sách Môn Học</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã Môn</th>
                            <th>Tên Môn</th>
                            <th>Giảng Viên</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="subjectTable">
                        <tr>
                            <td colspan="5" class="text-center text-muted">
                                Vui lòng chọn học kỳ và lớp học
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Sửa Giảng Viên -->
    <div class="modal fade" id="editTeacherModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Phân Công Giảng Viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="ccsId">
                    <div class="mb-3">
                        <label class="form-label">Môn Học</label>
                        <input type="text" class="form-control" id="ccsSubjectName" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giảng Viên</label>
                        <select class="form-select" id="teacherId">
                            <option value="">-- Chọn Giảng Viên --</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveTeacher()">Lưu</button>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script>
        const API_CCS = '/api/course-class-subjects';
        const API_SUBJECTS = '/api/subjects/list';
        const API_SEMESTERS = '/api/semesters/list';
        const API_COURSE_CLASSES = '/api/course-classes/list';
        const API_TEACHERS = '/api/teachers/list';

        let allSubjects = [];
        let allTeachers = [];
        let pcmPreviewData = [];
        let ccsData = [];

        // Download template
        function downloadPCMTemplate() {
            const headers = ['STT', 'MaLop', 'MaMon', 'MaGV', 'GhiChu'];
            const sample = [['1', 'KST23I', 'MATH101', 'GV001', 'Lớp chính']];
            let csv = headers.join(',') + '\n';
            sample.forEach(r => csv += r.join(',') + '\n');
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'mau_import_phancong.csv';
            link.click();
        }

        async function previewPCMExcel() {
            const fileInput = document.getElementById('pcmExcelFile');
            if (!fileInput.files[0]) { alert('Chọn file'); return; }
            try {
                const data = await readPCMFile(fileInput.files[0]);
                pcmPreviewData = validatePCMData(data);
                renderPCMPreview();
            } catch (e) { alert('Lỗi: ' + e.message); }
        }

        async function readPCMFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                const fileName = file.name.toLowerCase();
                reader.onload = (e) => {
                    try {
                        if (fileName.endsWith('.csv')) {
                            const text = e.target.result;
                            const lines = text.split('\n').filter(l => l.trim());
                            const data = lines.map(line => {
                                const result = [];
                                let current = '';
                                let inQuotes = false;
                                for (let i = 0; i < line.length; i++) {
                                    const char = line[i];
                                    if (char === '"') { inQuotes = !inQuotes; }
                                    else if (char === ',' && !inQuotes) {
                                        result.push(current.trim());
                                        current = '';
                                    } else { current += char; }
                                }
                                result.push(current.trim());
                                return result;
                            });
                            resolve(data);
                        } else {
                            const wb = XLSX.read(e.target.result, { type: 'array' });
                            const sheet = wb.Sheets[wb.SheetNames[0]];
                            resolve(XLSX.utils.sheet_to_json(sheet, { header: 1 }));
                        }
                    } catch (err) { reject(err); }
                };
                reader.onerror = reject;
                if (fileName.endsWith('.csv')) {
                    reader.readAsText(file, 'UTF-8');
                } else {
                    reader.readAsArrayBuffer(file);
                }
            });
        }

        function validatePCMData(data) {
            return data.slice(1).filter(r => r && r.length >= 3).map(r => ({
                stt: r[0], maLop: r[1], maMon: r[2], maGV: r[3], ghiChu: r[4],
                isValid: !!r[1] && !!r[2], errorMsg: !r[1] || !r[2] ? 'Thiếu mã lớp/môn' : ''
            }));
        }

        function renderPCMPreview() {
            const tbody = document.getElementById('pcmPreviewBody');
            document.getElementById('pcmPreviewCard').style.display = 'block';
            let html = '';
            pcmPreviewData.forEach((d, i) => {
                html += `<tr class="${d.isValid?'table-success':'table-danger'}">
                    <td>${i+1}</td><td>${d.maLop||''}</td><td>${d.maMon||''}</td>
                    <td>${d.maGV||''}</td><td>${d.ghiChu||''}</td></tr>`;
            });
            tbody.innerHTML = html;
        }

        async function importPCMExcel() {
            const validRows = pcmPreviewData.filter(d => d.isValid);
            if (validRows.length === 0) { alert('Không có dữ liệu hợp lệ'); return; }
            if (!confirm(`Import ${validRows.length} phân công?`)) return;
            try {
                const res = await fetch(API_CCS + '/import', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(validRows)
                });
                if (res.ok) {
                    alert('Import thành công!');
                    document.getElementById('pcmPreviewCard').style.display = 'none';
                    loadCourseClasses();
                } else { alert('Lỗi: ' + await res.text()); }
            } catch (e) { alert('Lỗi: ' + e.message); }
        }

        // Load lookup data
        async function loadLookupData() {
            try {
                const [semestersRes, subjectsRes, teachersRes] = await Promise.allSettled([
                    fetch(API_SEMESTERS),
                    fetch(API_SUBJECTS),
                    fetch(API_TEACHERS)
                ]);

                const semesters = semestersRes.status === 'fulfilled' && semestersRes.value.ok
                    ? await semestersRes.value.json()
                    : [];
                allSubjects = subjectsRes.status === 'fulfilled' && subjectsRes.value.ok
                    ? await subjectsRes.value.json()
                    : [];
                allTeachers = teachersRes.status === 'fulfilled' && teachersRes.value.ok
                    ? await teachersRes.value.json()
                    : [];

                // Fill semesters
                const semesterSelect = document.getElementById("semesterId");
                semesters.forEach(s => {
                    semesterSelect.innerHTML += `<option value="${s.id}">${s.name || s.semesterName}</option>`;
                });

                // Fill subjects dropdown
                const subjectSelect = document.getElementById("newSubjectId");
                allSubjects.forEach(s => {
                    subjectSelect.innerHTML += `<option value="${s.id}">${s.subjectCode} - ${s.subjectName}</option>`;
                });

                if (allTeachers.length === 0) {
                    console.warn('No teachers loaded for course-class-subjects');
                }
            } catch (e) {
                console.error("Load lookup error:", e);
            }
        }

        // Load course classes by semester
        async function loadCourseClasses() {
            const semesterId = document.getElementById("semesterId").value;
            const classSelect = document.getElementById("courseClassId");
            
            classSelect.innerHTML = '<option value="">-- Chọn Lớp --</option>';
            
            if (!semesterId) {
                renderSubjectTable([]);
                return;
            }
            
            try {
                const res = await fetch(`${API_COURSE_CLASSES}?semesterId=${semesterId}`);
                const classes = await res.json();
                
                classes.forEach(c => {
                    classSelect.innerHTML += `<option value="${c.id}">${c.classCode} - ${c.className}</option>`;
                });
            } catch (e) {
                console.error("Load classes error:", e);
            }
        }

        // Load subjects for selected class
        async function loadSubjects() {
            const courseClassId = document.getElementById("courseClassId").value;
            
            if (!courseClassId) {
                renderSubjectTable([]);
                return;
            }
            
            try {
                const res = await fetch(`${API_CCS}?courseClassId=${courseClassId}`);
                const data = await res.json();
                renderSubjectTable(data);
            } catch (e) {
                console.error("Load subjects error:", e);
            }
        }

        // Render table
        function renderSubjectTable(data) {
            const tbody = document.getElementById("subjectTable");
            ccsData = data;
            
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">Chưa có môn học nào</td></tr>`;
                return;
            }
            
            let html = '';
            data.forEach((item, index) => {
                const subject = allSubjects.find(s => s.id === item.subjectId) || {};
                const teacher = allTeachers.find(t => t.id === item.teacherId) || {};
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${subject.subjectCode || '-'}</td>
                        <td>${subject.subjectName || '-'}</td>
                        <td>${teacher.fullName || teacher.name || '-'}</td>
                        <td>
                            <button class="btn btn-primary btn-sm me-1" onclick="editTeacher('${item.id}')">
                                <i class="fas fa-user-edit"></i> Sửa
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteSubject('${item.id}')">
                                <i class="fas fa-trash"></i> Xóa
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }

        // Add subject to class
        async function addSubject() {
            const courseClassId = document.getElementById("courseClassId").value;
            const subjectId = document.getElementById("newSubjectId").value;
            
            if (!courseClassId || !subjectId) {
                alert('Vui lòng chọn lớp học và môn học');
                return;
            }
            
            try {
                const res = await fetch(API_CCS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        courseClassId: courseClassId,
                        subjectId: subjectId
                    })
                });
                
                if (res.ok) {
                    alert('Thêm môn thành công!');
                    loadSubjects();
                } else {
                    alert('Lỗi khi thêm môn');
                }
            } catch (e) {
                console.error("Add error:", e);
                alert('Lỗi: ' + e.message);
            }
        }

        // Delete subject from class
        async function deleteSubject(id) {
            if (!confirm('Bạn có chắc muốn xóa môn học này khỏi lớp?')) {
                return;
            }
            
            try {
                const res = await fetch(`${API_CCS}/${id}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    alert('Xóa thành công!');
                    loadSubjects();
                } else {
                    alert('Lỗi khi xóa');
                }
            } catch (e) {
                console.error("Delete error:", e);
            }
        }

        // Edit teacher - show modal
        function editTeacher(id) {
            const item = ccsData.find(c => c.id === id);
            if (!item) return;
            
            const subject = allSubjects.find(s => s.id === item.subjectId) || {};
            const teacher = allTeachers.find(t => t.id === item.teacherId) || {};
            
            document.getElementById("ccsId").value = id;
            document.getElementById("ccsSubjectName").value = subject.subjectName || '-';
            
            // Fill teachers
            const teacherSelect = document.getElementById("teacherId");
            teacherSelect.innerHTML = '<option value="">-- Chọn Giảng Viên --</option>';
            allTeachers.forEach(t => {
                teacherSelect.innerHTML += `<option value="${t.id}" ${t.id === item.teacherId ? 'selected' : ''}>${t.fullName || t.name || t.username}</option>`;
            });
            
            var modalEl = document.getElementById('editTeacherModal');
            if (modalEl) {
                var myModal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                myModal.show();
                // Scroll lên modal
                setTimeout(() => {
                    modalEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }

        // Save teacher assignment
        async function saveTeacher() {
            const id = document.getElementById("ccsId").value;
            const teacherId = document.getElementById("teacherId").value;
            
            if (!teacherId) {
                alert('Vui lòng chọn giảng viên');
                return;
            }
            
            try {
                const res = await fetch(`${API_CCS}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teacherId: teacherId })
                });
                
                if (res.ok) {
                    alert('Lưu thành công!');
                    var modalEl = document.getElementById('editTeacherModal');
                    if (modalEl) {
                        var myModal = bootstrap.Modal.getInstance(modalEl);
                        if (myModal) myModal.hide();
                    }
                    loadSubjects();
                } else {
                    alert('Lỗi khi lưu');
                }
            } catch (e) {
                console.error("Save error:", e);
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', function() {
            loadLookupData();
        });
    </script>
    </div>
</body>
</html>
