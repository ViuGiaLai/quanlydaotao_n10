<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Exam Papers</title>
</head>

<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='exam-papers'"></th:block>

        <div class="app-content">
            <div class="container-fluid">

                <!-- Button -->
                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <i class="bi bi-plus-lg"></i> Thêm Đề Thi
                        </button>
                    </div>
                </div>

                <!-- Table -->
                <div class="card">
                    <div class="card-header">
                        <h3>Danh Sách Đề Thi</h3>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped align-middle">
                                <thead>
                                    <tr>
                                        <th>Mã Đề</th>
                                        <th>Kỳ Thi</th>
                                        <th>File</th>
                                        <th>Trạng Thái</th>
                                        <th>Hành Động</th>
                                    </tr>
                                </thead>

                                <tbody id="examPaperTable"></tbody>
                            </table>
                        </div>

                        <div id="examPaperPagination" class="d-flex justify-content-center mt-3 mb-3"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- MODAL -->
        <div class="modal fade" id="examPaperModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 id="modalTitle">Thêm Đề Thi</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <form id="examPaperForm">
                            <input type="hidden" id="examPaperId">

                            <div class="mb-3">
                                <label>Kỳ Thi</label>
                                <select class="form-select" id="examId"></select>
                            </div>

                            <div class="mb-3">
                                <label>Mã Đề</label>
                                <input class="form-control" id="paperCode">
                            </div>

                            <div class="mb-3">
                                <label>File URL</label>
                                <input class="form-control" id="fileUrl">
                            </div>

                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="isActive" checked>
                                <label class="form-check-label">Kích hoạt</label>
                            </div>
                        </form>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button class="btn btn-primary" onclick="saveExamPaper()">Lưu</button>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <th:block layout:fragment="script">
        <script>
            const API_URL = "/api/exam-papers";
            const EXAM_API = "/api/exams/list";

            const PAGE_SIZE = 10;

            let exams = [];
            let items = [];
            let currentPage = 1;

            /* ---------------- LOAD EXAMS ---------------- */
            async function loadExams() {
                const res = await fetch(EXAM_API);
                exams = await res.json();

                const sel = document.getElementById("examId");
                sel.innerHTML = `<option value="">-- Chọn --</option>`;

                exams.forEach(e => {
                    const name = e.name || e.examName || e.id;
                    sel.innerHTML += `<option value="${e.id}">${name}</option>`;
                });
            }

            /* ---------------- LOAD PAPERS ---------------- */
            async function loadExamPapers() {
                const res = await fetch(API_URL);
                items = await res.json();

                currentPage = 1;
                render();
            }

            /* ---------------- RENDER ---------------- */
            function render() {
                const start = (currentPage - 1) * PAGE_SIZE;
                const page = items.slice(start, start + PAGE_SIZE);

                let html = "";

                page.forEach(p => {
                    html += `
        <tr>
            <td>${escapeHtml(p.paperCode)}</td>
            <td>${getExamName(p.examId)}</td>
            <td>
                ${p.fileUrl ? `
                    <button class="btn btn-sm btn-primary" onclick="downloadFile('${p.fileUrl}')">⬇</button>
                    <button class="btn btn-sm btn-info" onclick="viewFile('${p.fileUrl}')">👁</button>
                ` : '-'}
            </td>
            <td>
                <span class="badge ${p.isActive ? 'text-bg-success' : 'text-bg-danger'}">
                    ${p.isActive ? 'Hoạt động' : 'Vô hiệu'}
                </span>
            </td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editExamPaper('${p.id}')">✏</button>
                <button class="btn btn-danger btn-sm" onclick="deleteExamPaper('${p.id}')">🗑</button>
            </td>
        </tr>`;
                });

                document.getElementById("examPaperTable").innerHTML =
                    html || `<tr><td colspan="5" class="text-center">Không có dữ liệu</td></tr>`;

                renderPagination();
            }

            /* ---------------- PAGINATION ---------------- */
            function renderPagination() {
                const total = Math.ceil(items.length / PAGE_SIZE);
                const div = document.getElementById("examPaperPagination");

                if (total <= 1) {
                    div.innerHTML = "";
                    return;
                }

                let html = `<ul class="pagination">`;

                for (let i = 1; i <= total; i++) {
                    html += `
        <li class="page-item ${i === currentPage ? 'active' : ''}">
            <button class="page-link" onclick="goPage(${i})">${i}</button>
        </li>`;
                }

                html += `</ul>`;
                div.innerHTML = html;
            }

            function goPage(p) {
                currentPage = p;
                render();
            }

            /* ---------------- MODAL ---------------- */
            function openAddModal() {
                document.getElementById("modalTitle").innerText = "Thêm Đề Thi";
                document.getElementById("examPaperForm").reset();
                document.getElementById("examPaperId").value = "";
                document.getElementById("isActive").checked = true;

                bootstrap.Modal.getOrCreateInstance(
                    document.getElementById("examPaperModal")
                ).show();
            }

            function editExamPaper(id) {
                const p = items.find(x => x.id === id);
                if (!p) return;

                document.getElementById("modalTitle").innerText = "Sửa Đề Thi";
                document.getElementById("examPaperId").value = p.id;
                document.getElementById("examId").value = p.examId;
                document.getElementById("paperCode").value = p.paperCode;
                document.getElementById("fileUrl").value = p.fileUrl || "";
                document.getElementById("isActive").checked = p.isActive;

                bootstrap.Modal.getOrCreateInstance(
                    document.getElementById("examPaperModal")
                ).show();
            }

            /* ---------------- SAVE ---------------- */
            async function saveExamPaper() {
                const id = document.getElementById("examPaperId").value;

                const body = {
                    examId: document.getElementById("examId").value,
                    paperCode: document.getElementById("paperCode").value,
                    fileUrl: document.getElementById("fileUrl").value,
                    isActive: document.getElementById("isActive").checked
                };

                const res = await fetch(id ? `${API_URL}/${encodeURIComponent(id)}` : API_URL, {
                    method: id ? "PUT" : "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    alert("Lỗi lưu");
                    return;
                }

                bootstrap.Modal.getInstance(
                    document.getElementById("examPaperModal")
                )?.hide();

                loadExamPapers();
            }

            /* ---------------- DELETE ---------------- */
            async function deleteExamPaper(id) {
                if (!confirm("Xóa đề thi?")) return;
                await fetch(`${API_URL}/${encodeURIComponent(id)}`, { method: "DELETE" });
                loadExamPapers();
            }

            /* ---------------- HELPERS ---------------- */
            function getExamName(id) {
                const e = exams.find(x => x.id === id);
                return e ? (e.name || e.examName || id) : id;
            }

            function escapeHtml(str) {
                if (!str) return "";
                return String(str)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;");
            }

            /* ---------------- FILE ---------------- */
            function downloadFile(url) {
                window.open(url, "_blank");
            }

            function viewFile(url) {
                window.open(url, "_blank");
            }

            /* ---------------- INIT ---------------- */
            document.addEventListener("DOMContentLoaded", async () => {
                await loadExams();
                await loadExamPapers();
            });
        </script>
    </th:block>

</body>

</html>
