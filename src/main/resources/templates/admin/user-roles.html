    <th:block layout:fragment="script">
        <script>
            const USER_API_URL = "/api/users/list";
            const ROLE_API_URL = "/api/roles/list";
            const USER_ROLE_API_URL = "/api/user-roles";
            const USER_ROLE_PAGE_SIZE = 10;
            let usersList = [];
            let rolesList = [];
            let userRoleItems = [];
            let userRoleCurrentPage = 1;

            async function loadUsersAndRoles() {
                try {
                    const [usersRes, rolesRes] = await Promise.all([
                        fetch(USER_API_URL),
                        fetch(ROLE_API_URL)
                    ]);
                    usersList = await usersRes.json();
                    rolesList = await rolesRes.json();
                    populateSelects();
                } catch (error) {
                    console.error("Load users/roles error:", error);
                }
            }

            function populateSelects() {
                const userSelect = document.getElementById("userId");
                const roleSelect = document.getElementById("roleId");
                if (!userSelect || !roleSelect) return;
                userSelect.innerHTML = '<option value="">-- Chọn User --</option>';
                roleSelect.innerHTML = '<option value="">-- Chọn Vai Trò --</option>';
                usersList.forEach(u => {
                    userSelect.innerHTML += `<option value="${u.id}">${u.username}</option>`;
                });
                rolesList.forEach(r => {
                    roleSelect.innerHTML += `<option value="${r.id}">${r.name}</option>`;
                });
            }

            async function loadUserRoles() {
                try {
                    const res = await fetch(USER_ROLE_API_URL);
                    const data = await res.json();
                    userRoleItems = Array.isArray(data) ? data : [];
                    userRoleCurrentPage = 1;
                    // Wait for usersList and rolesList to be loaded
                    if (usersList.length === 0 || rolesList.length === 0) {
                        await loadUsersAndRoles();
                    }
                    renderUserRoleTable();
                } catch (error) {
                    console.error("Load user roles error:", error);
                    alert("Không thể tải user roles.");
                }
            }

            function getUserName(userId) {
                if (!userId) return "";
                if (!Array.isArray(usersList) || usersList.length === 0) return String(userId).substring(0, 8);
                const user = usersList.find(u => String(u.id) === String(userId));
                return user ? user.username : String(userId).substring(0, 8);
            }

            function getRoleName(roleId) {
                if (!roleId) return "";
                if (!Array.isArray(rolesList) || rolesList.length === 0) return String(roleId).substring(0, 8);
                const role = rolesList.find(r => String(r.id) === String(roleId));
                return role ? role.name : String(roleId).substring(0, 8);
            }

            function renderUserRoleTable() {
                    const pageItems = AdminPagination.paginate(userRoleItems, userRoleCurrentPage, USER_ROLE_PAGE_SIZE);
                    let html = "";
                    pageItems.forEach((item) => {
                        html += `
                            <tr>
                                <td>${getUserName(item.userId)}</td>
                                <td>${getRoleName(item.roleId)}</td>
                                <td><span class="badge ${item.isActive ? "text-bg-success" : "text-bg-danger"}">${item.isActive ? "Hoạt động" : "Vô hiệu"}</span></td>
                                <td>
                                    <button class="btn btn-warning btn-sm" onclick='editUserRole(${JSON.stringify(item)})'><i class="bi bi-pencil-square"></i></button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteUserRole('${item.id}')"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                        `;
                    });
                    document.getElementById("userRoleTable").innerHTML = html;
                    AdminPagination.render("userRolePagination", userRoleItems.length, userRoleCurrentPage, USER_ROLE_PAGE_SIZE, (nextPage) => {
                        userRoleCurrentPage = nextPage;
                        renderUserRoleTable();
                    });
            }

            function openUserRoleModal() {
                document.getElementById("userRoleModalTitle").innerText = "Gán Vai Trò Mới";
                document.getElementById("userRoleId").value = "";
                document.getElementById("userRoleForm").reset();
                document.getElementById("userRoleIsActive").checked = true;
                $("#userRoleModal").modal("show");
            }

            function editUserRole(item) {
                document.getElementById("userRoleModalTitle").innerText = "Sửa Gán Vai Trò";
                document.getElementById("userRoleId").value = item.id || "";
                document.getElementById("userId").value = item.userId || "";
                document.getElementById("roleId").value = item.roleId || "";
                document.getElementById("userRoleIsActive").checked = !!item.isActive;
                $("#userRoleModal").modal("show");
            }

            async function saveUserRole() {
                const id = document.getElementById("userRoleId").value;
                const payload = {
                    userId: document.getElementById("userId").value.trim(),
                    roleId: document.getElementById("roleId").value.trim(),
                    isActive: document.getElementById("userRoleIsActive").checked
                };
                const method = id ? "PUT" : "POST";
                const url = id ? `${USER_ROLE_API_URL}/${id}` : USER_ROLE_API_URL;
                try {
                    const res = await fetch(url, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.message || "Save failed");
                    }
                    $("#userRoleModal").modal("hide");
                    loadUserRoles();
                } catch (error) {
                    console.error("Save user role error:", error);
                    alert(error.message || "Lưu user role thất bại.");
                }
            }

            async function deleteUserRole(id) {
                if (!confirm("Bạn có chắc muốn xóa user role này?")) return;
                try {
                    const res = await fetch(`${USER_ROLE_API_URL}/${id}`, { method: "DELETE" });
                    if (!res.ok) throw new Error("Delete failed");
                    loadUserRoles();
                } catch (error) {
                    console.error("Delete user role error:", error);
                    alert("Xóa user role thất bại.");
                }
            }

            document.addEventListener("DOMContentLoaded", async () => {
                await loadUsersAndRoles();
                await loadUserRoles();
            });
        </script>
    </th:block>
