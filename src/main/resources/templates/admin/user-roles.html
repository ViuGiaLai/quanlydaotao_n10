<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>User Roles</title>
    
    <!-- CSS cho Modal thuần -->
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.show {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            transform: translateY(-30px);
            transition: transform 0.3s ease;
            width: 100%;
            max-width: 500px;
        }
        
        .modal.show .modal-content {
            transform: translateY(0);
        }
        
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <th:block th:with="activePage='user-roles'"></th:block>
        
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <i class="bi bi-plus-lg"></i> Gán Vai Trò Mới
                        </button>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Danh Sách Gán Vai Trò</h3>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>User</th>
                                                <th>Vai Trò</th>
                                                <th>Trạng Thái</th>
                                                <th>Hành Động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="userRoleTable"></tbody>
                                    </table>
                                </div>
                                <div class="p-3 border-top" id="userRolePagination"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Thuần CSS -->
        <div class="modal fade" id="userRoleModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="userRoleModalTitle">Gán Vai Trò Mới</h5>
                        <button type="button" class="btn-close" onclick="closeUserRoleModal()" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="userRoleForm">
                            <input type="hidden" id="userRoleId">
                            <div class="mb-3">
                                <label for="userId" class="form-label">User</label>
                                <select class="form-select" id="userId" required>
                                    <option value="">-- Chọn User --</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="roleId" class="form-label">Vai Trò</label>
                                <select class="form-select" id="roleId" required>
                                    <option value="">-- Chọn Vai Trò --</option>
                                </select>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="userRoleIsActive" checked>
                                <label class="form-check-label" for="userRoleIsActive">Kích hoạt</label>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeUserRoleModal()">Hủy</button>
                        <button type="button" class="btn btn-primary" onclick="saveUserRole()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const USER_API_URL = "/api/users/list";
            const ROLE_API_URL = "/api/roles/list";
            const USER_ROLE_API_URL = "/api/user-roles";
            const PAGE_SIZE = 10;

            let usersList = [];
            let rolesList = [];
            let userRoleItems = [];
            let currentPage = 1;

            // Load Users & Roles
            async function loadUsersAndRoles() {
                try {
                    const [usersRes, rolesRes] = await Promise.all([
                        fetch(USER_API_URL),
                        fetch(ROLE_API_URL)
                    ]);
                    usersList = await usersRes.json();
                    rolesList = await rolesRes.json();
                    populateSelects();
                } catch (error) {
                    console.error("Load lookup error:", error);
                }
            }

            function populateSelects() {
                const userSelect = document.getElementById("userId");
                const roleSelect = document.getElementById("roleId");

                userSelect.innerHTML = '<option value="">-- Chọn User --</option>';
                rolesList.forEach(r => {
                    roleSelect.innerHTML += `<option value="${r.id}">${r.name}</option>`;
                });

                usersList.forEach(u => {
                    userSelect.innerHTML += `<option value="${u.id}">${u.username || u.fullName || u.id}</option>`;
                });
            }

            // Load Data
            async function loadUserRoles() {
                try {
                    const res = await fetch(USER_ROLE_API_URL);
                    if (!res.ok) throw new Error("Load failed");
                    userRoleItems = await res.json();
                    currentPage = 1;

                    if (usersList.length === 0 || rolesList.length === 0) {
                        await loadUsersAndRoles();
                    }
                    renderTable();
                } catch (error) {
                    console.error(error);
                    document.getElementById("userRoleTable").innerHTML = 
                        `<tr><td colspan="4" class="text-center text-danger">Lỗi tải dữ liệu</td></tr>`;
                }
            }

            function getUserName(userId) {
                const user = usersList.find(u => String(u.id) === String(userId));
                return user ? (user.username || user.fullName || userId) : userId;
            }

            function getRoleName(roleId) {
                const role = rolesList.find(r => String(r.id) === String(roleId));
                return role ? role.name : roleId;
            }

            // Render Table
            function renderTable() {
                const pageItems = AdminPagination.paginate(userRoleItems, currentPage, PAGE_SIZE);
                let html = "";

                pageItems.forEach(item => {
                    html += `
                        <tr>
                            <td>${getUserName(item.userId)}</td>
                            <td>${getRoleName(item.roleId)}</td>
                            <td><span class="badge ${item.isActive ? 'text-bg-success' : 'text-bg-danger'}">
                                ${item.isActive ? 'Hoạt động' : 'Vô hiệu'}
                            </span></td>
                            <td>
                                <button class="btn btn-warning btn-sm me-1" onclick="editUserRole('${item.id}')">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteUserRole('${item.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                });

                document.getElementById("userRoleTable").innerHTML = html || 
                    `<tr><td colspan="4" class="text-center">Không có dữ liệu</td></tr>`;

                if (typeof AdminPagination !== 'undefined') {
                    AdminPagination.render("userRolePagination", userRoleItems.length, currentPage, PAGE_SIZE, (page) => {
                        currentPage = page;
                        renderTable();
                    });
                }
            }

            // Modal Functions
            function showModal() {
                document.getElementById('userRoleModal').classList.add('show');
                document.body.classList.add('modal-open');
            }

            function closeUserRoleModal() {
                document.getElementById('userRoleModal').classList.remove('show');
                document.body.classList.remove('modal-open');
            }

            function openAddModal() {
                document.getElementById("userRoleModalTitle").innerText = "Gán Vai Trò Mới";
                document.getElementById("userRoleId").value = "";
                document.getElementById("userRoleForm").reset();
                document.getElementById("userRoleIsActive").checked = true;
                showModal();
            }

            function editUserRole(id) {
                const item = userRoleItems.find(x => String(x.id) === String(id));
                if (!item) return;

                document.getElementById("userRoleModalTitle").innerText = "Sửa Gán Vai Trò";
                document.getElementById("userRoleId").value = item.id || "";
                document.getElementById("userId").value = item.userId || "";
                document.getElementById("roleId").value = item.roleId || "";
                document.getElementById("userRoleIsActive").checked = !!item.isActive;

                showModal();
            }

            // Save
            async function saveUserRole() {
                const id = document.getElementById("userRoleId").value;
                const payload = {
                    userId: document.getElementById("userId").value,
                    roleId: document.getElementById("roleId").value,
                    isActive: document.getElementById("userRoleIsActive").checked
                };

                if (!payload.userId || !payload.roleId) {
                    alert("Vui lòng chọn User và Vai Trò");
                    return;
                }

                const method = id ? "PUT" : "POST";
                const url = id ? `${USER_ROLE_API_URL}/${encodeURIComponent(id)}` : USER_ROLE_API_URL;

                try {
                    const res = await fetch(url, {
                        method: method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!res.ok) throw new Error("Lưu thất bại");

                    closeUserRoleModal();
                    loadUserRoles();
                } catch (error) {
                    console.error(error);
                    alert("Lưu thất bại: " + error.message);
                }
            }

            // Delete
            async function deleteUserRole(id) {
                if (!confirm("Bạn có chắc muốn xóa gán vai trò này?")) return;
                try {
                    const res = await fetch(`${USER_ROLE_API_URL}/${encodeURIComponent(id)}`, { method: "DELETE" });
                    if (res.ok) loadUserRoles();
                    else alert("Xóa thất bại!");
                } catch (error) {
                    console.error(error);
                    alert("Xóa thất bại!");
                }
            }

            // Init
            document.addEventListener("DOMContentLoaded", async () => {
                await loadUsersAndRoles();
                await loadUserRoles();

                // Click backdrop to close modal
                document.getElementById('userRoleModal').addEventListener('click', function(e) {
                    if (e.target === this) closeUserRoleModal();
                });
            });
        </script>
    </th:block>
</body>
</html>
